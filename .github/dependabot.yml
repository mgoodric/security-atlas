version: 2

updates:
  # Go modules at the workspace root
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 10
    groups:
      go-otel:
        patterns:
          - "go.opentelemetry.io/*"
      go-aws:
        patterns:
          - "github.com/aws/*"
      go-grpc:
        patterns:
          - "google.golang.org/grpc"
          - "google.golang.org/protobuf"
      go-test:
        patterns:
          - "github.com/stretchr/*"
          - "github.com/jackc/*"
    commit-message:
      prefix: "deps"
      prefix-development: "deps"
      include: "scope"

  # npm workspaces (web/ + sdk/typescript/)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      next:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@next/*"
      shadcn:
        patterns:
          - "@radix-ui/*"
          - "tailwindcss"
          - "tailwind-merge"
          - "class-variance-authority"
      tanstack:
        patterns:
          - "@tanstack/*"
    commit-message:
      prefix: "deps"
      prefix-development: "deps"
      include: "scope"

  # Python (uv / pyproject.toml at root + oscal-bridge/)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: "scope"

  - package-ecosystem: "pip"
    directory: "/oscal-bridge"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: "scope"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/deploy/docker"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: "scope"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - "*"
    commit-message:
      prefix: "deps"
      include: "scope"
