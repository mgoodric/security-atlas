name: release-please

on:
  push:
    branches: [main]
    # Skip pure-docs / planning commits. release-please isn't in
    # `.github/branch-protection.json` required-checks (it runs on
    # push to main, not on PRs), so `paths-ignore:` at the workflow
    # `on:` level is safe here — no required-check deadlock concern.
    #
    # This is a different pattern from slice 061's CI gating (see
    # docs/ci/PATH_FILTERING.md). Slice 061 needs in-workflow stub
    # jobs because the affected checks are required by branch
    # protection. release-please is not a required check, so the
    # simpler `paths-ignore:` form works.
    #
    # Note: a `chore(status): ...` or `docs(...)` commit message
    # type is also excluded from release notes by release-please-
    # config.json — so even if a touched file slipped through this
    # filter, no release-notes line would land. This filter is a
    # runtime optimization to skip the workflow entirely.
    paths-ignore:
      - "**/*.md"
      - "Plans/**"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
      - ".editorconfig"

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release:
    name: Open / update release PR
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        uses: googleapis/release-please-action@v5
        with:
          # Manifest mode — release-please tracks current version in
          # .release-please-manifest.json and reads release-config from
          # release-please-config.json. Both files live at repo root.
          manifest-file: .release-please-manifest.json
          config-file: release-please-config.json
          # NEVER auto-merge release PRs. Anti-criterion P0 of slice 050:
          # every release requires explicit human approval. release-please
          # opens / updates the PR and that's it.
          skip-github-release: false
          # Release-please needs to be able to push to a branch named
          # release-please--... and to open a PR against main; the default
          # GITHUB_TOKEN has the needed scopes when permissions: above is
          # set.
          token: ${{ secrets.GITHUB_TOKEN }}
