name: release-please

on:
  push:
    branches: [main]
    # Skip pure-docs / planning commits. release-please isn't in
    # `.github/branch-protection.json` required-checks (it runs on
    # push to main, not on PRs), so `paths-ignore:` at the workflow
    # `on:` level is safe here — no required-check deadlock concern.
    #
    # This is a different pattern from slice 061's CI gating (see
    # docs/ci/PATH_FILTERING.md). Slice 061 needs in-workflow stub
    # jobs because the affected checks are required by branch
    # protection. release-please is not a required check, so the
    # simpler `paths-ignore:` form works.
    #
    # Note: a `chore(status): ...` or `docs(...)` commit message
    # type is also excluded from release notes by release-please-
    # config.json — so even if a touched file slipped through this
    # filter, no release-notes line would land. This filter is a
    # runtime optimization to skip the workflow entirely.
    paths-ignore:
      - "**/*.md"
      - "Plans/**"
      - "docs/**"
      - "LICENSE"
      - ".gitignore"
      - ".editorconfig"

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release:
    name: Open / update release PR
    runs-on: ubuntu-latest
    steps:
      # Mint a GitHub App installation token when the App is configured.
      #
      # WHY: GitHub's anti-recursion rule says a workflow run triggered by
      # `GITHUB_TOKEN` does NOT trigger further workflow runs. release-please
      # runs as a workflow; if it creates / force-updates the release PR's
      # branch with GITHUB_TOKEN, the `pull_request` event never fires the
      # required-check CI matrix — the release PR deadlocks at 1/10 checks
      # and can never satisfy branch protection. A GitHub App installation
      # token is attributed to the App, not to GITHUB_TOKEN, so the CI
      # matrix runs on the release PR normally.
      #
      # GRACEFUL FALLBACK: until the App is set up (the repo variable
      # `RELEASE_PLEASE_APP_ID` is unset), this step is skipped and the
      # workflow falls back to GITHUB_TOKEN. release-please still opens /
      # updates the PR — the PR just won't get CI until the App is
      # configured. Setup steps: docs/RELEASE_READINESS.md §10.
      - name: Mint GitHub App token
        id: app-token
        if: ${{ vars.RELEASE_PLEASE_APP_ID != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
      - name: Run release-please
        uses: googleapis/release-please-action@v4
        with:
          # Manifest mode — release-please tracks current version in
          # .release-please-manifest.json and reads release-config from
          # release-please-config.json. Both files live at repo root.
          manifest-file: .release-please-manifest.json
          config-file: release-please-config.json
          # NEVER auto-merge release PRs. Anti-criterion P0 of slice 050:
          # every release requires explicit human approval. release-please
          # opens / updates the PR and that's it.
          skip-github-release: false
          # App installation token when the App is configured; GITHUB_TOKEN
          # fallback otherwise. The App token is what lets the CI matrix
          # run on the release PR (see the "Mint GitHub App token" comment).
          token: ${{ steps.app-token.outputs.token || secrets.GITHUB_TOKEN }}
