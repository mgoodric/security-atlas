# Release pipeline — security-atlas
#
# Triggered by tags matching v*. Builds 5 OS/arch targets via GoReleaser,
# signs the checksums file with cosign (keyless OIDC via Sigstore Fulcio),
# publishes to GitHub Releases, pushes the Homebrew formula to the tap.
#
# Run locally (dry, requires goreleaser + cosign + a temp PAT):
#   GORELEASER_CURRENT_TAG=v0.0.0-dev goreleaser release --snapshot --clean --skip=publish,sign
#
# Verify a published checksum file post-release:
#   cosign verify-blob \
#     --certificate-identity-regexp 'https://github.com/mgoodric/security-atlas/\.github/workflows/release\.yml@.*' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#     --bundle    security-atlas_<version>_checksums.txt.sigstore.json \
#     security-atlas_<version>_checksums.txt
#
# Security boundary (CLAUDE.md §AI-assist + supply-chain):
# - NO private signing key is stored anywhere. Cosign uses Sigstore keyless
#   OIDC; Fulcio issues a short-lived (~10 min) certificate bound to this
#   exact workflow identity. Transparency log entry is published to Rekor.
# - GH_TOKEN scopes are pinned at the job level, not the workflow level.
# - HOMEBREW_TAP_TOKEN is the only long-lived secret; revoke-and-rotate if
#   the tap repo is ever wiped or transferred.

name: Release

on:
  push:
    tags:
      - "v*.*.*"
      # No prerelease/nightly tag matcher here; if we want nightlies later
      # we add a separate workflow with a snapshot build so the release
      # pipeline can stay strict about tagged versions.

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  goreleaser:
    name: GoReleaser · build · sign · publish
    runs-on: ubuntu-latest
    permissions:
      # contents:write — to upload release assets.
      # id-token:write — to mint the OIDC token cosign trades for a Fulcio cert.
      # packages:write — reserved for future GHCR pushes; harmless if unused.
      contents: write
      id-token: write
      packages: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout (with full history for changelog)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          # GoReleaser needs the full history + tags to render the conv-commit
          # changelog and to detect the previous tag.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          cache: true

      - name: Install cosign
        # cosign v3.0.6 pinned via cosign-installer@v4.1.2. The v3 stack is
        # the canonical Sigstore tooling as of 2026-Q2; the new Sigstore
        # protobuf-bundle format (single `.sigstore.json` file containing
        # cert + signature + transparency-log inclusion proof) is the
        # default and only output mode. cosign v3.0.6 explicitly disallows
        # `--new-bundle-format` and `--rfc3161-timestamp` flags (sigstore/
        # cosign#4762) — the new bundle is mandatory; there is no v2-compat
        # opt-out.
        #
        # Why cosign-installer pinned to v4.1.2 (not floating @v4): cosign-
        # installer does not publish a floating @v4 major tag (slice 080
        # iteration 3 confirmed: `Unable to resolve action sigstore/cosign-
        # installer@v4`). Only point releases exist. v4.1.2 is the highest
        # v4.x as of 2026-05-20; dependabot will surface @v4.1.3+ when
        # available.
        #
        # Pairing rationale: cosign-installer@v3 cannot bootstrap cosign
        # v3.x — its bundled trust-anchor `public.key` is for the v2
        # release line and v3.x verification fails with exit 22. v4.1.2
        # is the lowest installer release that knows how to bootstrap a
        # v3.x cosign binary.
        #
        # Args migration (consumer-visible): the `signs:` block in
        # `.goreleaser.yaml` now emits a single `.sigstore.json` bundle
        # instead of `.pem` + `.sig`. The `cosign verify-blob` consumer
        # snippet in the GitHub Release notes header + the Self-verify
        # step below + `docs/RELEASE_READINESS.md §11.1` all migrate to
        # `--bundle <bundle-file>` together. See slice 084 decisions log
        # for the full args-shape rationale.
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: "v3.0.6"

      - name: Install syft (SBOM)
        # SBOM generation is best-effort; not gated by ship-gate but useful
        # for downstream supply-chain consumers. GoReleaser auto-invokes it
        # if present on PATH (current config does not declare sboms: yet —
        # leaving syft installed so a follow-up slice can enable without
        # changing the workflow).
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0
        continue-on-error: true

      - name: Run GoReleaser (validates config then builds + signs + publishes)
        # goreleaser-action installs the CLI to PATH and invokes the requested
        # subcommand. `release --clean` already validates the config before
        # building — no separate `goreleaser check` step is needed (and a
        # pre-install `goreleaser check` would exit 127 because the CLI is
        # only put on PATH by this very action). Removed in slice 080.
        #
        # Pinned to v7.2.2 — v7 added an internal cosign pre-flight verify
        # of the downloaded goreleaser binary; that binary is signed in the
        # new Sigstore protobuf-bundle format which cosign v3.x understands
        # natively. v7.2.2 is the highest v7.x as of 2026-05-20. The
        # cosign-v3 migration was coordinated in slice 084 — see decisions
        # log for the full version-cascade rationale.
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: "~> v2"
          args: release --clean
        env:
          # contents:write token for GH Releases.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with `contents:write` on mgoodric/homebrew-tap. Falls back
          # to GITHUB_TOKEN — which cannot push to a sibling repo, so the
          # brews block is configured with skip_upload: auto for that case.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN || secrets.GITHUB_TOKEN }}
          # COSIGN_EXPERIMENTAL is dropped on the v3 stack — cosign v3
          # makes keyless OIDC + the new bundle format the default and
          # only behavior; the env var is a v1/v2 legacy signal that v3
          # ignores. Removed in slice 084 to avoid documenting intent
          # that the tool no longer honors.
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}

      - name: Self-verify signed checksums
        # Round-trip: download the just-published checksums + bundle from
        # the release we just cut, then cosign-verify them. This is the
        # ANTI-CRITERION guard — if verification ever silently breaks,
        # this step fails and the release is broken-on-arrival rather
        # than broken-in-the-wild. AC-2 evidence.
        #
        # Args migrated to cosign v3 in slice 084: single `.sigstore.json`
        # bundle replaces the legacy `.pem` + `.sig` pair. The
        # `cosign verify-blob --bundle <file>` invocation is the canonical
        # v3 shape; `--new-bundle-format` is disallowed on v3.0.6 (sigstore/
        # cosign#4762) because the new bundle is the only format.
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          base="https://github.com/${GITHUB_REPOSITORY}/releases/download/${tag}"
          checksums="security-atlas_${version}_checksums.txt"
          bundle="${checksums}.sigstore.json"
          curl -fSL "${base}/${checksums}" -o "${checksums}"
          curl -fSL "${base}/${bundle}"    -o "${bundle}"
          cosign verify-blob \
            --certificate-identity-regexp "https://github.com/${GITHUB_REPOSITORY}/\.github/workflows/release\.yml@.*" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --bundle "${bundle}" \
            "${checksums}"
          echo "cosign verify-blob OK for ${checksums}"
