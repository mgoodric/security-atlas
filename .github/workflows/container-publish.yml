name: container-publish

# Two publish channels (slice 207):
#
#   1. Stable channel — triggered by `release: [published]` (i.e. the
#      release-please workflow cuts a `v*.*.*` tag, GoReleaser publishes
#      the GitHub Release, and that event fires this workflow). Builds
#      multi-arch images tagged `vX.Y.Z`, `X.Y`, `X`, and `latest`.
#      Stable images are subsequently cosign-signed via
#      `release.yml`'s signing job (the cosign step lives in the release
#      workflow because keyless OIDC bindings to a workflow identity
#      are stronger when the signing step IS the release).
#
#   2. Edge channel — triggered by `push: branches: [main]` (slice 207).
#      Every merge to `main` after branch-protection's required-checks
#      gate (slice 116) builds the same multi-arch images and tags them
#      `:edge` AND `:main-<sha7>`. Edge images are NOT cosign-signed —
#      the keyless-OIDC supply-chain guarantee is bound to release-cut
#      tag identity by design (release.yml's top-of-file comment block
#      records the rationale). Edge images carry the same provenance
#      attestation + SBOM as stable; the only delta is the absence of
#      the cosign signature.
#
#      Slice 451 RE-CONFIRMED this decision (AC-5): edge / main-<sha7>
#      images stay deliberately UNSIGNED. cosign keyless signatures
#      bind to a stable, human-meaningful identity (a release-cut tag);
#      a per-merge `:main-<sha7>` image is a moving, non-promoted target
#      whose trust anchor is its provenance attestation, not a signature.
#      Signing every main-push image would dilute the meaning of "an
#      atlas signature == a released artifact" without adding assurance
#      a verifier can act on (the attestation already binds builder
#      identity). Rationale recorded in
#      docs/audit-log/451-slsa-provenance-sbom-decisions.md.
#
# The two channels share this one workflow (slice 207 D1 — see
# `docs/audit-log/207-edge-deploy-channel-decisions.md`). The
# docker/metadata-action tag rules below conditionalize on event type
# so a release event produces `vX.Y.Z` tags only and a main push
# produces `:edge` + `:main-<sha7>` only — the two are not interleaved.
#
# ── Native-arch build split (CI email-noise fix) ──────────────────────
# Previously this workflow built `linux/amd64,linux/arm64` in a single
# job on `ubuntu-latest` with QEMU emulation. The arm64 leg ran the
# whole image build (including `next build`, whose SWC native binary is
# Rust) under QEMU user-mode emulation, which intermittently crashed
# with `qemu: uncaught target signal 4 (Illegal instruction)` / SIGILL.
# At ~45 merges/day that structural fragility produced multiple failed-
# build emails per day.
#
# We now build each architecture on its OWN native runner:
#   - linux/amd64 on `ubuntu-latest`
#   - linux/arm64 on `ubuntu-24.04-arm` (GitHub-hosted arm64; free for
#     public repos)
# Each build pushes the per-arch image BY DIGEST (no tag), then a
# `merge` job assembles the multi-arch manifest list with the channel
# tags via `docker buildx imagetools create`. No QEMU anywhere — the
# SIGILL failure class is eliminated and builds are materially faster.
# This is the canonical buildx "distribute across runners" pattern
# (https://docs.docker.com/build/ci/github-actions/multi-platform/).
# Provenance + SBOM + the AC-13 dual-arch manifest assertion are all
# preserved; the attestation now binds the final index digest in the
# merge job rather than a single emulated build's digest.
#
# See docs/audit-log/container-publish-native-arm64-decisions.md.

on:
  release:
    types: [published]
  push:
    branches:
      - main
    # Volume control: docs-only merges (status reconciliations, slice
    # docs, Plans/ canvas edits, READMEs) do not change any image and
    # must not trigger a rebuild. A merge touching docs AND code still
    # builds (paths-ignore only skips when ALL changed paths match).
    # This removes the large `chore(status)` / `docs(slices)` fraction
    # of main-push builds — each was a dice-roll against the build-leg
    # flake rate for zero image delta.
    paths-ignore:
      - "Plans/**"
      - "docs/**"
      - "**/*.md"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (defaults to release tag on release events)"
        required: false
        type: string

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  # Group by event-type AND ref. A release event and a push event for
  # the same SHA may legitimately race during a release-please merge
  # (the merge fires `push: main` and then `release-please` cuts a tag
  # which fires `release: published` — both produce images, both are
  # safe to run in parallel because they tag different namespaces).
  group: container-publish-${{ github.event_name }}-${{ github.ref }}
  # Debounce edge builds: a burst of rapid merges to main collapses to
  # the latest commit (`:edge` always points at HEAD anyway). Release
  # builds are NEVER cancelled — `cancel-in-progress` only evaluates
  # true for `push` events, and release events live in their own group.
  # NOTE: this relaxes slice 207's "every merge builds :main-<sha7>" —
  # a superseded intermediate merge may be cancelled before its
  # `:main-<sha7>` image is published. The trust anchor for edge images
  # is the provenance attestation on the surviving build, not the
  # existence of an image per SHA (slice 451 AC-5). Reversible by
  # removing this expression. See the decisions log.
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  build:
    name: Build ${{ matrix.image.name }} (${{ matrix.platform.arch }})
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: atlas
            dockerfile: deploy/docker/atlas.Dockerfile
            target: ghcr.io/mgoodric/security-atlas
          - name: atlas-cli
            dockerfile: deploy/docker/atlas-cli.Dockerfile
            target: ghcr.io/mgoodric/security-atlas-cli
          - name: web
            dockerfile: deploy/docker/web.Dockerfile
            target: ghcr.io/mgoodric/security-atlas-web
          - name: bootstrap
            dockerfile: deploy/docker/bootstrap.Dockerfile
            target: ghcr.io/mgoodric/security-atlas-bootstrap
        platform:
          - arch: amd64
            os: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            os: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # No QEMU: each arch builds on its own native runner.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute BUILD_TIME (RFC3339 UTC)
        id: buildtime
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Resolve VERSION (release tag, dispatch input, or 'edge')
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            v="${{ github.event.release.tag_name }}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            v="${{ github.event.inputs.tag }}"
          else
            v="edge"
          fi
          echo "value=${v}" >> "$GITHUB_OUTPUT"

      - name: Build + push by digest
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: ${{ matrix.platform.os }}
          # push-by-digest: publish the per-arch image with NO tag; the
          # `merge` job assembles the tagged multi-arch manifest list.
          outputs: type=image,name=${{ matrix.image.target }},push-by-digest=true,name-canonical=true,push=true
          # Slice 092: bake release metadata into the binary AND the OCI
          # image labels. atlas.Dockerfile + atlas-cli.Dockerfile accept
          # ARG VERSION / ARG COMMIT / ARG BUILD_TIME and wire them into
          # ldflags. Images whose Dockerfile doesn't declare these ARGs
          # (web, bootstrap) ignore them with a Docker warning only.
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ steps.buildtime.outputs.value }}
          labels: |
            org.opencontainers.image.title=${{ matrix.image.name }}
            org.opencontainers.image.source=https://github.com/mgoodric/security-atlas
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.description=security-atlas ${{ matrix.image.name }} — open-source GRC platform
            org.opencontainers.image.revision=${{ github.sha }}
          # Cache scoped per image AND arch — the two native runners must
          # not collide on a shared cache key.
          cache-from: type=gha,scope=${{ matrix.image.name }}-${{ matrix.platform.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}-${{ matrix.platform.arch }}
          provenance: true
          sbom: true

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests.${{ matrix.image.name }}.${{ matrix.platform.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge + publish multi-arch manifest (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: atlas
            target: ghcr.io/mgoodric/security-atlas
          - name: atlas-cli
            target: ghcr.io/mgoodric/security-atlas-cli
          - name: web
            target: ghcr.io/mgoodric/security-atlas-web
          - name: bootstrap
            target: ghcr.io/mgoodric/security-atlas-bootstrap
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests.${{ matrix.image.name }}.*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ${{ matrix.image.target }}
          # Slice 207 — tag selection is event-type-conditionalized so
          # release events produce ONLY versioned tags and main pushes
          # produce ONLY edge tags.
          #
          # On release: `vX.Y.Z` + `X.Y` + `X` + `latest`.
          # On push-to-main: `edge` + `main-<sha7>`.
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=raw,value=edge,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=sha,prefix=main-,format=short,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Create multi-arch manifest list
        working-directory: ${{ runner.temp }}/digests
        run: |
          # Assemble one tagged manifest list from the per-arch digests
          # pushed by the `build` job. `imagetools create` takes the
          # `-t <tag>` flags from metadata-action and the source
          # `<target>@sha256:<digest>` references from the digest files.
          # shellcheck disable=SC2046 # intentional word-splitting: -t flags + digest args must expand to argv
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ matrix.image.target }}@sha256:%s ' *)

      - name: Verify multi-arch manifest
        run: |
          PRIMARY_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          echo "Inspecting ${PRIMARY_TAG}"
          docker buildx imagetools inspect "${PRIMARY_TAG}" --raw | tee /tmp/manifest.json
          # AC-13: confirm both linux/amd64 and linux/arm64 are present.
          jq -e '
            [.manifests[].platform | "\(.os)/\(.architecture)"]
            | (contains(["linux/amd64"]) and contains(["linux/arm64"]))
          ' /tmp/manifest.json

      - name: Resolve index digest
        id: digest
        run: |
          PRIMARY_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          d=$(docker buildx imagetools inspect "${PRIMARY_TAG}" --format '{{json .Manifest.Digest}}' | tr -d '"')
          echo "value=${d}" >> "$GITHUB_OUTPUT"

      - name: Attest provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-name: ${{ matrix.image.target }}
          subject-digest: ${{ steps.digest.outputs.value }}
          push-to-registry: true
