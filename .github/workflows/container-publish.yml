name: container-publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (defaults to release tag on release events)"
        required: false
        type: string

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: container-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-publish:
    name: Build + publish multi-arch image (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: atlas
            dockerfile: deploy/docker/atlas.Dockerfile
            target: ghcr.io/mgoodric/security-atlas
          - name: atlas-cli
            dockerfile: deploy/docker/atlas-cli.Dockerfile
            target: ghcr.io/mgoodric/security-atlas-cli
          - name: web
            dockerfile: deploy/docker/web.Dockerfile
            target: ghcr.io/mgoodric/security-atlas-web
          - name: bootstrap
            dockerfile: deploy/docker/bootstrap.Dockerfile
            target: ghcr.io/mgoodric/security-atlas-bootstrap
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: ${{ matrix.image.target }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=${{ matrix.image.name }}
            org.opencontainers.image.source=https://github.com/mgoodric/security-atlas
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.description=security-atlas ${{ matrix.image.name }} — open-source GRC platform

      - name: Compute BUILD_TIME (RFC3339 UTC)
        id: buildtime
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build + push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Slice 092: bake release metadata into the binary AND the OCI
          # image labels. atlas.Dockerfile + atlas-cli.Dockerfile both
          # accept ARG VERSION / ARG COMMIT / ARG BUILD_TIME and wire
          # them into `-ldflags "-X main.version=... -X main.commit=...
          # -X main.date=..."` (see deploy/docker/atlas.Dockerfile lines
          # 39-46). Without these build-args the binary's ldflag
          # defaults win (`dev`, `none`, `unknown`), and every released
          # image reports `version=dev` on `/v1/version`. Images whose
          # Dockerfile doesn't declare these ARGs (web, bootstrap)
          # safely ignore the build-args with a Docker warning only — no
          # change to those images.
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ steps.buildtime.outputs.value }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
          provenance: true
          sbom: true

      - name: Verify multi-arch manifest
        run: |
          PRIMARY_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          echo "Inspecting ${PRIMARY_TAG}"
          docker manifest inspect "${PRIMARY_TAG}" | tee /tmp/manifest.json
          # AC-13: confirm both linux/amd64 and linux/arm64 are present.
          jq -e '
            [.manifests[].platform | "\(.os)/\(.architecture)"]
            | (contains(["linux/amd64"]) and contains(["linux/arm64"]))
          ' /tmp/manifest.json

      - name: Attest provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-name: ${{ matrix.image.target }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
