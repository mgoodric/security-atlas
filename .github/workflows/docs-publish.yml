# Docs publish — security-atlas user documentation (slice 058)
#
# Two jobs:
#   1. build (every PR + every push to main): `mkdocs build --strict`,
#      uploads the rendered site as a workflow artifact. Strict catches
#      broken internal links and missing nav entries. NOT a required
#      status check — docs hygiene is advisory per the slice anti-criterion.
#   2. deploy (only on release tag push, v*.*.*): publishes the artifact
#      to GitHub Pages with least-privilege GITHUB_TOKEN.
#
# Pages must be enabled in repo settings (Settings → Pages → Source:
# GitHub Actions) before the first deploy can land. This is a one-time
# maintainer step out of band of CI.

name: Docs publish

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths:
      - "docs-site/**"
      - ".github/workflows/docs-publish.yml"
  pull_request:
    paths:
      - "docs-site/**"
      - ".github/workflows/docs-publish.yml"
      # Slice 430 — the config-reference drift guard must also fire when
      # the env template or the guard script changes, not only the page.
      - "deploy/docker/.env.example"
      - "scripts/check-config-reference-drift.sh"

# Default permissions are read-only at the workflow level; jobs widen
# only what they need.
permissions:
  contents: read

concurrency:
  group: docs-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (mkdocs --strict)
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout (with full history for git-revision-date plugin)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # mkdocs-git-revision-date-localized-plugin reads each page's
          # last-commit timestamp from git history; shallow clones break
          # the plugin and the --strict build fails.
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Build site (strict)
        run: |
          uv tool run \
            --with-requirements docs-site/requirements.txt \
            --with mkdocs-material \
            --from mkdocs \
            mkdocs build --strict --config-file docs-site/mkdocs.yml

      - name: Upload Pages artifact
        # Only upload on tag push — the deploy job consumes it. We
        # could upload on every run, but a tag-only upload keeps PR
        # builds lightweight (build-and-discard).
        #
        # The path must match where `mkdocs build --config-file
        # docs-site/mkdocs.yml` actually writes its output. mkdocs
        # resolves a relative `site_dir` (default: `site`) relative to
        # the config file's directory, so the rendered site lands at
        # `docs-site/site/`, not workspace-root `site/`. Pointing the
        # artifact at the wrong path was the slice-080 root cause for
        # the failing Pages deploy on every release tag.
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: docs-site/site

  config-drift:
    # Slice 430 — assert docs-site/docs/configuration.md stays in
    # lockstep with deploy/docker/.env.example. Informational (matching
    # this workflow's advisory posture per slice 058): a docs-hygiene
    # failure surfaces loudly on the PR without blocking an unrelated
    # code merge. The guard also runs as `just config-reference-drift-check`.
    name: Config reference drift
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Check config-reference / .env.example drift
        run: bash scripts/check-config-reference-drift.sh

      - name: Run drift-guard self-tests
        run: bash scripts/check-config-reference-drift_test.sh

  deploy:
    name: Deploy to GitHub Pages
    # Tag-only deploy keeps the published site stable: every release
    # ships a docs revision, and intermediate `main` pushes do not.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      # Least-privilege set — exactly what actions/deploy-pages needs.
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
