name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Slice 061 — path-based filtering for docs-only PRs.
#
# Why this pattern (not `paths-ignore:` at workflow `on:` level):
#
# Branch protection (`.github/branch-protection.json`) requires named status
# checks to report success on every PR. If we filtered the workflow itself
# with `paths-ignore:`, docs-only PRs would never trigger the workflow and
# the required check names would stay "Expected — waiting for status to be
# reported" forever — the merge button stays disabled.
#
# Instead, the workflow ALWAYS runs. A `changes` job runs first and uses
# `dorny/paths-filter@v3` to set a `code` boolean output. Each expensive
# job is split into a real job (gated `if: ...code == 'true'`) and a stub
# sibling with the IDENTICAL `name:` (gated `if: ...code != 'true'`). The
# two jobs are mutually exclusive — exactly one runs per PR — and GitHub
# posts a single named check for that job name. Branch protection sees the
# check resolve green on docs-only PRs in < 30 s instead of ~5 min.
#
# Security/secret-scan jobs (CodeQL via `codeql.yml`, GitGuardian via its
# GitHub App, pre-commit below) are intentionally unconditional. Path
# filtering is a cost optimization for build/test/lint, never a security
# exemption.
#
# Full docs: `docs/ci/PATH_FILTERING.md`.

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      code: ${{ steps.filter.outputs.code }}
      # Slice 179 — narrow filter for the schema-removal-age check. The
      # check only runs when a PR touches the canonical
      # `internal/api/schemaregistry/schemas/` tree, so we gate the job
      # on this output instead of the broader `code` output (P0-179-4
      # — the job is NOT required and stays out of branch-protection).
      schemas: ${{ steps.filter.outputs.schemas }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        with:
          # `code: true` if ANY of these patterns match the PR diff (or the
          # push commit on main). Anything else — markdown, plan docs,
          # license, changelog — is `code: false` and the expensive jobs
          # short-circuit via stub-sibling.
          #
          # `schemas: true` if the PR touches the canonical evidence_kind
          # schema directory — slice 179's narrower gate for the
          # schema-removal-age job. Independent of `code` (also matches
          # when present).
          filters: |
            schemas:
              - 'internal/api/schemaregistry/schemas/**'
            code:
              - '**/*.go'
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.py'
              - 'go.mod'
              - 'go.sum'
              - 'go.work'
              - 'go.work.sum'
              - 'package.json'
              - 'package-lock.json'
              - '**/package.json'
              - '**/package-lock.json'
              - 'pnpm-lock.yaml'
              - 'migrations/**'
              - 'sql/**'
              - 'proto/**'
              - 'policies/**'
              - 'schemas/**'
              - 'connectors/**'
              - 'web/**'
              - 'fixtures/**'
              - 'internal/**'
              - 'cmd/**'
              - 'pkg/**'
              - 'oscal-bridge/**'
              - 'gen/**'
              - 'Dockerfile*'
              - '**/Dockerfile'
              - 'docker-compose*.yml'
              - 'deploy/**'
              - '.github/workflows/**'
              - 'justfile'
              - '.golangci.yml'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'atlas.hcl'
              - '.pre-commit-config.yaml'
              - 'buf.yaml'
              - 'buf.gen.yaml'
              - 'scripts/**'

  build-go:
    name: Go · build + test
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          cache: true
      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod
          if [ -f go.sum ]; then git diff --exit-code -- go.sum; fi
      - name: Build all packages
        run: go build ./...
      - name: Run unit tests
        # Slice 279: switched unit run to `-coverpkg=./...` so the unit
        # profile carries the same line-spec universe as the integration
        # profile. This lets the merged-profile coverage gate (in the
        # tests-integration job) compare apples to apples — without this
        # flag, the unit profile only includes lines from packages with
        # tests, and merging produces gaps that the gate would flag as
        # "no profile data".
        run: go test -race -covermode=atomic -coverpkg=./... -coverprofile=coverage.txt ./...
      # Slice 279: the per-package coverage gate moved from this unit
      # job to the tests-integration job, where it runs against the
      # MERGED (unit + integration) profile. The unit profile alone
      # under-counts coverage for packages whose tests are exclusively
      # integration-tagged — the slice 279 audit at
      # docs/coverage-audit-2026-05.md documents the shift. The unit
      # profile is still uploaded as a workflow artifact so the merge
      # step in tests-integration can pull it.
      - name: Upload unit coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.txt
          flags: unittests
          fail_ci_if_error: false
      - name: Upload coverage profile as workflow artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: go-unit-coverage
          path: coverage.txt
          if-no-files-found: warn

  # Slice 061 stub: posts pass under the SAME required-check name
  # (`Go · build + test`) when the PR touches no code. Mutually exclusive
  # with `build-go` above via inverted `if:`.
  build-go-stub:
    name: Go · build + test
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - run: echo "Docs-only change — skipped per dorny/paths-filter@v4 (slice 061)."

  # Slice 695 — build the `atlas` binary ONCE and share it to the three
  # playwright-family jobs (frontend-playwright / -prod-build / ui-honesty),
  # which previously each recompiled the identical `./cmd/atlas` target on
  # the identical ubuntu-latest runner (slice 693 Finding 1.2 / 2.1).
  #
  # Why a dedicated job and NOT a step in `build-go`: gating the playwright
  # jobs on `build-go` (which runs `-race` unit tests, ~7.5 min) serialized
  # them behind that whole job and made `Frontend · Playwright e2e` the PR
  # critical path — a measured ~7-min wall-clock regression (slice 695
  # decisions log D3, run 27581378713). This job does ONLY the atlas compile
  # + upload (~1 min), so the `needs:` wait the playwright jobs inherit is
  # ~1 min instead of ~7.5 min: the dedup's billing win is kept (one host
  # compile shared 3×) WITHOUT the wall-clock regression. It is NOT a
  # required check (absent from branch-protection) and needs no stub twin —
  # it is `if: code == 'true'` like `build-go`, so on docs-only PRs it skips
  # alongside the real playwright jobs (whose stubs then post the checks).
  build-atlas:
    name: Go · build atlas binary (shared)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          cache: true
      - name: Build atlas binary
        run: go build -o atlas ./cmd/atlas
      - name: Upload atlas binary as workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: atlas-binary
          path: atlas
          if-no-files-found: error

  # ====================================================================
  # Slice 417 — sharded integration matrix (Phase A serial + Phase B fan-out).
  #
  # The integration tier was a single serial `-p 1` job over ~89 packages
  # and the merge-queue wall-clock bottleneck (~9-13 min, re-run on every
  # update-branch). Slice 417 SHARDS it ACROSS runners — it does NOT
  # parallelize within one runner (slice 334 settled `-p N` as out of
  # scope; each leg below stays `-p 1`). The parallelism is the matrix:
  # each leg is a separate GHA runner with its OWN Postgres + MinIO + NATS
  # + seed, so two parallel legs cannot race on the shared platform-layer
  # rows (`scf_anchors`, `evidence_kind_schemas`, `evidence_records`) the
  # old `-p 1` serialized — they have separate databases.
  #
  #   * Leg A  — serial, -p 1, the SHARED-SEED / platform-layer cluster
  #              (SCF global catalog seeders + the eval/control consumers
  #              coupled to the freshly-seeded catalog). P0-2 pins the
  #              catalog seeders here. The migration round-trip (slice 297),
  #              the slice-461 order-independence guard, the slice-417
  #              shard-coverage guard, and the slice-393 watermark all run
  #              on Leg A and ONLY on Leg A (AC-12 / AC-10 / AC-6).
  #   * Leg B1/B2/B3 — the tenant-scoped handler families, each on its own
  #              runner, each still `-p 1` internally (AC-4 / P0-4). Their
  #              isolation is the transaction-scoped `SET LOCAL
  #              app.current_tenant` RLS pattern slice 334 documented as the
  #              REAL (non-`-p 1`) isolation mechanism.
  #
  # The package->leg assignment lives in scripts/integration-shards.txt
  # (the source of truth); the run step reads it via run-integration-shard.sh.
  # The slice-417 shard-coverage guard (scripts/check-integration-shard-coverage.sh)
  # proves the union of legs == the integration-tagged package set EXACTLY
  # (no package dropped — T-1), disjoint (no double-run — T-2), and the
  # catalog-seed cluster pinned to Leg A (P0-2). Each leg uploads a distinct
  # coverage artifact; the fan-in `tests-integration` job below merges them
  # with the unit profile and runs the slice-279 gate on the UNION (AC-7),
  # then reports the SINGLE required check `Go · integration (Postgres RLS)`
  # (AC-11) — green only when every leg passed. Branch-protection contexts
  # are UNCHANGED: the per-leg `Go · integration (shard ...)` checks are NOT
  # required; the fan-in keeps the original required name.
  #
  # Local reproducer (one leg):
  #   SHARD_MANIFEST=scripts/integration-shards.txt \
  #     scripts/run-integration-shard.sh A /tmp/cov-A.txt
  # Full serial reproducer (unchanged):
  #   go test -tags=integration -race -p 1 ./internal/...
  # ====================================================================
  tests-integration-shard:
    name: Go · integration (shard ${{ matrix.leg }})
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Slice 747: added B4 + B5. The leg labels here MUST match column 1 of
        # scripts/integration-shards.txt; run-integration-shard.sh reads each
        # leg's packages from that manifest. Adding a leg here is a new MATRIX
        # job, NOT a new required-status-checks context — the required check is
        # the aggregate `Go · integration (Postgres RLS)` fan-in below (which
        # `needs:` this whole matrix), so no branch-protection change is needed
        # (slice 417 AC-11 / slice 747 AC-3).
        leg: [A, B1, B2, B3, B4, B5]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: security_atlas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      # Slice 036 MinIO is started as a workflow step below rather than a
      # `services:` entry because GitHub Actions service containers do not
      # support a `command` / args override, and the official
      # `minio/minio` image needs `server /data` passed explicitly. Started
      # via `docker run` in the `Start MinIO` step.
      #
      # Slice 015 NATS JetStream follows the same pattern (the `nats`
      # image needs `-js -sd /data` passed explicitly). Started via
      # `docker run` in the `Start NATS JetStream` step.
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/security_atlas?sslmode=disable
      # The app role's password is set by a step below from a workflow-scoped
      # value, then injected into DATABASE_URL_APP for the test step.
      ATLAS_APP_PASSWORD: ${{ secrets.CI_ATLAS_APP_PASSWORD || 'ci-ephemeral' }}
      # Slice 036 — MinIO endpoint reachable from the runner.
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_BUCKET: atlas-artifacts-test
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      # Slice 015 — NATS JetStream endpoint reachable from the runner.
      NATS_URL: nats://localhost:4222
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          cache: true
      - name: Install cosign
        # Slice 413: the internal/oscal/cosign integration tests exercise
        # the real `cosign sign-blob`/`verify-blob` exec boundary (ADR-0010
        # Phase 1, Mode A). Pinned to the same cosign-installer + cosign
        # v3.0.6 the release-signing job uses (.github/workflows/release.yml),
        # so the OSCAL-bundle signing tests and release signing track one
        # cosign version. Absent this step the cosign integration tests
        # self-skip (binary not on PATH) — installing it makes them run and
        # keeps the internal/oscal/cosign coverage floor honest.
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: "v3.0.6"
      - name: Start LocalStack KMS (slice 425 — OPTIONAL, leg B3 only)
        # Slice 425: the internal/oscal/cosign LocalStack round-trip test
        # (cosign_kms_localstack_integration_test.go) drives the REAL
        # `cosign sign-blob --key awskms://...` -> `verify-blob` path
        # (signblob.go) against a hermetic LocalStack KMS sandbox — the
        # path the slice-413 local-key stand-in cannot reach. LocalStack is
        # an OPTIONAL dependency: only leg B3 (which owns
        # ./internal/oscal/cosign/... per scripts/integration-shards.txt)
        # starts it, and the test is opt-in behind
        # ATLAS_COSIGN_KMS_LOCALSTACK (set below for this leg only). When
        # this step is absent (the other legs) the test t.Skips — the
        # `Go · integration` job stays green either way (P0-425-1).
        #
        # Started via `docker run` (NOT a `services:` block) following the
        # project's non-default-CMD optional-service convention (MinIO /
        # NATS): we pin a community-edition tag and scope SERVICES=kms so
        # the image needs no LocalStack license. The aws CLI used to create
        # the ephemeral signing key is preinstalled on the GitHub-hosted
        # ubuntu runner.
        if: matrix.leg == 'B3'
        run: |
          docker run -d --name localstack \
            -p 4566:4566 \
            -e SERVICES=kms \
            -e EAGER_SERVICE_LOADING=1 \
            localstack/localstack:3.8
          # Wait for the KMS service to report available (up to ~60s).
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4566/_localstack/health | grep -q '"kms": "\(available\|running\)"'; then
              echo "localstack kms ready"; break
            fi
            sleep 2
          done
      - name: Enable LocalStack KMS round-trip test (slice 425 — leg B3 only)
        # Gate the opt-in env so the LocalStack-backed test runs ONLY on the
        # leg where LocalStack is up. On every other leg these are unset and
        # the test t.Skips. Credentials are LocalStack dummy values (the
        # access key is "test"; LocalStack accepts any non-empty secret) —
        # no real key material, GitGuardian-safe (P0-425-3 / AC-7).
        if: matrix.leg == 'B3'
        run: |
          {
            echo "ATLAS_COSIGN_KMS_LOCALSTACK=1"
            echo "ATLAS_COSIGN_KMS_LOCALSTACK_ENDPOINT=http://localhost:4566"
          } >> "$GITHUB_ENV"
      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          # Wait for readiness (up to ~60s).
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live; then
              echo "minio ready"; break
            fi
            sleep 2
          done
          # Create the test bucket using a short-lived mc container. The
          # MinIO admin client (`mc`) is the canonical bucket-bootstrap
          # tool. We inject the alias via the MC_HOST_<alias> env var so
          # the single `mc mb` invocation has the alias without needing a
          # separate `mc alias set` call (which would write config to
          # ~/.mc/ that doesn't persist across `docker run` invocations).
          docker run --rm --network host \
            -e MC_HOST_local=http://minioadmin:minioadmin@localhost:9000 \
            minio/mc mb -p local/atlas-artifacts-test
      - name: Start NATS JetStream
        run: |
          docker run -d --name nats \
            -p 4222:4222 \
            -p 8222:8222 \
            nats:2.10-alpine -js -sd /data --http_port 8222
          # Wait for readiness via the monitoring endpoint (up to ~60s).
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8222/healthz; then
              echo "nats ready"; break
            fi
            sleep 2
          done
      - name: Bootstrap roles
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f migrations/bootstrap/01-roles.sql
      - name: Set role passwords (CI-scoped)
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 \
            -c "ALTER ROLE atlas_app PASSWORD '$ATLAS_APP_PASSWORD'"
          echo "DATABASE_URL_APP=postgres://atlas_app:$ATLAS_APP_PASSWORD@localhost:5432/security_atlas?sslmode=disable" >> "$GITHUB_ENV"
      - name: Apply forward migrations
        run: |
          for f in migrations/sql/*.sql; do
            case "$f" in
              *.down.sql) ;;
              *) echo "applying $f"; psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f" ;;
            esac
          done
      - name: Audit RLS coverage (slice 033)
        # Constitutional invariant 6: every tenant-scoped table must carry
        # an RLS policy + FORCE. Audit runs against atlas_migrate (DATABASE_URL)
        # so pg_catalog reads are not RLS-filtered. See scripts/audit-rls.sh
        # and docs/architecture/rls.md.
        run: ./scripts/audit-rls.sh
      - name: Run integration shard (-p 1 within the leg)
        # Slice 417: run ONLY this leg's packages, read from the source of
        # truth scripts/integration-shards.txt via run-integration-shard.sh.
        # `-p 1` is ALWAYS passed (the helper hard-codes it): the parallelism
        # is ACROSS the matrix legs (each a separate runner with its own
        # Postgres), never `-p N` within a runner (P0-4 / AC-4). slice 334's
        # `-p 1` rationale is preserved per-leg.
        #
        # Why -p 1 stays load-bearing per leg: within a single leg's DB,
        # multiple test binaries could still race on platform-layer rows
        # (`scf_anchors` [no tenant_id], the catalog rows of
        # `evidence_kind_schemas`, the append-only `evidence_records`
        # ledger). `-p 1` serializes the binaries so they cannot. Across
        # legs there is no race: each leg has its OWN database, and P0-2
        # pins the catalog SEEDERS to Leg A so no two parallel legs seed
        # the global catalog (slice 417 threat T-2). The tenant-scoped
        # isolation that protects the Phase B legs is the transaction-scoped
        # `SET LOCAL app.current_tenant` RLS pattern (slice 334), which
        # `-p 1` was never the mechanism for.
        #
        # Slice-by-slice enrolment history for the package list:
        # see docs/ci/integration-job-history.md and the shard-assignment
        # rationale in docs/ci/integration-shards.md.
        run: |
          # Slice 393 (Q-8): bookend the leg with a wall-clock measurement
          # so the clean-main watermark step (Leg A only) can RECORD the
          # critical-path leg's elapsed time rather than re-running anything.
          atlas_wallclock_start="$(date +%s)"
          echo "ATLAS_WALLCLOCK_START=${atlas_wallclock_start}" >> "$GITHUB_ENV"
          GO_TEST_EXTRA="-race" \
            bash scripts/run-integration-shard.sh "${{ matrix.leg }}" coverage.txt
      # Slice 461: order-independence guard. The main run above uses the
      # manifest's CURATED package order (scfimport/anchors first on Leg A).
      # This step re-runs the catalog-sensitive packages in a deliberately
      # NON-curated (alphabetical) order against a freshly-truncated catalog
      # and asserts green. It catches the reintroduction of an order-coupled
      # SCF-seed guard — the silent-reorder fragility slice 461 closes. The
      # catalog-sensitive packages all live on Leg A (P0-2), so this guard
      # runs on Leg A only, where the catalog is seeded.
      - name: Assert SCF-seed order-independence (slice 461)
        if: matrix.leg == 'A'
        run: bash scripts/check-integration-seed-order-independence.sh
      # Slice 417 AC-6 / P0-1: the shard-coverage completeness guard. Proves
      # the union of all legs' packages == the integration-tagged set EXACTLY
      # (no package dropped — T-1), disjoint (no double-run — T-2), and the
      # catalog-seed cluster pinned to Leg A (P0-2). Pure file analysis — no
      # DB — so it runs once, on Leg A.
      - name: Assert shard-coverage union completeness (slice 417)
        if: matrix.leg == 'A'
        run: bash scripts/check-integration-shard-coverage.sh
      - name: Upload integration coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.txt
          flags: integration
          fail_ci_if_error: false
      # Slice 417 AC-5: each shard uploads its coverage profile under a
      # DISTINCT artifact name so the fan-in job can merge all legs.
      - name: Upload this shard's integration coverage profile
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: go-integration-coverage-${{ matrix.leg }}
          path: coverage.txt
          if-no-files-found: warn
      # ================================================================
      # Slice 393 (Q-8) — integration wall-clock watermark, clean-main only.
      #
      # RECORDER, not a gate (P0-393-3 / slice 353 D6). Slice 417 AC-10:
      # the watermark now measures the CRITICAL-PATH leg (the slowest of
      # Leg A / B1 / B2 / B3) rather than the old serial total, so the
      # 20-min trip-wire reflects real merge-blocking latency. We record
      # one row per leg on clean main (each leg stamps its matrix.leg in
      # the SHA column); the slowest leg is the critical path and the
      # trip-wire fires off whichever leg crosses it. This is a faithful
      # per-leg sample series — the analysis (max across legs) is done when
      # reading docs/integration-wallclock.tsv, not at write time, matching
      # the slice-393 "recorder not gate" posture.
      #
      # Gated to clean main (event push + ref main) so the watermark is a
      # single authoritative series, not one row per PR re-run.
      #
      # Local repro: WALLCLOCK_SECONDS=900 bash scripts/measure-integration-wallclock.sh
      #   self-test: bash scripts/measure-integration-wallclock_test.sh
      # See slice 353 (Q-8) + slice 393 + slice 417 AC-10.
      # ================================================================
      - name: Record integration wall-clock watermark (slice 393 Q-8 / 417 AC-10)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          end="$(date +%s)"
          seconds=$(( end - ATLAS_WALLCLOCK_START ))
          # Stamp the leg into the SHA column so the per-leg series is
          # distinguishable and the critical-path (max) leg is readable.
          WALLCLOCK_SHA="$(git rev-parse --short HEAD)-shard-${{ matrix.leg }}" \
            WALLCLOCK_SECONDS="$seconds" bash scripts/measure-integration-wallclock.sh
      # Slice 417 AC-12: the migration round-trip runs EXACTLY ONCE (Leg A),
      # not redundantly per shard.
      - name: Migration round-trip — down then up
        if: matrix.leg == 'A'
        run: |
          # Slice 297: TRUNCATE all data tables before the round-trip
          # so the down migrations cast pure schema, not data. The
          # integration tests above seed real rows (e.g. policies with
          # version="1.0.0" semver strings) that the slice-022
          # policies.down.sql `ALTER COLUMN version TYPE INTEGER USING
          # version::INTEGER` cannot back-cast. The down migration's
          # intent was always "schema only" — the truncate makes that
          # explicit.
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          DECLARE r record;
          BEGIN
            FOR r IN
              SELECT tablename FROM pg_tables
              WHERE schemaname = 'public'
                AND tablename NOT IN ('schema_migrations', 'atlas_schema_revisions')
            LOOP
              EXECUTE format('TRUNCATE TABLE public.%I CASCADE', r.tablename);
            END LOOP;
          END $$;
          SQL
          # Walk down migrations in reverse-alphabetical order (latest down first).
          for f in $(ls -r migrations/sql/*.down.sql); do
            echo "rolling back $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
          remaining_tables=$(psql "$DATABASE_URL" -t -A -c "SELECT count(*) FROM pg_class WHERE relnamespace = 'public'::regnamespace AND relkind = 'r'")
          remaining_types=$(psql "$DATABASE_URL" -t -A -c "SELECT count(*) FROM pg_type WHERE typnamespace = 'public'::regnamespace AND typtype = 'e'")
          if [ "$remaining_tables" != "0" ] || [ "$remaining_types" != "0" ]; then
            echo "down migrations left $remaining_tables tables + $remaining_types enums"
            exit 1
          fi
          # Re-apply forwards to prove up→down→up cleanliness.
          for f in migrations/sql/*.sql; do
            case "$f" in
              *.down.sql) ;;
              *) echo "re-applying $f"; psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f" ;;
            esac
          done

  # ====================================================================
  # Slice 417 — integration fan-in (the SINGLE required check, AC-11).
  #
  # `needs:` every shard leg + build-go. Reports the required status
  # `Go · integration (Postgres RLS)` — UNCHANGED branch-protection name
  # (AC-11): the per-leg `Go · integration (shard ...)` checks are NOT in
  # the contexts list, so branch protection still gates on this one name.
  #
  # GREEN ONLY WHEN ALL LEGS PASS: the explicit `result != 'success'`
  # check below fails this job if any shard failed/was cancelled, so a fail
  # on any leg fails the required check (a `needs:` on a matrix job already
  # blocks the fan-in if a leg fails, but `if: always()` is required to run
  # the COVERAGE MERGE even on a leg failure — so we re-assert the leg
  # result explicitly to keep "any leg red ⇒ required check red").
  #
  # COVERAGE MERGE (AC-7 / P0-3 / T-3): download the unit profile + every
  # leg's integration profile, merge ALL of them with gocovmerge into the
  # single profile the slice-279 gate reads. The gate runs on the UNION,
  # never a single leg's fragment — otherwise package floors evaluate
  # against partial data (slice 417 threat T-3). Floors are NOT lifted by
  # this slice (slice 279 ratchet is monotonic; P0-3).
  # ====================================================================
  tests-integration:
    name: Go · integration (Postgres RLS)
    needs: [changes, build-go, tests-integration-shard]
    if: always() && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      # AC-11: any shard failure (or cancellation) fails this required
      # check. The matrix uses fail-fast: false so every leg reports, but
      # the required check must be RED if any leg is RED.
      - name: Require every integration shard to have passed
        if: needs.tests-integration-shard.result != 'success'
        run: |
          echo "One or more integration shards did not succeed: result=${{ needs.tests-integration-shard.result }}" >&2
          echo "The required check 'Go · integration (Postgres RLS)' is RED because a shard leg failed." >&2
          exit 1

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          cache: true
      # Slice 279 — the unit-coverage artifact (uploaded by build-go).
      - name: Download unit coverage artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4.1.8
        with:
          name: go-unit-coverage
          path: /tmp/cov/unit
        continue-on-error: true
      # Slice 417 AC-7 — every shard's integration profile. download-artifact
      # with a name pattern + merge-multiple pulls all four leg artifacts
      # (go-integration-coverage-A / -B1 / -B2 / -B3) into one directory.
      - name: Download all integration shard coverage profiles
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4.1.8
        with:
          pattern: go-integration-coverage-*
          path: /tmp/cov/shards
          merge-multiple: false
        continue-on-error: true
      - name: Install gocovmerge
        run: go install github.com/wadey/gocovmerge@b5bfa59ec0adc420475f97f89b58045c721d761c
      # Slice 417 AC-7 / P0-3 — merge unit + EVERY leg's integration profile
      # into the single merged profile the slice-279 gate consumes. The gate
      # MUST see the union; a single leg's fragment under-counts (T-3).
      - name: Merge unit + all shard integration coverage profiles
        run: |
          set -euo pipefail
          profiles=()
          if [ -f /tmp/cov/unit/coverage.txt ]; then
            profiles+=(/tmp/cov/unit/coverage.txt)
            echo "found unit profile"
          else
            echo "WARNING: no unit-coverage artifact (build-go skipped?)"
          fi
          # Each shard artifact is a directory go-integration-coverage-<leg>/
          # containing coverage.txt.
          shopt -s nullglob
          for p in /tmp/cov/shards/go-integration-coverage-*/coverage.txt; do
            profiles+=("$p")
            echo "found shard profile: $p"
          done
          if [ "${#profiles[@]}" -eq 0 ]; then
            echo "no coverage profiles found to merge" >&2
            exit 1
          fi
          gocovmerge "${profiles[@]}" > merged-coverage.txt
          echo "merged ${#profiles[@]} profile(s):"
          wc -l "${profiles[@]}" merged-coverage.txt
      - name: Go · merged coverage gate (slice 279)
        run: go run ./cmd/scripts/coverage-gate -profile=merged-coverage.txt
      - name: Upload merged coverage profile as workflow artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: go-merged-coverage
          path: merged-coverage.txt
          if-no-files-found: warn

  tests-integration-stub:
    name: Go · integration (Postgres RLS)
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - run: echo "Docs-only change — skipped per dorny/paths-filter@v4 (slice 061)."

  lint-go:
    name: Go · lint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          cache: true
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          # Pinned golangci-lint binary version (slice 416). `Go · lint` is a
          # required check; a floating `version: latest` lets an upstream
          # release change what the gate enforces on the next CI run with no
          # review (same failure class as slice 090's govulncheck@latest red-
          # wall). This pin MUST stay in sync with the `GOLANGCI_VERSION` pin
          # in the justfile so local `just lint-go` and CI lint agree. Bump
          # both in a dedicated `chore(golangci):` slice so the new analyzer
          # set lands as an auditable diff — never as a surprise red check on
          # an unrelated PR (mirrors the SQLC_VERSION bump convention).
          version: v2.12.2

      # Slice 367 — CWE-209 errleak check. Rejects new code reflecting
      # err.Error() into 5xx JSON response bodies. Background: slice 327
      # audit finding M-2 (`docs/audits/327-...-report.md`). The
      # analyzer lives at cmd/scripts/errleak-lint and is invoked as a
      # plain `go run` so it runs on the same setup-go cache as the
      # golangci-lint step above. A hit exits 3 and fails the CI check.
      - name: Go · errleak (slice 367 CWE-209 guard)
        run: go run ./cmd/scripts/errleak-lint ./internal/api/...

      # Slice 369 — H-1 helper-consolidation regression guard. Rejects new
      # package-local writeJSON / writeError / writeServerErr free-function
      # declarations in internal/api/* (mirror of the slice-367 errleak
      # analyzer). The analyzer lives at cmd/scripts/duphelper-lint and is
      # invoked as a plain `go run` so it runs on the same setup-go cache as
      # the steps above. A hit exits 3 and fails the CI check. Wired here per
      # slice 391 (slice 369 AC-4 deferred to avoid a batch-164 ci.yml collision).
      - name: Go · duphelper (slice 369 H-1 guard)
        run: go run ./cmd/scripts/duphelper-lint ./internal/api/...

  lint-go-stub:
    name: Go · lint
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - run: echo "Docs-only change — skipped per dorny/paths-filter@v4 (slice 061)."

  # Slice 421 — bounded native-fuzz pass over the untrusted-input parsers.
  # Each target is fuzzed for a SHORT, capped -fuzztime so the harness can
  # never DoS the runner (P0-421-2) and adds only a small, fixed wall-clock
  # to PRs that touch code. This is a regression-catching pass, NOT a deep
  # fuzz campaign (those are a maintainer/local activity). A crasher fails
  # the job and the engine writes the minimizing entry to testdata/fuzz/
  # (committed as a corpus seed; the fix is a spillover slice — AC-9).
  fuzz:
    name: Go · fuzz (bounded)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          cache: true
      - name: Bounded fuzz pass (20s per target)
        # FUZZTIME caps each target. Keep it tight: this is a regression
        # gate, not a campaign. Targets run one package at a time because
        # `go test -fuzz` accepts a single package per invocation.
        env:
          FUZZTIME: 20s
        run: |
          set -euo pipefail
          run_fuzz() {
            echo "::group::fuzz $2 ($1)"
            go test -run='^$' -fuzz="^$2\$" -fuzztime="$FUZZTIME" "$1"
            echo "::endgroup::"
          }
          run_fuzz ./internal/oscal/ FuzzReadBundle
          run_fuzz ./internal/api/scfimport/ FuzzLoad
          run_fuzz ./internal/api/schemaregistry/ FuzzParseSemver
          run_fuzz ./connectors/manual/internal/manualcsv/ FuzzParse
          run_fuzz ./internal/questionnaire/ FuzzParseExcel
      - name: Upload any discovered crashers
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fuzz-crashers
          path: "**/testdata/fuzz/**"
          if-no-files-found: ignore

  # Slice 421 stub: posts pass under the SAME check name (`Go · fuzz
  # (bounded)`) when the PR touches no code. Mutually exclusive with `fuzz`
  # above via inverted `if:` (mirrors the slice 061 stub-sibling pattern).
  fuzz-stub:
    name: Go · fuzz (bounded)
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - run: echo "Docs-only change — skipped per dorny/paths-filter@v4 (slice 061)."

  proto:
    name: Proto · lint + generate diff
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1
        with:
          setup_only: true
      - name: Lint protos
        run: buf lint
      - name: Generate Go bindings + assert no diff
        run: |
          buf generate
          git diff --exit-code -- gen/proto || (echo "gen/proto changed; run 'just proto-generate' locally and commit" && exit 1)

  proto-stub:
    name: Proto · lint + generate diff
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
