name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-go:
    name: Go · build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod
          if [ -f go.sum ]; then git diff --exit-code -- go.sum; fi
      - name: Build all packages
        run: go build ./...
      - name: Run tests
        run: go test -race ./...

  lint-go:
    name: Go · lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61

  build-frontend:
    name: Frontend · install + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install workspaces
        run: npm install --no-audit --no-fund
      - name: Build web workspace
        run: npm run build --workspace @security-atlas/web --if-present
      - name: Build sdk-typescript workspace
        run: npm run build --workspace @security-atlas/sdk --if-present

  lint-python:
    name: Python · ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff==0.7.0
      - run: ruff check .
      - run: ruff format --check .

  precommit:
    name: pre-commit · all hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: pip install pre-commit==3.8.0
      - name: Validate config
        run: pre-commit validate-config
      - name: Run all hooks against all files
        run: pre-commit run --all-files --show-diff-on-failure
