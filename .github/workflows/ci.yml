          disable-sudo: true

      - run: echo "Docs-only change — skipped per dorny/paths-filter@v4 (slice 061)."

  # Slice 061: pre-commit is INTENTIONALLY unconditional. It auto-formats
  # markdown (prettier) and YAML; we want it to run on docs-only PRs so
  # formatting nits never slip through. ~30 s on a docs PR is acceptable.
  precommit:
    name: pre-commit · all hooks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.11"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"
      # Slice 693 — cache the pre-commit hook environments (the dominant
      # cost of this job: pre-commit creates a venv/node_env per hook repo
      # on a cold run). Keyed on the config hash so a hook-rev bump busts
      # it; restore-keys lets an unchanged-config run reuse the prior env.
      - name: Cache pre-commit hook environments
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-
      - run: pip install pre-commit==3.8.0
      # Slice 158: install actionlint so the slice-158 pre-commit hook
      # has its binary on PATH. Pinned to a tag (not a SHA) because the
      # download URL is a redirector and we use the install-script
      # checksum on the GitHub releases page. Slice-128's SHA-pin
      # discipline applies to `uses:` lines (action references), not
      # to ad-hoc tool downloads in `run:` blocks.
      #
      # Installs to `$HOME/.local/bin` (added to GITHUB_PATH) — no
      # sudo required. Slice 117 sets `disable-sudo: true` on every
      # job; binaries that need root-owned install paths break that
      # invariant.
      - name: Install actionlint
        run: |
          # actionlint v1.7.12 — matches the local-dev version used to
          # validate slice 158's workflow changes.
          mkdir -p "$HOME/.local/bin"
          cd "$HOME/.local/bin"
          bash <(curl -fsSL --retry 3 https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash) 1.7.12
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/actionlint" -version
      - name: Validate config
        run: pre-commit validate-config
      - name: Run all hooks against all files
        # Slice 698 — skip the language-format hooks that DEDICATED jobs already
        # enforce, so this job owns only the hooks no other job covers
        # (trailing-whitespace, end-of-file-fixer, check-yaml/json/toml,
        # detect-private-key, detect-aws-credentials, mixed-line-ending,
        # actionlint, cache-path-guard, prettier). Verified coverage:
        #   gofmt       → `Go · lint` golangci-lint v2 enforces the gofmt +
        #                 goimports formatters (.golangci.yml formatters block).
        #   ruff        → `Python · ruff` runs `ruff check .` (whole-repo lint).
        #   ruff-format → `Python · ruff` runs `ruff format --check .` (whole-repo).
        # prettier is NOT skipped: no dedicated job runs prettier over the
        # precommit hook's file set (root markdown/YAML/JSON + web TS/TSX
        # formatting). `Frontend · lint` is web-scoped and runs eslint only.
        # Secret-detection + structural hooks are NEVER skipped (GitGuardian is
        # a backstop, not a replacement). The LOCAL .pre-commit-config.yaml is
        # unchanged — full enforcement on developer machines. (Slice 693 Finding 6A.)
        env:
          SKIP: gofmt,ruff,ruff-format
        run: pre-commit run --all-files --show-diff-on-failure
      # Slice 158 AC-17: smoke test asserts actionlint actually flags
      # the invalid `administration: read` scope. Runs AFTER the
      # pre-commit suite so an actionlint regression on the fixture is
      # visible as its own named step in the workflow log.
      - name: Slice 158 actionlint fixture smoke test
        run: bash scripts/check-actionlint-fixture.sh

  # ===========================================================================
  # Slice 030 — OSCAL bridge (Python). Self-contained job block: lints +
  # tests the oscal-bridge/ Python service (compliance-trestle + gRPC).
  # Kept as a clearly-delimited append so parallel branches editing this
  # file (e.g. slice 065's test-self-host-bundle job) rebase cleanly.
  # Gated on `changes.code` like the other expensive jobs, with a
  # mutually-exclusive stub sibling under the same check name.
  # ===========================================================================
  oscal-bridge:
    name: OSCAL bridge · Python (ruff + pytest)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: oscal-bridge/uv.lock
      - name: Set up Python
        run: uv python install 3.11
      - name: Sync oscal-bridge env
        working-directory: oscal-bridge
        run: uv sync --extra test
      - name: Lint (ruff)
        run: |
          uv tool run ruff@0.7.0 check oscal-bridge
          uv tool run ruff@0.7.0 format --check oscal-bridge
      - name: Test (pytest — unit + in-process gRPC server)
        working-directory: oscal-bridge
        run: PYTHONPATH=. uv run --extra test python -m pytest tests/ -q

  oscal-bridge-stub:
    name: OSCAL bridge · Python (ruff + pytest)
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - run: echo "Docs-only change — skipped per dorny/paths-filter@v4 (slice 061)."

  # ====================================================================
  # Slice 065 — self-host bundle end-to-end test.
  #
  # This block is appended as a self-contained job so it rebase-merges
  # cleanly alongside other in-flight ci.yml edits. It brings the
  # docker-compose self-host bundle up against a fresh checkout in TWO
  # deploy shapes and asserts the slice-037 acceptance criteria actually
  # pass — covering slice 065 AC-7 (bootstrap idempotency on re-run),
  # AC-9 (bootstrap against a non-superuser / shared Postgres) and AC-12
  # (end-to-end install in both deploy shapes). The assertion logic lives
  # in deploy/docker/test-self-host-bundle.sh; this job just runs it once
  # per matrix mode.
  #
  # Gated on the same `changes.code` path filter as the other expensive
  # jobs (deploy/** and migrations/** are both in the filter, so any PR
  # that touches the bundle runs this). No slice-061 stub sibling: the
  # job uses a `matrix`, so GitHub posts per-mode check names
  # (`... (bundled)` / `... (external)`) that a single-name stub could
  # not mirror, and this job is intentionally NOT yet in
  # .github/branch-protection.json's required-checks list — so a
  # docs-only PR simply skips it with no "waiting for status" hang.
  # Promote it to a required check (and add the matrix-named stubs) in a
  # follow-up once it has a few green runs.
  # ====================================================================
  test-self-host-bundle:
    name: Self-host bundle · end-to-end
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Slice 470: `proxy` mode fronts atlas with a header-overwriting
        # nginx (docker-compose.proxy.yml overlay) and proves slice 466's
        # TRUSTED_PROXY_CIDRS X-Forwarded-For walk end-to-end across a real
        # multi-container topology (AC-2 honour proxy IP / AC-3 reject forged).
        #
        # Slice 473: `migrate` mode reproduces the 2026-06-05 migrate-on-
        # upgrade incident — it brings the bundle up at migration set N,
        # writes a brand-new sentinel migration (simulating a newer image's
        # migration set), re-runs the always-run atlas-migrate service, and
        # asserts the new migration applied AND the backend served only
        # after migrate completed (the service_completed_successfully gate
        # held), AND a second migrate run is an idempotent no-reseed no-op.
        mode: [bundled, external, proxy, migrate]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run self-host bundle smoke test (${{ matrix.mode }})
        run: deploy/docker/test-self-host-bundle.sh ${{ matrix.mode }}
      - name: Dump compose logs on failure
        if: failure()
        run: |
          # docker-compose.yml uses `${VAR:?}` required-variable guards
          # (POSTGRES_PASSWORD, MINIO_ROOT_USER, ...), so a bare
          # `docker compose ... logs` aborts with "required variable ...
          # is missing a value" before printing anything — `--env-file`
          # is required even for `logs`.
          #
          # The harness's own `cleanup()` EXIT trap `rm -f`s
          # deploy/docker/.env.test, so by the time this failure step
          # runs that file is GONE — we cannot point `--env-file` at it.
          # The values do not matter for `logs` (compose only needs the
          # guards satisfied to parse the file), so write a throwaway
          # stub env file here and use that.
          cat > /tmp/compose-logs.env <<'STUB'
          POSTGRES_PASSWORD=x
          ATLAS_APP_PASSWORD=x
          MINIO_ROOT_USER=x
          MINIO_ROOT_PASSWORD=x
          BEARER_HASH_KEY=x
          ATLAS_BOOTSTRAP_TOKEN=x
          ATLAS_DEFAULT_USER_PASSWORD=x
          DATABASE_URL_APP=x
          DATABASE_URL_MIGRATE=x
          STUB
          # Slice 470: proxy mode layers the reverse-proxy overlay, so the
          # logs dump must include the same -f files the harness used or the
          # `proxy` service's logs (and the atlasnet network) are invisible.
          # Build the -f list as an array so the overlay flag is not an
          # unquoted word-split (shellcheck SC2086).
          COMPOSE_FILES=(-f deploy/docker/docker-compose.yml)
          if [ "${{ matrix.mode }}" = "proxy" ]; then
            COMPOSE_FILES+=(-f deploy/docker/docker-compose.proxy.yml)
            echo "TRUSTED_PROXY_CIDRS=x" >> /tmp/compose-logs.env
          fi
          docker compose "${COMPOSE_FILES[@]}" \
            --env-file /tmp/compose-logs.env \
            -p "sa-selfhost-${{ matrix.mode }}" logs || true

  # Slice 061 stub: posts pass under the SAME check name
  # (`Self-host bundle · end-to-end`) when the PR touches no code.
  # Mutually exclusive with `test-self-host-bundle` above via inverted
  # `if:`. The real job uses a matrix that produces `(bundled)` and
  # `(external)` expansions when it runs; the stub posts the base name
  # only — sufficient because this check is non-required and the only
  # purpose of the stub is to keep the rollup green on docs-only PRs.
  test-self-host-bundle-stub:
    name: Self-host bundle · end-to-end
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - run: echo "Docs-only change — skipped per dorny/paths-filter@v4 (slice 061)."

  # ====================================================================
  # Slice 038 — Helm chart lint + template.
  #
  # Self-contained job block (appended like the slice-030 / slice-065
  # blocks above) so parallel branches editing ci.yml rebase cleanly.
  # Runs `helm lint` + `helm template` against deploy/helm/ with BOTH the
  # solo defaults and values-production.yaml, asserting the chart renders
  # valid manifests in both shapes. This is slice 038 AC-5.
  #
  # Gated on the same `changes.code` path filter as the other expensive
  # jobs (`deploy/**` is in the filter, so any PR touching the chart runs
  # this) with a mutually-exclusive stub sibling under the same check
  # name (slice-061 pattern), so docs-only PRs resolve the check in < 30s.
  #
  # NOT yet in .github/branch-protection.json's required-checks list —
  # like slice 065's `test-self-host-bundle`, it ships non-required and is
  # promoted to a required check after a few green runs.
  # ====================================================================
  helm-lint:
    name: Helm chart · lint + template
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5
        with:
          version: v3.16.2
      - name: helm lint (default values)
        run: helm lint deploy/helm
      - name: helm lint (production values)
        run: helm lint deploy/helm -f deploy/helm/values-production.yaml
      - name: helm template (default values)
        run: helm template ci-default deploy/helm > /dev/null
      - name: helm template (production values)
        run: helm template ci-prod deploy/helm -f deploy/helm/values-production.yaml > /dev/null

  helm-lint-stub:
    name: Helm chart · lint + template
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - run: echo "Docs-only change — skipped per dorny/paths-filter@v4 (slice 061)."

  # ====================================================================
  # Slice 069 — Frontend vitest.
  #
  # Self-contained job block (appended like slice-030 / slice-038 /
  # slice-065 blocks above) so parallel branches editing ci.yml rebase
  # cleanly. Runs the module-level vitest seed (`web/lib/*.test.ts` +
  # `web/app/api/**/*.test.ts`) and uploads the coverage summary as an
  # artifact. No coverage gate this slice — the data is collected to
  # inform a follow-up "raise the bar" slice.
  #
  # Gated on the same `changes.code` path filter as the other expensive
  # jobs with a mutually-exclusive stub sibling under the same check
  # name (slice-061 pattern), so docs-only PRs resolve the check in <30s.
  # ====================================================================
  frontend-vitest:
    name: Frontend · vitest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: web
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"
      - name: Install workspaces
        working-directory: .
        run: npm ci --no-audit --no-fund
      - name: Run vitest (with coverage)
        run: npm run test:coverage
      - name: Upload coverage summary as workflow artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: frontend-vitest-coverage
          path: web/coverage/coverage-summary.json
          if-no-files-found: warn

  frontend-vitest-stub:
    name: Frontend · vitest
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - run: echo "Docs-only change — skipped per dorny/paths-filter@v4 (slice 061)."

  # ─── Frontend · lint (slice 078) ─────────────────────────────────────
  # Runs `npm run lint -w web` against PRs that touch code paths.
  # Informational only — NOT added to required-checks per slice 078 P0-A4
  # (lint regressions on every dep bump would flake the merge queue).
  # Promote-to-required is a future slice once the cadence proves stable.
  # See docs/audit-log/078-eslint-10-react-plugin-incompat-decisions.md
  # for the path-B rationale (ESLint pinned to ^9 until eslint-plugin-react
  # ships ESLint-10 support — tracked at docs/issues/095-eslint-10-re-upgrade.md).
  frontend-lint:
    name: Frontend · lint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: web
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"
      - name: Install workspaces
        working-directory: .
        run: npm ci --no-audit --no-fund
      - name: Run eslint
        run: npm run lint

  frontend-lint-stub:
    name: Frontend · lint
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - run: echo "Docs-only change — skipped per dorny/paths-filter@v4 (slice 061)."

  # ====================================================================
  # Slice 069 — Frontend Playwright e2e.
  #
  # Self-contained job block. Brings up postgres 16 + nats 2.10 + minio
  # as service containers (postgres via the GHA `services:` block; nats
  # and minio via `docker run` because their official images need
  # `-js -sd /data` and `server /data` respectively, which `services:`
  # cannot pass — same pattern as the existing `Go · integration` job).
  # Then builds atlas + web from source, runs the bootstrap, and invokes
  # `npx playwright test` headless against the running stack.
  #
  # On failure the HTML report + traces + screenshots upload as a
  # workflow artifact so a maintainer can drag-drop the trace into
  # `npx playwright show-trace` locally for diagnosis.
  #
  # Gated on the same `changes.code` path filter as the other expensive
  # jobs with a mutually-exclusive stub sibling under the same check
  # name (slice-061 pattern), so docs-only PRs resolve the check in <30s.
  # ====================================================================
  frontend-playwright:
    name: Frontend · Playwright e2e
    # Slice 695 — also depends on build-atlas, the lightweight job that
    # builds + uploads the shared atlas binary this job downloads (instead
    # of recompiling). NOT build-go: gating on build-go's ~7.5-min -race
    # unit run regressed wall-clock; build-atlas is ~1 min (decisions D3).
    needs: [changes, build-atlas]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Slice 082 — un-quarantined. Slice 079's `continue-on-error: true`
    # is removed; the job again fails the PR on red. The seed-data
    # harness (`web/e2e/seed.ts`, `fixtures/e2e/*.sql`) supplies the
    # preconditions the five un-shimmed specs need. The spec body
    # assertions remain commented pending per-spec un-comment slices
    # (see docs/audit-log/082-playwright-seed-data-harness-decisions.md
    # for the scoping rationale); the `beforeAll` hook still exercises
    # the harness end-to-end on every run.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: security_atlas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/security_atlas?sslmode=disable
      ATLAS_APP_PASSWORD: ${{ secrets.CI_ATLAS_APP_PASSWORD || 'ci-ephemeral' }}
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_BUCKET: atlas-artifacts-test
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      NATS_URL: nats://localhost:4222
      ATLAS_HTTP_URL: http://localhost:8080
      PLATFORM_BASE_URL: http://localhost:3000
      # Slice 201 — Playwright global-setup obtains a JWT at runtime
      # via POST /v1/test/issue-jwt (env-gated below by ATLAS_TEST_MODE)
      # and writes it into process.env.TEST_BEARER for downstream specs.
      # The TEST_BEARER env var here is intentionally OMITTED — the
      # global-setup module is the sole writer (its absence at job-level
      # forces the runtime mint path). Slice 069's static literal
      # (which was a slice 034 opaque bearer) is retired with slice 197.
      ATLAS_TEST_MODE: "1"
      # Slice 187 / 190 — ATLAS_ISSUER_URL drives the OAuth keystore
      # wiring + JWT validator on /v1/*. Without this the atlas server
      # boots WITHOUT a tokensign.Signer, the /v1/test/issue-jwt
      # endpoint returns 404 (no signer wired), and global-setup fails.
      ATLAS_ISSUER_URL: http://localhost:8080
      # Slice 082 — deterministic test value (>=32 bytes per
      # internal/auth/bearer/bearer.go HashKeyMinBytes). Historically
      # the atlas server boots with this key; retained because the
      # bearer.Hasher refuses to construct without it. The HMAC path
      # itself is now dead post-slice-197 but the boot-time check
      # remains. NOT a real secret — only used by the disposable CI
      # Postgres instance.
      BEARER_HASH_KEY: test-bearer-hash-key-32-bytes-ok!!
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          # Slice 117 per-job exception: Playwright's `npx playwright
          # install --with-deps chromium` step uses sudo to install
          # chromium's system dependencies (libfontconfig, etc.).
          # `disable-sudo: true` (the slice-117 default) breaks that.
          # Egress audit still applies; only sudo is permitted on this
          # one job. See docs/audit-log/117-stepsecurity-harden-runner-decisions.md
          # decision D5 for the rationale.
          disable-sudo: false

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          cache: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"
      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live; then
              echo "minio ready"; break
            fi
            sleep 2
          done
          docker run --rm --network host \
            -e MC_HOST_local=http://minioadmin:minioadmin@localhost:9000 \
            minio/mc mb -p local/atlas-artifacts-test
      - name: Start NATS JetStream
        run: |
          docker run -d --name nats \
            -p 4222:4222 \
            -p 8222:8222 \
            nats:2.10-alpine -js -sd /data --http_port 8222
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8222/healthz; then
              echo "nats ready"; break
            fi
            sleep 2
          done
      - name: Bootstrap Postgres roles + migrations
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f migrations/bootstrap/01-roles.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 \
            -c "ALTER ROLE atlas_app PASSWORD '$ATLAS_APP_PASSWORD'"
          echo "DATABASE_URL_APP=postgres://atlas_app:$ATLAS_APP_PASSWORD@localhost:5432/security_atlas?sslmode=disable" >> "$GITHUB_ENV"
          for f in migrations/sql/*.sql; do
            case "$f" in
              *.down.sql) ;;
              *) echo "applying $f"; psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f" ;;
            esac
          done
      # Slice 695 — download the prebuilt atlas binary from build-atlas instead
      # of recompiling ./cmd/atlas here. upload-artifact does NOT preserve the
      # Unix executable bit, so `install -m 0755` is REQUIRED to make the
      # downloaded file runnable at /usr/local/bin/atlas.
      - name: Download prebuilt atlas binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4.1.8
        with:
          name: atlas-binary
          path: /tmp/atlas-bin
      - name: Install prebuilt atlas binary
        run: |
          install -m 0755 /tmp/atlas-bin/atlas /usr/local/bin/atlas
          atlas --version || true
      - name: Install web workspace
        working-directory: .
        run: npm ci --no-audit --no-fund
      - name: Build web workspace
        working-directory: web
        run: npm run build
      - name: Install Playwright chromium
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Start atlas server
        # Slice 201: ATLAS_KEYSTORE_PATH + ATLAS_DATA_DIR point at /tmp (the
        # CI runner cannot write to the default /var/lib/security-atlas/).
        # Without these, fsstore.Open fails with EACCES, the OAuth keystore
        # never wires, s.jwtSigner stays nil, and the /v1/test/issue-jwt
        # endpoint returns 404 — breaking the Playwright global-setup.
        env:
          ATLAS_KEYSTORE_PATH: /tmp/atlas-ci/keys
          ATLAS_DATA_DIR: /tmp/atlas-ci
        run: |
          mkdir -p /tmp/atlas-ci/keys
          atlas serve > /tmp/atlas.log 2>&1 &
          echo "ATLAS_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health; then
              echo "atlas ready"; break
            fi
            sleep 2
          done
      - name: Start web server
        working-directory: web
        run: |
          (PORT=3000 npm start > /tmp/web.log 2>&1) &
          echo "WEB_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/; then
              echo "web ready"; break
            fi
            sleep 2
          done
      - name: Run Playwright tests
        working-directory: web
        run: npx playwright test
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report
          path: |
            web/playwright-report/
            web/test-results/
          if-no-files-found: warn
      - name: Dump server logs on failure
        if: failure()
        run: |
          echo "=== atlas log ==="
          cat /tmp/atlas.log || true
          echo "=== web log ==="
          cat /tmp/web.log || true

  frontend-playwright-stub:
    name: Frontend · Playwright e2e
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - run: echo "Docs-only change — skipped per dorny/paths-filter@v4 (slice 061)."

  # ====================================================================
  # Slice 387 — Frontend Playwright e2e against the PRODUCTION-BUILD
  # standalone server.
  #
  # Self-contained job block (appended like the slice-069 / slice-178
  # blocks above) so parallel branches editing ci.yml rebase cleanly.
  #
  # Why a SEPARATE job and not a matrix leg of `Frontend · Playwright
  # e2e` (slice 387 decision D1):
  #   * The dev-server leg runs the FULL e2e suite against `npm start`;
  #     the two prod-build specs (`bff-cookie-production-build.spec.ts`,
  #     `logo-render-production-build.spec.ts`) are `test.skip`-guarded
  #     there behind `!ATLAS_PROD_BUILD`, so they no-op in that leg.
  #   * This leg builds the `output: "standalone"` bundle
  #     (`npm run build:standalone`), boots `node
  #     .next/standalone/web/server.js`, sets `ATLAS_PROD_BUILD=1`, and
  #     runs ONLY those two specs — which assert standalone-only
  #     regressions (slice 146 NODE_ENV-coupled cookie bug; slice 153
  #     `output: "standalone"` not copying web/public/). A matrix leg
  #     would need a build-command + start-command + spec-selection
  #     conditional keyed on the matrix value, which is more wiring than
  #     a clean second job. The backend bring-up (Postgres + NATS +
  #     MinIO + atlas + JWT mint) is identical to the dev-server leg and
  #     mirrored verbatim below.
  #
  # The two specs un-skip BECAUSE this job sets ATLAS_PROD_BUILD=1 AND
  # boots them against the real standalone output — running them against
  # the dev server would green-wash (assert nothing about the
  # standalone-only path). See slice 351 disposition (b) +
  # docs/audit-log/387-e2e-prod-build-ci-harness-decisions.md.
  #
  # Gated on the same `changes.code` path filter as the other expensive
  # jobs with a mutually-exclusive stub sibling under the same check
  # name (slice-061 pattern), so docs-only PRs resolve the check in <30s.
  # NOT yet in .github/branch-protection.json's required-checks list —
  # ships non-required (like slice 065 / 038) and is promoted to a
  # required check in a follow-up once it has a few green runs.
  # ====================================================================
  frontend-playwright-prod-build:
    name: Frontend · Playwright e2e (prod-build standalone)
    # Slice 695 — also depends on build-atlas (the lightweight shared-binary
    # job), NOT build-go (its slow -race run regressed wall-clock; decisions D3).
    needs: [changes, build-atlas]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Slice 399 — BLOCKING. This leg builds + boots the Next.js
    # `output: "standalone"` server (slice 387 harness) and runs BOTH
    # prod-build-only regression specs against it with ATLAS_PROD_BUILD=1:
    #   - logo-render-production-build.spec.ts (slice 153) — the standalone
    #     tracer drops web/public/, so the build:standalone `cp` is what
    #     keeps the logo + OG/Twitter assets resolving.
    #   - bff-cookie-production-build.spec.ts (slice 146) — the
    #     NODE_ENV-coupled cookie attribute that dropped the auth cookie on
    #     the BFF round-trip under the standalone server's plain-HTTP
    #     transport (proxy → /login → panel JSON.parse of login HTML →
    #     "Unexpected token '<'"). Slice 399 re-shaped its two assertions to
    #     be RSC-aware (under the prod build the panels are server-rendered,
    #     so the guard asserts an authenticated render + absence of the
    #     JSON-parse-HTML signature rather than a client-side BFF-call
    #     count) and fixed the addCookies domain (baseURL origin, not
    #     about:blank). See docs/audit-log/399-bff-cookie-prod-build-spec-fix-decisions.md.
    # The `continue-on-error` advisory shim that slice 387 carried while the
    # cookie spec body was deferred is now removed — the leg blocks on red.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: security_atlas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/security_atlas?sslmode=disable
      ATLAS_APP_PASSWORD: ${{ secrets.CI_ATLAS_APP_PASSWORD || 'ci-ephemeral' }}
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_BUCKET: atlas-artifacts-test
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      NATS_URL: nats://localhost:4222
      ATLAS_HTTP_URL: http://localhost:8080
      PLATFORM_BASE_URL: http://localhost:3000
      # Slice 201 — global-setup mints a JWT at runtime via
      # POST /v1/test/issue-jwt; TEST_BEARER is intentionally OMITTED so
      # the runtime-mint path is forced. ATLAS_TEST_MODE=1 mounts that
      # endpoint on the atlas server; ATLAS_ISSUER_URL wires the keystore
      # + signer it needs.
      ATLAS_TEST_MODE: "1"
      ATLAS_ISSUER_URL: http://localhost:8080
      BEARER_HASH_KEY: test-bearer-hash-key-32-bytes-ok!!
      # Slice 387 — un-skips bff-cookie-production-build.spec.ts +
      # logo-render-production-build.spec.ts (both `test.skip`-guarded
      # behind `!ATLAS_PROD_BUILD`). This is the ONLY job that sets it.
      ATLAS_PROD_BUILD: "1"
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          # Same slice 069 / 117 D5 exception: Playwright's
          # `--with-deps chromium` step uses sudo to install chromium's
          # system libs. Egress audit still applies; only sudo is
          # permitted on this one job.
          disable-sudo: false

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          cache: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"
      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live; then
              echo "minio ready"; break
            fi
            sleep 2
          done
          docker run --rm --network host \
            -e MC_HOST_local=http://minioadmin:minioadmin@localhost:9000 \
            minio/mc mb -p local/atlas-artifacts-test
      - name: Start NATS JetStream
        run: |
          docker run -d --name nats \
            -p 4222:4222 \
            -p 8222:8222 \
            nats:2.10-alpine -js -sd /data --http_port 8222
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8222/healthz; then
              echo "nats ready"; break
            fi
            sleep 2
          done
      - name: Bootstrap Postgres roles + migrations
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f migrations/bootstrap/01-roles.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 \
            -c "ALTER ROLE atlas_app PASSWORD '$ATLAS_APP_PASSWORD'"
          echo "DATABASE_URL_APP=postgres://atlas_app:$ATLAS_APP_PASSWORD@localhost:5432/security_atlas?sslmode=disable" >> "$GITHUB_ENV"
          for f in migrations/sql/*.sql; do
            case "$f" in
              *.down.sql) ;;
              *) echo "applying $f"; psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f" ;;
            esac
          done
      # Slice 695 — download the prebuilt atlas binary from build-atlas instead
      # of recompiling ./cmd/atlas here. upload-artifact does NOT preserve the
      # Unix executable bit, so `install -m 0755` is REQUIRED. The web
      # standalone build below is unrelated and stays.
      - name: Download prebuilt atlas binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4.1.8
        with:
          name: atlas-binary
          path: /tmp/atlas-bin
      - name: Install prebuilt atlas binary
        run: |
          install -m 0755 /tmp/atlas-bin/atlas /usr/local/bin/atlas
          atlas --version || true
      - name: Install web workspace
        working-directory: .
        run: npm ci --no-audit --no-fund
      - name: Build web workspace (standalone output)
        # Slice 387 — `build:standalone` = `next build && cp -r public
        # .next/standalone/web/public`. The bare `next build` does NOT
        # copy web/public/ into the standalone tree (the `output:
        # "standalone"` tracer omits static assets by design — exactly
        # the slice 153 regression). The script's `cp` reproduces the
        # web.Dockerfile runtime-stage copy so the logo + OG/Twitter
        # assets resolve under `node .next/standalone/web/server.js`.
        working-directory: web
        run: npm run build:standalone
      - name: Install Playwright chromium
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Start atlas server
        env:
          ATLAS_KEYSTORE_PATH: /tmp/atlas-ci/keys
          ATLAS_DATA_DIR: /tmp/atlas-ci
        run: |
          mkdir -p /tmp/atlas-ci/keys
          atlas serve > /tmp/atlas.log 2>&1 &
          echo "ATLAS_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health; then
              echo "atlas ready"; break
            fi
            sleep 2
          done
      - name: Start web server (production-build standalone)
        # Slice 387 — boot the standalone Node server, NOT `npm start`.
        # The standalone entrypoint is `.next/standalone/web/server.js`
        # (the `web/` segment mirrors the monorepo workspace path Next.js
        # bakes into the traced output). It reads PORT + ATLAS_HTTP_URL
        # from the env exported at job level, so the BFF proxies to the
        # atlas server identically to the dev-server leg.
        working-directory: web
        run: |
          (PORT=3000 node .next/standalone/web/server.js > /tmp/web.log 2>&1) &
          echo "WEB_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/; then
              echo "web ready"; break
            fi
            sleep 2
          done
      - name: Run prod-build Playwright specs
        # Slice 387 — ATLAS_PROD_BUILD=1 (job env) un-skips the prod-build
        # specs; we name them explicitly so this leg runs ONLY the
        # standalone-only regression guards (the dev-server leg owns the
        # rest of the suite). reuseExistingServer=true (CI=true) attaches
        # to the standalone server started above.
        #
        # Slice 399 — runs BOTH prod-build specs: the slice-153 logo spec
        # and the slice-146 bff-cookie spec (its body re-shaped to be
        # RSC-aware). The job is now blocking (continue-on-error removed).
        working-directory: web
        run: |
          npx playwright test \
            bff-cookie-production-build.spec.ts \
            logo-render-production-build.spec.ts
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: playwright-report-prod-build
          path: |
            web/playwright-report/
            web/test-results/
          if-no-files-found: warn
      - name: Dump server logs on failure
        if: failure()
        run: |
          echo "=== atlas log ==="
          cat /tmp/atlas.log || true
          echo "=== web log ==="
          cat /tmp/web.log || true

  frontend-playwright-prod-build-stub:
    name: Frontend · Playwright e2e (prod-build standalone)
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - run: echo "Docs-only change — skipped per dorny/paths-filter@v4 (slice 061)."

  # ====================================================================
  # Slice 178 — UI honesty audit (advisory).
  #
  # Runs the `web/e2e-audit/` Playwright project against the same
  # seeded slice-037 docker-compose stack the `Frontend · Playwright
  # e2e` job uses. Categorizes findings as HONESTY-GAP / SHIP-GAP /
  # MOCKUP-STALE and posts a sticky PR comment summarizing them. The
  # job is INFORMATIONAL — it never blocks merge (P0-178-6 +
  # .github/branch-protection.json is NOT modified by this slice).
  #
  # Promotion to a required check is a future slice once the harness
  # proves stable across 5+ PRs (slice 178 deferred items).
  # ====================================================================
  frontend-ui-honesty:
    name: Frontend · UI honesty (advisory)
    # Slice 695 — also depends on build-atlas (the lightweight shared-binary
    # job), NOT build-go (its slow -race run regressed wall-clock; decisions D3).
    needs: [changes, build-atlas]
    if: github.event_name == 'pull_request' && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: security_atlas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/security_atlas?sslmode=disable
      ATLAS_APP_PASSWORD: ${{ secrets.CI_ATLAS_APP_PASSWORD || 'ci-ephemeral' }}
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_BUCKET: atlas-artifacts-test
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      NATS_URL: nats://localhost:4222
      ATLAS_HTTP_URL: http://localhost:8080
      PLATFORM_BASE_URL: http://localhost:3000
      # Slice 178 — same neutral test token shape as slice 069
      # (P0-178-8 / P0-A9). The seeded-stack run uses fixture data
      # only (P0-178-2); the audit cannot leak real tenant data.
      TEST_BEARER: test-bearer-e2e
      BEARER_HASH_KEY: test-bearer-hash-key-32-bytes-ok!!
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          # Playwright's `--with-deps` still needs sudo for chromium's
          # system libs. Same exception as slice 069 / 117 D5.
          disable-sudo: false

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          cache: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"
      - name: Install workspaces
        run: npm ci --no-audit --no-fund
      - name: Validate mockup-spec manifest (schema + file-existence)
        # AC-10a / P0-178-11. Runs the manifest validator's vitest
        # smoke test which calls `loadManifest()` end-to-end. Fails
        # fast if the manifest is malformed or references a missing
        # mockup file, before the expensive bring-up below.
        working-directory: web
        run: npx vitest run e2e-audit/lib/manifest.test.ts
      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live; then
              echo "minio ready"; break
            fi
            sleep 2
          done
          docker run --rm --network host \
            -e MC_HOST_local=http://minioadmin:minioadmin@localhost:9000 \
            minio/mc mb -p local/atlas-artifacts-test
      - name: Start NATS JetStream
        run: |
          docker run -d --name nats \
            -p 4222:4222 \
            -p 8222:8222 \
            nats:2.10-alpine -js -sd /data --http_port 8222
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8222/healthz; then
              echo "nats ready"; break
            fi
            sleep 2
          done
      - name: Bootstrap Postgres roles + migrations
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f migrations/bootstrap/01-roles.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 \
            -c "ALTER ROLE atlas_app PASSWORD '$ATLAS_APP_PASSWORD'"
          echo "DATABASE_URL_APP=postgres://atlas_app:$ATLAS_APP_PASSWORD@localhost:5432/security_atlas?sslmode=disable" >> "$GITHUB_ENV"
          for f in migrations/sql/*.sql; do
            case "$f" in
              *.down.sql) ;;
              *) echo "applying $f"; psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f" ;;
            esac
          done
      # Slice 695 — download the prebuilt atlas binary from build-atlas instead
      # of recompiling ./cmd/atlas here. upload-artifact does NOT preserve the
      # Unix executable bit, so `install -m 0755` is REQUIRED.
      - name: Download prebuilt atlas binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4.1.8
        with:
          name: atlas-binary
          path: /tmp/atlas-bin
      - name: Install prebuilt atlas binary
        run: |
          install -m 0755 /tmp/atlas-bin/atlas /usr/local/bin/atlas
          atlas --version || true
      - name: Build web workspace
        working-directory: web
        run: npm run build
      - name: Install Playwright chromium
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Start atlas server
        # Slice 201: ATLAS_KEYSTORE_PATH + ATLAS_DATA_DIR point at /tmp (the
        # CI runner cannot write to the default /var/lib/security-atlas/).
        # Without these, fsstore.Open fails with EACCES, the OAuth keystore
        # never wires, s.jwtSigner stays nil, and the /v1/test/issue-jwt
        # endpoint returns 404 — breaking the Playwright global-setup.
        env:
          ATLAS_KEYSTORE_PATH: /tmp/atlas-ci/keys
          ATLAS_DATA_DIR: /tmp/atlas-ci
        run: |
          mkdir -p /tmp/atlas-ci/keys
          atlas serve > /tmp/atlas.log 2>&1 &
          echo "ATLAS_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health; then
              echo "atlas ready"; break
            fi
            sleep 2
          done
      - name: Start web server
        working-directory: web
        run: |
          (PORT=3000 npm start > /tmp/web.log 2>&1) &
          echo "WEB_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/; then
              echo "web ready"; break
            fi
            sleep 2
          done
      - name: Run UI honesty audit
        working-directory: web
        # Soft-fail: the harness writes the report regardless of
        # finding count. A nonzero exit from Playwright means the
        # harness itself broke (page render 5xx, auth fail) — surface
        # that, but still post the comment from whatever report
        # `afterAll` managed to write.
        continue-on-error: true
        id: audit
        run: |
          set +e
          npx playwright test --config=e2e-audit/playwright.config.ts
          rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          # Pick the newest report file the spec wrote.
          report_md=$(ls -t e2e-audit/reports/ui-honesty-*.md 2>/dev/null | head -1)
          report_json=$(ls -t e2e-audit/reports/ui-honesty-*.json 2>/dev/null | head -1)
          echo "report_md=$report_md" >> "$GITHUB_OUTPUT"
          echo "report_json=$report_json" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Compare finding count against committed baseline
        id: count
        # Slice 699 (AC-2): the standing finding count is identical PR-to-PR,
        # so refreshing the sticky on every run is pure noise. Post/update only
        # when THIS run's total differs from the baseline committed on main.
        # When equal (or the report is missing), skip the comment and rely on
        # the advisory CHECK + the uploaded artifact (both UNCHANGED — AC-4).
        run: |
          baseline_file="web/e2e-audit/.ui-honesty-baseline-count"
          baseline="$(grep -v '^#' "$baseline_file" 2>/dev/null | tr -dc '0-9' || true)"
          baseline="${baseline:-}"
          total=""
          if [ -n "${{ steps.audit.outputs.report_json }}" ] && [ -f "web/${{ steps.audit.outputs.report_json }}" ]; then
            total=$(jq -r '.summary.total' "web/${{ steps.audit.outputs.report_json }}")
          fi
          echo "baseline=${baseline:-<none>}; this run total=${total:-<none>}"
          # Decide whether to surface the comment.
          changed=true
          if [ -n "$total" ] && [ -n "$baseline" ] && [ "$total" = "$baseline" ]; then
            changed=false
          fi
          echo "changed=${changed}" >> "$GITHUB_OUTPUT"
          echo "baseline=${baseline}" >> "$GITHUB_OUTPUT"
          if [ "$changed" = "false" ]; then
            echo "UI-honesty count unchanged vs baseline (${baseline}); skipping comment refresh (slice 699)."
          fi
      - name: Build sticky comment body
        # Slice 089 / 120 sticky-comment shape. Hidden HTML marker
        # makes the comment idempotent — re-running the workflow
        # updates the same comment instead of stacking.
        # Slice 699 (AC-2): only built when the count differs from baseline.
        if: steps.count.outputs.changed == 'true'
        run: |
          {
            echo "<!-- atlas-ui-honesty-marker -->"
            echo "## Frontend · UI honesty (advisory) — slice 178"
            echo
            echo "_Finding count changed vs. base (\`${{ steps.count.outputs.baseline }}\` baseline) — refreshing this advisory. Update \`web/e2e-audit/.ui-honesty-baseline-count\` once the new standing count is intentional (slice 699)._"
            echo
            if [ -n "${{ steps.audit.outputs.report_json }}" ] && [ -f "web/${{ steps.audit.outputs.report_json }}" ]; then
              total=$(jq -r '.summary.total' "web/${{ steps.audit.outputs.report_json }}")
              honesty=$(jq -r '.summary.honestyGap' "web/${{ steps.audit.outputs.report_json }}")
              ship=$(jq -r '.summary.shipGap' "web/${{ steps.audit.outputs.report_json }}")
              stale=$(jq -r '.summary.mockupStale' "web/${{ steps.audit.outputs.report_json }}")
              if [ "$total" = "0" ]; then
                echo "No UI honesty findings on this run against the seeded slice-037 docker-compose stack. "
                echo "(10 routes audited; HONESTY-GAP / SHIP-GAP / MOCKUP-STALE all zero.)"
              else
                echo "$total finding(s) across 10 audited routes:"
                echo
                echo '| category | count |'
                echo '|---|---|'
                echo "| HONESTY-GAP | $honesty |"
                echo "| SHIP-GAP | $ship |"
                echo "| MOCKUP-STALE | $stale |"
                echo
                echo "Per-route breakdown:"
                echo
                echo '| route | findings |'
                echo '|---|---|'
                jq -r '.summary.byRoute | to_entries | sort_by(.key) | .[] | "| `\(.key)` | \(.value) |"' "web/${{ steps.audit.outputs.report_json }}"
                echo
                echo "Full Markdown report + screenshots are attached as a workflow artifact (\`ui-honesty-report-${{ github.run_id }}\`). "
                echo "Each substantive finding should file as a spillover slice per slice 178 AC-17 — see [\`web/e2e-audit/README.md\`](../blob/main/web/e2e-audit/README.md) for the spillover discipline."
              fi
            else
              echo "Harness failed to produce a report. Exit code from Playwright: \`${{ steps.audit.outputs.exit_code }}\`. "
              echo "Check the workflow logs + the `playwright-report/` artifact for the harness failure."
            fi
            echo
            echo "---"
            echo "_Informational only — never blocks merge. Reproduce locally: see [\`web/e2e-audit/README.md\`](../blob/main/web/e2e-audit/README.md). Slice 178 · ${{ github.run_id }}._"
          } > comment-body.md
      - name: Post or update sticky PR comment
        # Slice 699 (AC-2): post/update only when the finding count differs
        # from the committed baseline; otherwise rely on the advisory check.
        if: steps.count.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          existing=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | startswith("<!-- atlas-ui-honesty-marker -->")) | .id' \
            | head -1)
          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/${existing}" \
              -f body="$(cat comment-body.md)" >/dev/null
            echo "Updated existing sticky comment id=$existing"
          else
            gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body-file comment-body.md
            echo "Posted new sticky comment"
          fi
      - name: Upload audit reports as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ui-honesty-report-${{ github.run_id }}
          path: |
            web/e2e-audit/reports/
            comment-body.md
          if-no-files-found: warn
      - name: Dump server logs on failure
        if: failure()
        run: |
          echo "=== atlas log ==="
          cat /tmp/atlas.log || true
          echo "=== web log ==="
          cat /tmp/web.log || true

  frontend-ui-honesty-stub:
    name: Frontend · UI honesty (advisory)
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - run: echo "Non-PR push OR docs-only change — UI honesty audit skipped (slice 178)."

  # ====================================================================
  # Slice 089 — Dependency vulnerability scanning.
  #
  # Three complementary scanners that close the "known-CVE-on-current-
  # version" gap Dependabot leaves open (Dependabot opens PRs when an
  # upgrade is available; says nothing when a package sits at a
  # vulnerable patch with no newer release):
  #
  #   1. Go · govulncheck      — Go's official call-graph-aware scanner
  #   2. Frontend · npm audit  — runtime-shipped JS deps in web/
  #   3. Container · Trivy scan — OS-package CVEs in the atlas image
  #
  # All three follow the slice-069 stub-job pattern: gated on
  # `changes.code`, with a mutually-exclusive stub sibling under the
  # same check name so docs-only PRs resolve the check in < 30s.
  #
  # None are added to `.github/branch-protection.json`'s required-checks
  # list (P0-A1). Newly-published CVEs would otherwise flake the merge
  # queue on PRs that didn't touch the affected dep. Promotion-to-
  # required is a future slice once the maintainer has observed
  # cadence + false-positive rate. See
  # docs/audit-log/089-dependency-vulnerability-scanning-decisions.md
  # for the threshold + suppression rationale.
  # ====================================================================
  govulncheck:
    name: Go · govulncheck
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          cache: true
      # Pinned version (not @latest) for reproducibility. Bump in a
      # dedicated PR so the diff is auditable. See slice 089 decisions
      # log D3 + slice 090 (which bumped v1.1.3 → v1.1.4 because the
      # v1.1.3 pin's transitive x/tools@v0.23.0 dependency contained a
      # constant-folding pattern Go 1.26 rejects — silent install
      # failure on every PR until the bump).
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      # govulncheck exits non-zero ONLY when a vulnerability is reachable
      # from the analyzed binary's call graph — call-graph filtering is
      # the highest signal-to-noise property of the tool. There is no
      # severity flag; reachability IS the threshold. See decisions log
      # D1. The text output also uploads as an artifact below for
      # maintainer triage.
      - name: Run govulncheck (text + sarif)
        id: vulncheck
        run: |
          set +e
          govulncheck -format text ./... | tee govulncheck.txt
          rc_text=$?
          govulncheck -format sarif ./... > govulncheck.sarif || true
          set -e
          echo "exit_code=$rc_text" >> "$GITHUB_OUTPUT"
          if [ "$rc_text" -ne 0 ]; then
            echo "::warning::govulncheck reported reachable vulnerabilities (see uploaded artifact)"
          fi
          exit "$rc_text"
      - name: Upload govulncheck report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: govulncheck-report
          path: |
            govulncheck.txt
            govulncheck.sarif
          if-no-files-found: warn

  govulncheck-stub:
    name: Go · govulncheck
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - run: echo "Docs-only change — skipped per dorny/paths-filter@v4 (slice 061)."

  # ====================================================================
  # sqlc drift check — BLOCKING required-check (promoted by slice 159).
  #
  # Installs the pinned sqlc version from SQLC_VERSION (defined in
  # justfile) and runs `sqlc generate`. If the generated tree differs
  # from what's committed, fails the PR with the diff in the log so the
  # contributor can re-run `just sqlc-generate` locally and commit the
  # regen.
  #
  # History: slice 109 added this job with `continue-on-error: true` as
  # an informational signal (P0-A3 explicitly deferred required-checks
  # promotion until the install paths were proven byte-identical). The
  # drift surfaced 2026-05-18 during slice 153's PR #330 — the first
  # PR whose path-filter triggered the real job (prior PRs all hit the
  # docs-only sibling-stub job below via dorny/paths-filter@v4). Slice
  # 159 resolved the structural drift via SQL query rewrite (CTE +
  # LEFT JOIN for policies.sql, drop-redundant-casts for scf_anchors)
  # and promoted this job to required-checks. The committed bytes are
  # now byte-identical to a clean `go install`-built pinned-binary run.
  # ====================================================================
  sqlc-drift:
    name: Go · sqlc generate diff
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          cache: true
      - name: Read SQLC_VERSION from justfile
        id: pin
        run: |
          version=$(grep -E '^SQLC_VERSION\s*:=' justfile | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [ -z "$version" ]; then
            echo "could not read SQLC_VERSION from justfile" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Pinned sqlc version: $version"
      - name: Install pinned sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@${{ steps.pin.outputs.version }}
      - name: Run sqlc generate
        run: sqlc generate
      - name: Assert no drift in internal/db/dbx/
        run: |
          if ! git diff --exit-code -- internal/db/dbx/; then
            echo "::error::sqlc generate produced drift against committed internal/db/dbx/. Run 'just sqlc-generate' locally and commit the diff. See docs/audit-log/159-sqlc-toolchain-ci-drift-fix-decisions.md if a query change re-introduced an untyped derived column."
            exit 1
          fi
          echo "sqlc generate produced no drift — committed dbx tree matches the pinned-binary output."

  sqlc-drift-stub:
    name: Go · sqlc generate diff
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - run: echo "Docs-only change — skipped per dorny/paths-filter@v4 (slice 061)."

  # ====================================================================
  # Phantom dependency audit — informational only, NOT in required-checks.
  #
  # Runs scripts/audit-deps.sh whenever any of the four manifests
  # changes in a PR. The script classifies every direct dep across the
  # monorepo as USED / USED-VIA-CONFIG / USED-VIA-SCRIPT / PHANTOM
  # (slice 120). Any PHANTOM finding is posted as a sticky PR comment
  # so the contributor sees it inline before merge. The comment is
  # informational; CI never blocks on phantom findings.
  #
  # Why informational (not required): the audit is a heuristic — it
  # has known false positives (e.g. peer-detected deps like
  # @vitest/coverage-v8 and react-dom) tracked in
  # docs/audit-log/120-audit-and-remove-phantom-dependencies-decisions.md
  # D5. Promoting to required would force contributors to grep through
  # the audit-log to justify a KEEP case on every PR — the wrong
  # ergonomic for an opt-in hygiene signal. Mirrors the slice 109
  # sqlc-drift and slice 089 npm-audit informational-job pattern above.
  #
  # Sticky comment via a hidden HTML marker — re-running the workflow
  # updates the same comment instead of stacking new ones on the PR.
  # ====================================================================
  phantom-deps:
    name: Deps · phantom audit
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Install ripgrep
        # Required by scripts/audit-deps.sh — the ubuntu-latest runner
        # doesn't pre-bundle ripgrep as of 2026-05; install explicitly.
        run: sudo apt-get update -q && sudo apt-get install -y -q ripgrep
      - name: Verify ripgrep available
        run: rg --version
      - name: Run audit-deps.sh
        id: audit
        run: |
          # AC-4: the audit CHECK is UNCHANGED — it still runs over all four
          # manifests and still exits with the script's own rc.
          set +e
          bash scripts/audit-deps.sh > audit-deps.tsv 2> audit-deps.stderr
          rc=$?
          set -e
          # Count PHANTOM rows (excludes the TSV header).
          phantom_count=$(awk -F'\t' '$3=="PHANTOM"' audit-deps.tsv | wc -l | tr -d ' ')
          echo "phantom_count=$phantom_count" >> "$GITHUB_OUTPUT"
          echo "Phantom-dep findings: $phantom_count"
          exit "$rc"
      - name: Diff PHANTOM set against committed baseline
        id: diff
        run: |
          # Slice 699 (AC-3): only NEW phantoms (introduced by THIS PR) should
          # trigger a comment. The baseline file captures the phantom set that
          # already exists on main (the known false-positives). We post only
          # when the current run surfaces a phantom NOT in the baseline.
          baseline="scripts/audit-deps-phantom-baseline.tsv"
          # Current PHANTOM set, normalized to "ecosystem<TAB>package", sorted.
          awk -F'\t' '$3=="PHANTOM" { print $1"\t"$2 }' audit-deps.tsv \
            | sort -u > phantom-current.txt
          # Baseline set (header-skipped, comment-skipped), same normalization.
          if [ -f "$baseline" ]; then
            grep -v '^#' "$baseline" | awk -F'\t' 'NF>=2 && $1!="ecosystem" { print $1"\t"$2 }' \
              | sort -u > phantom-baseline.txt
          else
            : > phantom-baseline.txt
          fi
          # NEW = current minus baseline.
          comm -23 phantom-current.txt phantom-baseline.txt > phantom-new.txt || true
          new_count=$(grep -c . phantom-new.txt || true)
          new_count=${new_count:-0}
          echo "new_count=${new_count}" >> "$GITHUB_OUTPUT"
          echo "NEW phantom(s) vs baseline: ${new_count}"
      - name: Build comment body
        # Only assemble + post when this PR introduces a NEW phantom (AC-3).
        if: steps.diff.outputs.new_count != '0'
        id: body
        run: |
          {
            echo "<!-- atlas-phantom-deps-marker -->"
            echo "## Deps · phantom audit (slice 120)"
            echo
            new_count="${{ steps.diff.outputs.new_count }}"
            echo "${new_count} **new** direct dep(s) classified PHANTOM by this PR — declared in a manifest but not referenced in any source file, allowlisted config, or build script:"
            echo
            echo '| ecosystem | package | evidence |'
            echo '|---|---|---|'
            while IFS= read -r line; do
              [ -n "$line" ] || continue
              eco=$(printf '%s' "$line" | cut -f1)
              pkg=$(printf '%s' "$line" | cut -f2)
              [ -n "$pkg" ] || continue
              echo "| ${eco} | \`${pkg}\` | (no consumer found) |"
            done < phantom-new.txt
            echo
            echo "Known KEEP cases (peer-detected by their consumer; not actually phantom) are tracked in [\`docs/audit-log/120-audit-and-remove-phantom-dependencies-decisions.md\`](../blob/main/docs/audit-log/120-audit-and-remove-phantom-dependencies-decisions.md) D5. Drop the dep, or — if it is a genuine peer-detected KEEP — add it to \`scripts/audit-deps-phantom-baseline.tsv\` with rationale."
            echo
            echo "---"
            echo "_Informational only. Reproduce locally: \`bash scripts/audit-deps.sh\`. Slice 120 · ${{ github.run_id }}._"
          } > comment-body.md
      - name: Post or update sticky PR comment
        # Slice 699: post ONLY on a NEW phantom. The baseline phantoms (known
        # false-positives that exist on main) no longer re-trigger a comment.
        if: steps.diff.outputs.new_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Find any existing sticky comment by our hidden marker.
          existing=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | startswith("<!-- atlas-phantom-deps-marker -->")) | .id' \
            | head -1)
          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/${existing}" \
              -f body="$(cat comment-body.md)" >/dev/null
            echo "Updated existing sticky comment id=$existing"
          else
            gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body-file comment-body.md
            echo "Posted new sticky comment"
          fi
      - name: Upload audit TSV as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: audit-deps-tsv
          path: |
            audit-deps.tsv
            audit-deps.stderr
            phantom-current.txt
            phantom-new.txt
            comment-body.md
          if-no-files-found: warn

  phantom-deps-stub:
    name: Deps · phantom audit
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - run: echo "Non-PR push OR docs-only change — phantom audit skipped (slice 120)."

  # ====================================================================
  # Schema-removal age gate — slice 179.
  #
  # Enforces the 90-day deprecation window for breaking-major bumps of
  # `evidence_kind` JSON Schemas. Triggered ONLY by PRs that touch
  # `internal/api/schemaregistry/schemas/**`. For each schema-version
  # file the PR REMOVES (D-filter), the script reads the file's
  # introduction commit on `main` and rejects the removal if the file
  # is younger than 90 days. The `[deprecation-override]` PR label
  # bypasses the failure for emergencies (e.g., schema published with a
  # security defect must be unpublished immediately) — the override
  # also requires a maintainer's approval and an audit-log entry under
  # `docs/audit-log/` documenting the rationale (P0-179-3).
  #
  # NOT a required check (P0-179-4) — informational until the check
  # proves stable across at least one schema-deletion PR. Promotion to
  # branch-protection required-checks is a follow-on slice.
  #
  # Trust root: introduction date is read ONLY from `git log` on
  # `origin/main` (P0-179-1). The PR cannot forge a younger
  # introduction date because it cannot rewrite `main`'s history.
  #
  # Local repro:
  #   git diff --diff-filter=D --name-only origin/main...HEAD \
  #     -- internal/api/schemaregistry/schemas/ \
  #     | bash scripts/check-schema-removal-age.sh
  #
  # Docs:
  #   - CONTRIBUTING.md "Contributing an `evidence_kind` schema"
  #     (governance side of the OQ #9 + #17 resolution).
  #   - internal/api/schemaregistry/schemas/README.md (slice 179 block).
  # ====================================================================
  schema-removal-age:
    name: Schema · removal-age (90-day floor)
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.schemas == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Need full main history so `git log --diff-filter=A` can
          # resolve the introduction commit for every removed file.
          # Shallow clones miss the introduction commit and the script
          # would (correctly, per P0-179-6) refuse to evaluate.
          fetch-depth: 0

      - name: Ensure `main` is available as a local ref
        run: |
          # On pull_request events `actions/checkout` lands in a detached
          # HEAD at the merge commit; `main` may not be present as a
          # local ref. `git fetch origin main:main` makes `main` a
          # tracked local branch so the script's default
          # SCHEMA_REMOVAL_MAIN_REF ('main') resolves cleanly.
          git fetch --no-tags origin main:main || true
          git rev-parse --verify main

      - name: Compute removed-schema list (D-filter)
        id: diff
        run: |
          # AC-7: removed-file list across the PR's full delta versus
          # origin/main, filtered to the canonical schema tree.
          removed_file="${RUNNER_TEMP}/removed-schemas.txt"
          git diff --diff-filter=D --name-only \
            origin/main...HEAD \
            -- internal/api/schemaregistry/schemas/ \
            > "$removed_file"
          count=$(wc -l < "$removed_file" | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "path=$removed_file" >> "$GITHUB_OUTPUT"
          if [ "$count" -eq 0 ]; then
            echo "No schema-version files removed by this PR — script will exit 0 quietly."
          else
            echo "Removed schema-version files ($count):"
            sed 's/^/  /' "$removed_file"
          fi

      - name: Resolve override label
        id: override
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # AC-8 + P0-179-2: the override label is the EXACT string
          # `[deprecation-override]`. No other label bypasses the check.
          # Bash `==` comparison against an array element guarantees
          # exact-match semantics (no glob, no substring).
          labels_json="$(gh pr view "$PR_NUMBER" \
            --repo "${{ github.repository }}" \
            --json labels --jq '[.labels[].name]' 2>/dev/null || echo '[]')"
          echo "PR labels: $labels_json"
          override="0"
          # jq selects exact-match; emits 'true' or empty.
          match=$(printf '%s' "$labels_json" | jq -r 'map(select(. == "[deprecation-override]")) | length')
          if [ "$match" -ge 1 ]; then
            override="1"
            echo "::notice::[deprecation-override] label present — SCHEMA_REMOVAL_OVERRIDE=1 will bypass any violations. Verify the corresponding audit-log entry under docs/audit-log/ is present in this PR (P0-179-3)."
          fi
          echo "value=$override" >> "$GITHUB_OUTPUT"

      - name: Run schema-removal age check
        env:
          SCHEMA_REMOVAL_OVERRIDE: ${{ steps.override.outputs.value }}
        run: |
          # AC-1 + AC-9: pipe the removed-file list into the script and
          # let its exit code propagate. Override env var, when set to
          # '1' by the previous step, suppresses non-zero exit on
          # floor violations (AC-5).
          bash scripts/check-schema-removal-age.sh \
            < "${{ steps.diff.outputs.path }}"

  npm-audit:
    name: Frontend · npm audit
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: "npm"
      - name: Install workspaces (production dependency tree only)
        # Use the lockfile-faithful install so audit sees the same
        # transitive tree the runtime will. --omit=dev keeps the
        # signal focused on what actually ships.
        run: npm ci --no-audit --no-fund
      # `--omit dev` drops dev-only findings (React testing libs,
      # eslint plugins, vitest plumbing) — the runtime-shipped tree is
      # what an attacker reaches. `--audit-level=high` bands the failure
      # threshold at HIGH+CRITICAL. See decisions log D1.
      - name: Run npm audit on web workspace
        id: audit
        run: |
          set +e
          npm audit --omit=dev --audit-level=high --workspace web | tee npm-audit.txt
          rc=$?
          npm audit --omit=dev --audit-level=high --workspace web --json > npm-audit.json || true
          set -e
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          if [ "$rc" -ne 0 ]; then
            echo "::warning::npm audit reported HIGH/CRITICAL vulnerabilities in the runtime tree (see uploaded artifact)"
          fi
          exit "$rc"
      - name: Upload npm-audit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: npm-audit-report
          path: |
            npm-audit.txt
            npm-audit.json
          if-no-files-found: warn

  npm-audit-stub:
    name: Frontend · npm audit
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - run: echo "Docs-only change — skipped per dorny/paths-filter@v4 (slice 061)."

  # ====================================================================
  # Branch-protection drift detector — informational only, NOT in
  # required-checks. Slice 158 split this into two surfaces; see comment
  # block on each job below for the rationale.
  #
  # Original: slice 127 ran a single job on every PR that called
  # `gh api repos/.../branches/main/protection/required_status_checks`
  # using the per-run `GITHUB_TOKEN`. That call requires the
  # `Administration: Read` repo permission, which `GITHUB_TOKEN` cannot
  # be granted via the workflow `permissions:` block (the GHA workflow
  # schema has no `administration` scope — see slice 158 D3 + the
  # actionlint guard added in `.pre-commit-config.yaml`). PR #311
  # attempted a one-line fix that added `administration: read` to the
  # permissions block; the workflow file was schema-invalid and GHA
  # silently dropped it. Slice 158 replaces that wrong fix.
  #
  # Slice 158 redesign (D2):
  #
  #   - PR-time job (`branch-protection-drift-validate`) runs on every
  #     PR. It validates ONLY the shape of `.github/branch-protection.json`
  #     (valid JSON, contains `.required_status_checks.contexts`, non-
  #     empty list). It does NOT call `gh api`. This means the PR-time
  #     surface needs no elevated token and cannot leak a credential
  #     from a malicious PR.
  #
  #   - Push-on-main job (`branch-protection-drift-live`) runs on push
  #     to `main` only. It uses `secrets.BRANCH_PROTECTION_READ_TOKEN`
  #     (a fine-grained PAT scoped to this repo with `Administration:
  #     Read` only, 90-day expiry — see `docs/adr/0005-branch-
  #     protection-pat-vs-app.md` for D1 rationale) to do the live
  #     compare. The PAT is `env:`-scoped to the one step that calls
  #     `gh api`, never to the whole job.
  #
  # Why split (vs. allowlist `if: github.actor == 'mgoodric'` on a
  # single job): the elevation surface on `pull_request:` is the actor
  # being able to MODIFY the workflow file in their PR. Even an
  # `actor`-allowlisted single job is run from the PR's workflow file,
  # so a malicious maintainer-impersonation (or an account compromise)
  # could still leak the secret. Push-on-main inherently uses the main-
  # branch workflow file. We trade PR-time live-compare signal (worth
  # ~5 seconds, never load-bearing — the check is informational) for a
  # zero-elevation PR surface. Slice 158 D2 records this.
  #
  # Sticky comment: only the live-compare side (push-on-main) emits
  # drift findings, and they go to the workflow-run log + an artifact,
  # NOT to a PR sticky comment (there is no PR on a push event). The
  # PR-time job emits a sticky comment ONLY when the JSON shape itself
  # is broken — a real defect contributors need to see at PR time.
  # ====================================================================
  branch-protection-drift-validate:
    name: Infra · branch-protection (PR-time validate)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'pull_request'
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate .github/branch-protection.json shape
        id: validate
        run: |
          set +e
          file=".github/branch-protection.json"
          if [ ! -f "$file" ]; then
            echo "validate: missing $file" > validate.stderr
            echo "exit_code=2" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! jq -e . "$file" > /dev/null 2> validate.stderr; then
            echo "validate: $file is not valid JSON" >> validate.stderr
            echo "exit_code=2" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ctx=$(jq -r '.required_status_checks.contexts // empty | length' "$file")
          if [ -z "$ctx" ] || [ "$ctx" = "0" ]; then
            echo "validate: $file has no .required_status_checks.contexts entries" > validate.stderr
            echo "exit_code=2" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "validate: $file is shape-valid (${ctx} required-checks contexts)"
          echo "exit_code=0" >> "$GITHUB_OUTPUT"

      - name: Build sticky comment body (PR-time)
        if: steps.validate.outputs.exit_code != '0'
        id: body
        run: |
          {
            echo "<!-- atlas-branch-protection-drift-marker -->"
            echo "## Infra · branch-protection file-shape error (slice 158)"
            echo
            echo "**\`.github/branch-protection.json\` failed shape validation.** See workflow log for details."
            echo
            echo "\`\`\`"
            cat validate.stderr 2>/dev/null || echo "(no stderr captured)"
            echo "\`\`\`"
            echo
            echo "Fix the file in this PR. The live drift compare runs separately on push to \`main\`."
            echo
            echo "---"
            echo "_Informational only — this check is NOT in \`required_status_checks\`. Slice 158 · run ${{ github.run_id }}._"
          } > comment-body.md

      - name: Post or update sticky PR comment
        if: steps.validate.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          existing=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | startswith("<!-- atlas-branch-protection-drift-marker -->")) | .id' \
            | head -1)
          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/${existing}" \
              -f body="$(cat comment-body.md)" >/dev/null
            echo "Updated existing sticky comment id=$existing"
          else
            gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body-file comment-body.md
            echo "Posted new sticky comment"
          fi

      - name: Clear stale sticky comment when validate passes
        if: steps.validate.outputs.exit_code == '0' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          existing=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | startswith("<!-- atlas-branch-protection-drift-marker -->")) | .id' \
            | head -1)
          if [ -n "$existing" ]; then
            {
              echo "<!-- atlas-branch-protection-drift-marker -->"
              echo "## Infra · branch-protection file-shape (slice 158)"
              echo ""
              echo "Shape-valid. Live drift compare runs on push to \`main\` separately."
              echo ""
              echo "---"
              echo "_Informational only — slice 158 · run ${RUN_ID}._"
            } > comment-body.md
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/${existing}" \
              -f body="$(cat comment-body.md)" >/dev/null
            echo "Refreshed sticky comment to shape-valid id=$existing"
          fi

  branch-protection-drift-live:
    name: Infra · branch-protection (live drift)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # The elevated PAT is `env:`-scoped to ONLY this step. No other
      # step in the job sees `BRANCH_PROTECTION_READ_TOKEN`. If the
      # secret is unset (initial deploy before maintainer creates it),
      # the script exits 2 with a clear error and the job stays
      # informational.
      - name: Run check-branch-protection-drift.sh
        id: drift
        env:
          GH_TOKEN: ${{ secrets.BRANCH_PROTECTION_READ_TOKEN }}
          ATLAS_REPO: ${{ github.repository }}
        run: |
          set +e
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "drift-live: BRANCH_PROTECTION_READ_TOKEN secret not configured — skipping live compare" > drift.stderr
            echo "drift-live: see docs/adr/0005-branch-protection-pat-vs-app.md for setup steps" >> drift.stderr
            echo "exit_code=2" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          bash scripts/check-branch-protection-drift.sh > drift.stdout 2> drift.stderr
          rc=$?
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          echo "----- script stdout -----"
          cat drift.stdout || true
          echo "----- script stderr -----"
          cat drift.stderr || true
          echo "-------------------------"
          exit 0

      - name: Surface drift in job summary
        if: always()
        run: |
          {
            echo "## Infra · branch-protection live drift (slice 158)"
            echo
            rc="${{ steps.drift.outputs.exit_code }}"
            if [ "$rc" = "0" ]; then
              echo "No drift detected — file and live in sync."
            elif [ "$rc" = "1" ]; then
              echo "**Drift detected** — see \`drift.stderr\` artifact for the diff. Reconcile via \`bash scripts/apply-branch-protection.sh\` OR by editing \`.github/branch-protection.json\` to match live."
            else
              echo "**Drift compare did not run** — \`BRANCH_PROTECTION_READ_TOKEN\` secret is not yet configured. See \`docs/adr/0005-branch-protection-pat-vs-app.md\` for setup steps."
            fi
            echo
            echo "_Informational only — slice 158 · run ${{ github.run_id }}._"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload drift report as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: branch-protection-drift-report
          path: |
            drift.stdout
            drift.stderr
          if-no-files-found: warn

  trivy-image:
    name: Container · Trivy scan
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # Slice 694: build via buildx + GitHub Actions layer cache so the
      # atlas multi-stage build (a full Go compile) is reused across runs.
      # `load: true` loads the built image into the local Docker daemon so
      # Trivy's `image-ref: atlas:trivy-scan` resolves it (a buildx build
      # without `load` leaves no local image). No `push` — this is the scan
      # image, never published. Caching changes build speed only, not the
      # scan inputs, so the security posture is identical (slice 693 Tier-2
      # Finding 1.1; SHA pins reused verbatim from container-publish.yml per
      # the slice 128 pin discipline).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4
      # Build the atlas image locally so Trivy has a target without
      # needing to push to a registry. The Dockerfile is the same one
      # release.yml uses; if a slice changes the Dockerfile, this job
      # picks the change up via the `changes.code` filter (which
      # includes deploy/**, Dockerfile*, and **/Dockerfile).
      - name: Build atlas image (local tag)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: deploy/docker/atlas.Dockerfile
          tags: atlas:trivy-scan
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # Pinned action version (not @latest) for reproducibility. The
      # action wraps Trivy CLI; see decisions log D3 for the upgrade
      # cadence. severity HIGH,CRITICAL + exit-code 1 implements the
      # AC-3 fail threshold. .trivyignore at repo root is honored if
      # present (it is NOT shipped this slice — see decisions log D2).
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: atlas:trivy-scan
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          output: trivy-report.txt
      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: trivy-report
          path: trivy-report.txt
          if-no-files-found: warn

  trivy-image-stub:
    name: Container · Trivy scan
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - run: echo "Docs-only change — skipped per dorny/paths-filter@v4 (slice 061)."

  # ====================================================================
  # Slice 128 — Action-pin discipline guard.
  #
  # Asserts every `uses:` line in every workflow under
  # `.github/workflows/*.yml` references a 40-character commit SHA
  # (not a floating tag). Runs `scripts/check-action-pins.sh`.
  #
  # Why BLOCKING (unlike slices 069/089/109/120/127's informational
  # jobs): the supply-chain mitigation REQUIRES the discipline to hold
  # continuously. An informational job would silently allow regression
  # — a PR could re-introduce `uses: foo/bar@v6` (tag-pinned) and the
  # build would still pass. Slice 117 SHA-pinned harden-runner; slice
  # 128 extends that to every action; this job is what keeps the
  # discipline from drifting. The job is added to
  # `.github/branch-protection.json` required-checks so the merge
  # button stays disabled on any future violation.
  #
  # Why no stub-twin (slice 061 convention): the script is fast (sub-
  # second, no network calls), deliberately ignores `changes.code`
  # (any PR can touch a workflow), and runs unconditionally so a PR
  # that adds a NEW workflow file with a tag-pinned action is caught.
  # Mirrors slice 127's `branch-protection-drift` stub-omission
  # rationale.
  #
  # Local repro: `bash scripts/check-action-pins.sh`
  # See: CONTRIBUTING.md "Action pinning" + docs/audit-log/128-*.md.
  # ====================================================================
  actions-pin-check:
    name: actions-pin-check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run check-action-pins.sh
        run: bash scripts/check-action-pins.sh

  # ====================================================================
  # Slice 458 — machine-local-cache staging guard (defense in depth).
  #
  # Asserts that no TRACKED path matches a known per-machine cache shape
  # (`.understand-anything/`, `.cache/`, `node_modules/`, `.DS_Store`, …).
  # Runs `scripts/check-staged-cache-paths.sh --all-tracked`. The local
  # pre-commit hook (`cache-path-guard` in .pre-commit-config.yaml) catches
  # the cache at STAGING time; this CI job re-checks the whole tracked tree
  # so a contributor who skipped local hooks and committed a cache anyway is
  # still caught (AC-2 — defense in depth). Same script, two surfaces.
  #
  # Background: a 9.8M `.understand-anything/` cache was once swept into
  # main by a broad `git add .` BEFORE its `.gitignore` rule landed
  # (slice 433, commit a058b09a). `.gitignore` stops the forward accident
  # only for untracked paths; this guard blocks the NEXT cache-dir of that
  # footgun. The guard is anchored to directory SEGMENTS so it never fires
  # on legitimately-tracked lookalikes (e.g. the slice-433 doc filenames
  # `docs/issues/433-...understand-anything-cache.md`) — AC-3.
  #
  # Why no stub-twin (slice 061 convention): the script is fast (sub-
  # second, pure bash + git, no network), deliberately ignores
  # `changes.code` (any PR can sweep in a cache regardless of what else it
  # touches), and runs unconditionally. Mirrors slice 128 actions-pin-check
  # / slice 140 openapi-drift-check / slice 345 integration-enrolment-check.
  #
  # Required-check status: ships NON-REQUIRED this slice (NOT added to
  # .github/branch-protection.json). Promote to a required check in a
  # follow-up once it has a few green runs — see the slice 458 PR body's
  # required-check analysis.
  #
  # Local repro: `bash scripts/check-staged-cache-paths.sh --all-tracked`
  #   pre-commit:  `pre-commit run cache-path-guard --all-files`
  #   self-test:   `bash scripts/check-staged-cache-paths_test.sh`
  # See: docs/audit-log/458-precommit-cache-guard-decisions.md.
  # ====================================================================
  cache-path-guard:
    name: cache-path-guard
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run check-staged-cache-paths.sh against the tracked tree
        run: bash scripts/check-staged-cache-paths.sh --all-tracked

  # ====================================================================
  # Slice 140 — OpenAPI drift-detect guard.
  #
  # Asserts that the committed `docs/openapi.yaml` is in lockstep with:
  #   (1) the output of `cmd/atlas-openapi` against the in-tree
  #       `internal/api/openapi.RouteSpecs` slice, AND
  #   (2) the actual chi route registrations grep-extracted from
  #       `internal/api/*/`.
  #
  # Why BLOCKING (matches slice 128 `actions-pin-check`; differs from
  # the informational pattern of slices 069/089/109/120/127):
  #   The spec being out of sync with handler reality is the only
  #   failure mode that makes the spec actively misleading — operators
  #   who code against a stale spec hit surprising 404s/401s and lose
  #   trust in the platform's documentation. A 30-second CI re-run is
  #   cheaper than the trust damage. Slice 140 D3 records the rationale.
  #
  # Why no stub-twin: the script is fast (~3 seconds, no network), runs
  # `go run ./cmd/atlas-openapi` deterministically, and SHOULD run on
  # every PR — including non-code PRs (a docs-only PR that edits the
  # spec by hand must still pass drift-detect). Mirrors the
  # actions-pin-check stub-omission rationale.
  #
  # Local repro: `bash scripts/check-openapi-drift.sh`
  # See: CONTRIBUTING.md "API spec" + docs/audit-log/140-*.md.
  # ====================================================================
  openapi-drift-check:
    name: openapi-drift-check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          cache: true

      - name: Run check-openapi-drift.sh
        run: bash scripts/check-openapi-drift.sh

  # ====================================================================
  # Slice 345 — integration-job enrolment-discovery guard.
  #
  # Asserts that every Go package carrying a `//go:build integration`
  # build tag is enrolled in the integration job's explicit package
  # list in the "Run integration tests" step above. A package that
  # ships an integration_test.go but is not enumerated there silently
  # runs no integration tests in CI (slice 334 framework-audit finding
  # I-1). Runs `scripts/audit-integration-enrolment.sh`.
  #
  # Why BLOCKING (matches slice 128 actions-pin-check / slice 140
  # openapi-drift-check; differs from the informational pattern of
  # slices 069/089/109/120/127): the gap is invisible by construction
  # — a forgotten enrolment produces a GREEN build whose integration
  # suite never ran. The 17-slice retroactive-enrolment trail (279,
  # 283, 284, 287, 288, 290, 293, 294, 295, 297, 310, 313, 315, 317,
  # 318, 319, 320) is the empirical cost of not failing the build.
  #
  # Known-gaps allowlist: when this guard shipped the tree already
  # carried a 38-package enrolment backlog (slice 345 anti-criterion
  # P0-345-1 forbids retroactively enrolling them here). They are
  # waived in the script's KNOWN_UNENROLLED allowlist and drained by
  # slice 387. The guard still fails on the NEXT forgotten package.
  #
  # Why no stub-twin (slice 061 convention): the script is fast (sub-
  # second, pure bash + grep, no network), deliberately ignores
  # `changes.code` (any PR that adds an integration_test.go must be
  # caught even if it touches no other code), and runs unconditionally.
  # Mirrors actions-pin-check / openapi-drift-check stub-omission.
  #
  # Local repro: `bash scripts/audit-integration-enrolment.sh`
  #   self-test: `bash scripts/audit-integration-enrolment_test.sh`
  # See: CONTRIBUTING.md "Integration-test enrolment" + slice 345.
  # ====================================================================
  integration-enrolment-check:
    name: integration-enrolment-check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run audit-integration-enrolment self-test
        run: bash scripts/audit-integration-enrolment_test.sh

      - name: Run audit-integration-enrolment.sh
        run: bash scripts/audit-integration-enrolment.sh

      # Slice 461: offline self-test for the seed order-independence guard
      # (exercises the env-misconfig exit-2 paths; the exit-0/1 paths run in
      # the integration job, which has a live Postgres).
      - name: Run check-integration-seed-order-independence self-test
        run: bash scripts/check-integration-seed-order-independence_test.sh

  # ====================================================================
  # Slice 393 (Q-5) — coverage-exclude justification lint (HARD FAIL).
  #
  # Wires scripts/check-coverage-excludes.sh (shipped by slice 353) into
  # CI as a blocking meta-lint check. Asserts the documentation invariant
  # that every prefix in `excludes` of cmd/scripts/coverage-thresholds.json
  # carries a non-empty `$exclude_justifications` entry, and that no
  # orphan justification exists (excludes ⊆ justifications ⊆ excludes).
  #
  # Why BLOCKING (matches actions-pin-check / openapi-drift-check /
  # integration-enrolment-check; differs from the informational pattern
  # of slices 069/089/109/120/127): the `excludes` list is the path of
  # least resistance for landing a slice without writing tests (slice 333
  # finding Q-5). An unjustified exclude must be un-mergeable — the same
  # structural stance as slice 345's integration-enrolment guard.
  #
  # Why no stub-twin (slice 061 convention): the script is fast (sub-
  # second, pure jq, no network), reads a tracked JSON file that any PR
  # might edit (incl. docs-only edits to the justifications map), and
  # SHOULD run unconditionally. Mirrors actions-pin-check stub-omission.
  #
  # Local repro: `bash scripts/check-coverage-excludes.sh`
  #   self-test: `bash scripts/check-coverage-excludes_test.sh`
  # See slice 353 (Q-5) + slice 393.
  # ====================================================================
  coverage-excludes-check:
    name: coverage-excludes-check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Run check-coverage-excludes self-test
        run: bash scripts/check-coverage-excludes_test.sh

      - name: Run check-coverage-excludes.sh
        run: bash scripts/check-coverage-excludes.sh

  # ====================================================================
  # Slice 393 (Q-6) — assertion-density advisory (INFORMATIONAL).
  #
  # Wires scripts/assertion-density.sh (shipped by slice 353) into CI as
  # an informational, NON-blocking check. The script counts assertion
  # calls per Go test file and warns where the density is below threshold
  # (a cheap mutation-testing proxy, slice 333 finding Q-6). It is
  # advisory by design — exit 0 even with warnings (slice 353 D7,
  # anti-criterion P0-393-2).
  #
  # Why informational (not required): the density heuristic has known
  # noise (table-driven tests, golden-file comparisons that assert via
  # one helper call). Promoting to required would force contributors to
  # justify every flagged file — the wrong ergonomic for a hygiene
  # signal. Mirrors the slice 120 phantom-deps / slice 089 npm-audit
  # informational-job pattern: continue-on-error + a sticky PR comment.
  #
  # Local repro: `bash scripts/assertion-density.sh`
  #   self-test: `bash scripts/assertion-density_test.sh`
  # See slice 353 (Q-6) + slice 393.
  # ====================================================================
  assertion-density:
    name: QA · assertion density
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Slice 699: full history so `git diff origin/main...HEAD` can scope
          # the sticky comment to the test files THIS PR changed (the underlying
          # whole-repo check below still scans every file — only the comment is
          # diff-scoped).
          fetch-depth: 0

      - name: Run assertion-density self-test
        run: bash scripts/assertion-density_test.sh

      - name: Run assertion-density.sh
        id: density
        run: |
          # Advisory by design: the script always exits 0 (warnings go to
          # stderr). Capture both streams for the sticky PR comment.
          # AC-4: this whole-repo scan is the CHECK and is UNCHANGED — it still
          # runs over every *_test.go and reports the same below-threshold count.
          set +e
          bash scripts/assertion-density.sh > density.txt 2> density.warn
          rc=$?
          set -e
          # Count below-threshold files from the JSON view (deterministic).
          # Also persist the JSON so the comment step can diff-scope its rows.
          DENSITY_FORMAT=json bash scripts/assertion-density.sh > density.json
          below=$(jq -r '.below_threshold' density.json)
          echo "below=$below" >> "$GITHUB_OUTPUT"
          echo "assertion-density below-threshold file(s): $below"
          cat density.txt
          cat density.warn || true
          exit "$rc"

      - name: Scope below-threshold findings to PR-changed files
        id: scope
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          # Slice 699 (AC-1): render only the below-threshold test files that
          # THIS PR touched. `git diff --name-only origin/<base>...HEAD` yields
          # repo-relative paths (no leading ./); the density JSON keys files as
          # ./<path>, so we strip the ./ before matching.
          git fetch --no-tags --depth=0 origin "${BASE_REF}" >/dev/null 2>&1 || \
            git fetch --no-tags origin "${BASE_REF}" >/dev/null 2>&1 || true
          git diff --name-only "origin/${BASE_REF}...HEAD" -- '*_test.go' \
            | sort -u > changed-tests.txt || true
          changed_count=$(wc -l < changed-tests.txt | tr -d ' ')
          echo "changed test file(s): ${changed_count}"
          # Filter the below-threshold rows to the changed set.
          jq -r '.rows[] | select(.below_threshold == true) | .file | ltrimstr("./")' \
            density.json | sort -u > below-all.txt
          # Intersection: below-threshold AND changed-in-this-PR.
          comm -12 below-all.txt changed-tests.txt > below-changed.txt || true
          scoped_count=$(wc -l < below-changed.txt | tr -d ' ')
          echo "scoped=${scoped_count}" >> "$GITHUB_OUTPUT"
          echo "below-threshold findings in changed files: ${scoped_count}"

      - name: Build comment body
        run: |
          {
            echo "<!-- atlas-assertion-density-marker -->"
            echo "## QA · assertion density (slice 353 Q-6)"
            echo
            scoped="${{ steps.scope.outputs.scoped }}"
            below="${{ steps.density.outputs.below }}"
            if [ "$scoped" -eq 0 ]; then
              echo "No assertion-density findings in the test files this PR changed."
              echo
              echo "(Whole-repo scan still reports ${below} file(s) below the "
              echo "1-assertion-per-20-LOC threshold; the full census is the status "
              echo "check + the \`assertion-density-report\` artifact, scoped out of "
              echo "this comment per slice 699.)"
            else
              echo "${scoped} test file(s) **changed in this PR** fall below the "
              echo "assertion-density threshold (fewer than 1 assertion per 20 LOC). "
              echo "Low density often means a test exercises code for coverage "
              echo "without asserting on the result:"
              echo
              echo '```'
              # Render only the warn lines for the changed-and-below files.
              while IFS= read -r f; do
                grep -F -- "./${f}:" density.warn || true
              done < below-changed.txt
              echo '```'
              echo
              echo "(Whole-repo scan reports ${below} file(s) below threshold; the "
              echo "full census is the \`assertion-density-report\` artifact.)"
            fi
            echo
            echo "---"
            echo "_Advisory only — this does NOT block the merge (slice 353 D7). Reproduce locally: \`bash scripts/assertion-density.sh\`. Slice 393 · ${{ github.run_id }}._"
          } > density-comment.md

      - name: Post or update sticky PR comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          existing=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | startswith("<!-- atlas-assertion-density-marker -->")) | .id' \
            | head -1)
          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/${existing}" \
              -f body="$(cat density-comment.md)" >/dev/null
            echo "Updated existing sticky comment id=$existing"
          else
            gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body-file density-comment.md
            echo "Posted new sticky comment"
          fi

      - name: Upload assertion-density report as artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: assertion-density-report
          path: |
            density.txt
            density.warn
            density.json
            below-changed.txt
            density-comment.md
          if-no-files-found: warn

  assertion-density-stub:
    name: QA · assertion density
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - run: echo "Non-PR push OR docs-only change — assertion-density advisory skipped (slice 393)."

  # ====================================================================
  # Slice 631 — fail-closed merge-gate aggregator (mechanism (a)).
  #
  # THE HOLE THIS CLOSES (slice 474 / parent slice 633 D6): a required
  # check can be RED — or, worse, *never actually run* (path-filter
  # skipped, or concurrency-cancelled mid-flight) — at merge time and the
  # merge still completes. Branch protection's "require status checks to
  # pass" reliably blocks a check that ran and reported RED, but it treats
  # a required check that ended `skipped`/`cancelled`/`neutral`
  # inconsistently across the skipped-vs-pending distinction. Slice 474
  # merged with `Go · integration (shard A)` a real 10m21s FAIL; the
  # regression then hid on `main` for ~3 weeks because every subsequent
  # `main` commit either (1) path-filter-SKIPPED the shard legs
  # (docs/status-only commits don't touch Go paths) or (2) had its `main`
  # run CONCURRENCY-CANCELLED by the next merge before the shard leg
  # completed. So no *completed* shard-A run on `main` re-caught it. This
  # is the `CI path-filter as gap-multiplier` pattern (project memory):
  # the first PR to exercise a filtered path to completion surfaces the
  # accumulated breakage.
  #
  # FAIL-CLOSED LOGIC (the load-bearing part — read carefully):
  #
  #   * This job runs with `if: always()` and `needs:` every required,
  #     path-filterable leg + the `changes` job. `always()` guarantees it
  #     runs EVEN WHEN an upstream leg failed/was-cancelled/was-skipped —
  #     without it, a failed `needs:` would SKIP this job, and a skipped
  #     required check is exactly the hole we are closing.
  #
  #   * It distinguishes the two legitimate worlds via the path-filter
  #     output `needs.changes.outputs.code`:
  #       - code == 'false' (docs/status-only PR): the real legs are
  #         legitimately `skipped` (their stub-twins post the green named
  #         checks). The gate PASSES — we do NOT make docs-only PRs pay
  #         the full matrix (preserves the slice-061 cost optimization).
  #       - code == 'true' (Go-affecting PR — this very PR touches
  #         `.github/workflows/**`, which is in the `code` filter): EVERY
  #         required leg below MUST be `success`. Any leg that is
  #         `failure`, `cancelled`, OR `skipped` fails this gate CLOSED.
  #         `skipped`-while-needed is the exact slice-474 hole: a Go PR
  #         whose shard leg never ran must NOT be mergeable.
  #
  #   * `tests-integration-shard` is a matrix (legs A/B1/B2/B3/B4). A matrix
  #     job's `result` in `needs` is the AGGREGATE: `success` only if every
  #     leg succeeded; `failure` if any leg failed; `cancelled` if any was
  #     cancelled. So one RED shard ⇒ aggregate `failure` ⇒ gate RED. This
  #     is the precise signal slice 474 lacked at the branch-protection
  #     layer (the per-leg `Go · integration (shard ...)` checks are NOT in
  #     the required-contexts list; only the roll-up name was, and the
  #     roll-up could be cancelled/skipped without blocking).
  #
  # WHY AN AGGREGATOR (mechanism a) RATHER THAN (b) PATHS-FILTER FIX OR
  # (c) POST-MERGE CANARY ALONE: (b) cannot fix GitHub's skipped-vs-pending
  # required-check treatment from inside a workflow; (c) only detects
  # AFTER merge. The aggregator BLOCKS before merge and is the single name
  # branch protection can require, collapsing the skipped/cancelled/failed
  # ambiguity into one deterministic `success`-or-RED signal. See
  # docs/audit-log/631-ci-red-shard-merge-guard-decisions.md.
  #
  # CONSERVATIVE-BY-DESIGN: a normal GREEN Go PR has every leg `success`,
  # so the gate is GREEN. A docs-only PR has `code == 'false'`, so the
  # gate short-circuits GREEN. The ONLY way this gate is RED is a real
  # failed/cancelled/skipped-but-needed leg — which is exactly when the
  # merge SHOULD be blocked. It adds no new failure mode for a clean PR.
  #
  # MAINTAINER HAND-OFF (cannot be done from a PR): add the check name
  # `CI · merge-gate` to `.github/branch-protection.json`'s
  # `required_status_checks.contexts` and apply it to live branch
  # protection via `bash scripts/apply-branch-protection.sh`. Until that
  # is done, this gate runs and reports but does NOT block — it is
  # advisory. See the decisions log "branch-protection hand-off" section.
  # ====================================================================
  merge-gate:
    name: CI · merge-gate
    needs:
      - changes
      - build-go
      - tests-integration-shard
      - tests-integration
      - lint-go
      - sqlc-drift
      - proto
      - build-frontend
      - frontend-playwright
      - lint-python
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - name: Evaluate fail-closed merge-gate
        env:
          # Whether this PR/push touches Go-affecting paths (dorny/paths-filter).
          CODE: ${{ needs.changes.outputs.code }}
          # Per-leg results. For the matrix `tests-integration-shard`, this
          # is the AGGREGATE result across legs A/B1/B2/B3 (failure if any
          # leg failed, cancelled if any was cancelled, success only if all
          # legs succeeded).
          R_BUILD_GO: ${{ needs.build-go.result }}
          R_SHARDS: ${{ needs.tests-integration-shard.result }}
          R_INTEGRATION: ${{ needs.tests-integration.result }}
          R_LINT_GO: ${{ needs.lint-go.result }}
          R_SQLC: ${{ needs.sqlc-drift.result }}
          R_PROTO: ${{ needs.proto.result }}
          R_FRONTEND_BUILD: ${{ needs.build-frontend.result }}
          R_PLAYWRIGHT: ${{ needs.frontend-playwright.result }}
          R_PYTHON: ${{ needs.lint-python.result }}
        run: |
          set -euo pipefail

          # Docs/status-only PR: the real legs are legitimately `skipped`
          # (their slice-061 stub-twins post the green named checks). Pass —
          # we do NOT make a no-Go PR pay the full matrix (AC-2). This is
          # the ONLY branch where a `skipped` leg is acceptable.
          if [ "${CODE:-}" != "true" ]; then
            echo "code='${CODE:-}' (no Go-affecting changes) — required legs legitimately skipped; merge-gate PASSES."
            exit 0
          fi

          echo "code='true' (Go-affecting PR) — every required leg MUST be 'success'."
          echo "A leg that is failure/cancelled/skipped fails this gate CLOSED (slice 474 hole)."
          echo

          fail=0
          # require <leg-display-name> <result>
          # PASS only on exactly 'success'. Anything else — failure,
          # cancelled, or skipped-while-Go-changes-present — is fail-closed.
          require() {
            local name="$1" result="$2"
            if [ "$result" = "success" ]; then
              echo "  OK    ${name}: ${result}"
            else
              echo "  BLOCK ${name}: ${result}  <-- not 'success' on a Go-affecting PR" >&2
              fail=1
            fi
          }

          require "Go · build + test"                 "$R_BUILD_GO"
          require "Go · integration (shard matrix)"    "$R_SHARDS"
          require "Go · integration (Postgres RLS)"    "$R_INTEGRATION"
          require "Go · lint"                          "$R_LINT_GO"
          require "Go · sqlc generate diff"            "$R_SQLC"
          require "Proto · lint + generate diff"       "$R_PROTO"
          require "Frontend · install + build"         "$R_FRONTEND_BUILD"
          require "Frontend · Playwright e2e"          "$R_PLAYWRIGHT"
          require "Python · ruff"                      "$R_PYTHON"

          if [ "$fail" -ne 0 ]; then
            echo >&2
            echo "merge-gate is RED: a required leg did not succeed on a Go-affecting PR." >&2
            echo "This blocks the merge by design (slice 631). A RED/cancelled/skipped" >&2
            echo "required integration shard cannot slip through (the slice 474 regression)." >&2
            exit 1
          fi
          echo
          echo "merge-gate PASSES: every required leg succeeded on this Go-affecting PR."

  # ====================================================================
  # Slice 631 — post-merge main-branch shard CANARY (mechanism (c),
  # defense-in-depth alongside the merge-gate above).
  #
  # The merge-gate blocks BEFORE merge. This canary is the orthogonal
  # AFTER-merge safety net for the second masking mechanism slice 474 fell
  # through: a `main` run cancelled by the next merge's concurrency group
  # before the shard leg completed. It re-runs the FULL shard matrix on
  # `main` UNCANCELLABLY (its own concurrency group with
  # cancel-in-progress: false) and UNCONDITIONALLY (no `changes.code` path
  # filter), so a regression that somehow slipped past the gate — or a
  # docs-only `main` push that would otherwise skip the shards — still gets
  # a completed shard run on the next `main` push rather than weeks later.
  #
  # Scope discipline: this job runs ONLY on push-to-main (never on a PR),
  # so it never sits on the merge-blocking critical path and never slows a
  # PR. It is NOT a required check (it cannot be — it only exists on
  # `main` pushes). A RED canary surfaces as a red `main` build + the next
  # PR's branch (strict: true rebases onto main) inheriting the signal.
  #
  # It reuses scripts/run-integration-shard.sh — the SAME source-of-truth
  # the PR-time `tests-integration-shard` job uses — so there is no second
  # package list to drift (the slice-417 shard manifest stays canonical).
  # ====================================================================
  tests-integration-main-canary:
    name: Go · integration canary (main, shard ${{ matrix.leg }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Own concurrency group with cancel-in-progress: false so a rapid
    # sequence of main merges cannot cancel an in-flight canary leg before
    # it completes — the exact masking mechanism (2) from slice 474. Keyed
    # off the leg too so the legs of one push don't cancel each other.
    concurrency:
      group: ci-main-canary-${{ github.sha }}-${{ matrix.leg }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Slice 747: added B4 + B5 so the main-canary covers the same legs as
        # the PR-time tests-integration-shard matrix (one source of truth:
        # scripts/integration-shards.txt). Keep these two leg lists in lockstep.
        leg: [A, B1, B2, B3, B4, B5]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: security_atlas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/security_atlas?sslmode=disable
      ATLAS_APP_PASSWORD: ${{ secrets.CI_ATLAS_APP_PASSWORD || 'ci-ephemeral' }}
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_BUCKET: atlas-artifacts-test
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      NATS_URL: nats://localhost:4222
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"
          cache: true
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: "v3.0.6"
      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live; then
              echo "minio ready"; break
            fi
            sleep 2
          done
          docker run --rm --network host \
            -e MC_HOST_local=http://minioadmin:minioadmin@localhost:9000 \
            minio/mc mb -p local/atlas-artifacts-test
      - name: Start NATS JetStream
        run: |
          docker run -d --name nats \
            -p 4222:4222 \
            -p 8222:8222 \
            nats:2.10-alpine -js -sd /data --http_port 8222
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8222/healthz; then
              echo "nats ready"; break
            fi
            sleep 2
          done
      - name: Bootstrap roles
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f migrations/bootstrap/01-roles.sql
      - name: Set role passwords (CI-scoped)
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 \
            -c "ALTER ROLE atlas_app PASSWORD '$ATLAS_APP_PASSWORD'"
          echo "DATABASE_URL_APP=postgres://atlas_app:$ATLAS_APP_PASSWORD@localhost:5432/security_atlas?sslmode=disable" >> "$GITHUB_ENV"
      - name: Apply forward migrations
        run: |
          for f in migrations/sql/*.sql; do
            case "$f" in
              *.down.sql) ;;
              *) echo "applying $f"; psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f" ;;
            esac
          done
      - name: Run integration shard (-p 1 within the leg)
        run: |
          GO_TEST_EXTRA="-race" \
            bash scripts/run-integration-shard.sh "${{ matrix.leg }}" coverage.txt
