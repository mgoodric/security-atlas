name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-go:
    name: Go · build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod
          if [ -f go.sum ]; then git diff --exit-code -- go.sum; fi
      - name: Build all packages
        run: go build ./...
      - name: Run unit tests
        run: go test -race ./...

  tests-integration:
    name: Go · integration (Postgres RLS)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: security_atlas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/security_atlas?sslmode=disable
      # The app role's password is set by a step below from a workflow-scoped
      # value, then injected into DATABASE_URL_APP for the test step.
      ATLAS_APP_PASSWORD: ${{ secrets.CI_ATLAS_APP_PASSWORD || 'ci-ephemeral' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: Install Atlas CLI
        run: curl -sSfL https://atlasgo.sh | sh -s -- --community
      - name: Bootstrap roles
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f migrations/bootstrap/01-roles.sql
      - name: Set role passwords (CI-scoped)
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 \
            -c "ALTER ROLE atlas_app PASSWORD '$ATLAS_APP_PASSWORD'"
          echo "DATABASE_URL_APP=postgres://atlas_app:$ATLAS_APP_PASSWORD@localhost:5432/security_atlas?sslmode=disable" >> "$GITHUB_ENV"
      - name: Regenerate Atlas hash + apply migrations
        run: |
          atlas migrate hash --dir file://migrations/sql
          atlas migrate apply -c file://migrations/atlas.hcl --env local
      - name: Run integration tests
        run: go test -tags=integration -race -v ./internal/db/...
      - name: Migration round-trip — down then up
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f migrations/sql/20260511000000_init.down.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "DROP TABLE IF EXISTS atlas_schema_revisions"
          # Verify no user tables / enum types remain.
          remaining_tables=$(psql "$DATABASE_URL" -t -A -c "SELECT count(*) FROM pg_class WHERE relnamespace = 'public'::regnamespace AND relkind = 'r'")
          remaining_types=$(psql "$DATABASE_URL" -t -A -c "SELECT count(*) FROM pg_type WHERE typnamespace = 'public'::regnamespace AND typtype = 'e'")
          if [ "$remaining_tables" != "0" ] || [ "$remaining_types" != "0" ]; then
            echo "down migration left $remaining_tables tables + $remaining_types enums"
            exit 1
          fi
          # Re-apply forward to prove up→down→up cleanliness.
          atlas migrate apply -c file://migrations/atlas.hcl --env local

  lint-go:
    name: Go · lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  build-frontend:
    name: Frontend · install + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install workspaces
        run: npm install --no-audit --no-fund
      - name: Build web workspace
        run: npm run build --workspace @security-atlas/web --if-present
      - name: Build sdk-typescript workspace
        run: npm run build --workspace @security-atlas/sdk --if-present

  lint-python:
    name: Python · ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff==0.7.0
      - run: ruff check .
      - run: ruff format --check .

  precommit:
    name: pre-commit · all hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: pip install pre-commit==3.8.0
      - name: Validate config
        run: pre-commit validate-config
      - name: Run all hooks against all files
        run: pre-commit run --all-files --show-diff-on-failure
