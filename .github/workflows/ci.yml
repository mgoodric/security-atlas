      - run: echo "Docs-only change — skipped per dorny/paths-filter@v4 (slice 061)."

  lint-python:
    name: Python · ruff
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
          disable-sudo: true

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # Slice 697 — run ruff via `uv tool run` (the pattern the oscal-bridge
      # job already uses) so setup-uv's enable-cache keys the ruff install on
      # the runner. A bare `cache: pip` on setup-python would no-op here:
      # there is no requirements file for it to hash. Ruff stays pinned to
