name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Slice 061 — path-based filtering for docs-only PRs.
#
# Why this pattern (not `paths-ignore:` at workflow `on:` level):
#
# Branch protection (`.github/branch-protection.json`) requires named status
# checks to report success on every PR. If we filtered the workflow itself
# with `paths-ignore:`, docs-only PRs would never trigger the workflow and
# the required check names would stay "Expected — waiting for status to be
# reported" forever — the merge button stays disabled.
#
# Instead, the workflow ALWAYS runs. A `changes` job runs first and uses
# `dorny/paths-filter@v3` to set a `code` boolean output. Each expensive
# job is split into a real job (gated `if: ...code == 'true'`) and a stub
# sibling with the IDENTICAL `name:` (gated `if: ...code != 'true'`). The
# two jobs are mutually exclusive — exactly one runs per PR — and GitHub
# posts a single named check for that job name. Branch protection sees the
# check resolve green on docs-only PRs in < 30 s instead of ~5 min.
#
# Security/secret-scan jobs (CodeQL via `codeql.yml`, GitGuardian via its
# GitHub App, pre-commit below) are intentionally unconditional. Path
# filtering is a cost optimization for build/test/lint, never a security
# exemption.
#
# Full docs: `docs/ci/PATH_FILTERING.md`.

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          # `code: true` if ANY of these patterns match the PR diff (or the
          # push commit on main). Anything else — markdown, plan docs,
          # license, changelog — is `code: false` and the expensive jobs
          # short-circuit via stub-sibling.
          filters: |
            code:
              - '**/*.go'
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.js'
              - '**/*.py'
              - 'go.mod'
              - 'go.sum'
              - 'go.work'
              - 'go.work.sum'
              - 'package.json'
              - 'package-lock.json'
              - '**/package.json'
              - '**/package-lock.json'
              - 'pnpm-lock.yaml'
              - 'migrations/**'
              - 'sql/**'
              - 'proto/**'
              - 'policies/**'
              - 'schemas/**'
              - 'connectors/**'
              - 'web/**'
              - 'internal/**'
              - 'cmd/**'
              - 'pkg/**'
              - 'oscal-bridge/**'
              - 'gen/**'
              - 'Dockerfile*'
              - '**/Dockerfile'
              - 'docker-compose*.yml'
              - 'deploy/**'
              - '.github/workflows/**'
              - 'justfile'
              - '.golangci.yml'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'atlas.hcl'
              - '.pre-commit-config.yaml'
              - 'buf.yaml'
              - 'buf.gen.yaml'
              - 'scripts/**'

  build-go:
    name: Go · build + test
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod
          if [ -f go.sum ]; then git diff --exit-code -- go.sum; fi
      - name: Build all packages
        run: go build ./...
      - name: Run unit tests
        run: go test -race -covermode=atomic -coverprofile=coverage.txt ./...
      # Slice 069 — Go coverage gate. Reads coverage.txt produced by the
      # step above + cmd/scripts/coverage-thresholds.json and exits
      # non-zero if any package's measured coverage falls below its floor.
      # Floors are derived from a measured-minus-2pp run on main; they
      # ratchet, never stretch (slice 069 P0-A4). Raise a floor by
      # writing the missing tests AND lifting the threshold in the same
      # follow-up PR — never one without the other.
      - name: Go · coverage gate
        run: go run ./cmd/scripts/coverage-gate -profile=coverage.txt
      - name: Upload unit coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.txt
          flags: unittests
          fail_ci_if_error: false
      - name: Upload coverage profile as workflow artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: go-unit-coverage
          path: coverage.txt
          if-no-files-found: warn

  # Slice 061 stub: posts pass under the SAME required-check name
  # (`Go · build + test`) when the PR touches no code. Mutually exclusive
  # with `build-go` above via inverted `if:`.
  build-go-stub:
    name: Go · build + test
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docs-only change — skipped per dorny/paths-filter@v4 (slice 061)."

  tests-integration:
    name: Go · integration (Postgres RLS)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: security_atlas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      # Slice 036 MinIO is started as a workflow step below rather than a
      # `services:` entry because GitHub Actions service containers do not
      # support a `command` / args override, and the official
      # `minio/minio` image needs `server /data` passed explicitly. Started
      # via `docker run` in the `Start MinIO` step.
      #
      # Slice 015 NATS JetStream follows the same pattern (the `nats`
      # image needs `-js -sd /data` passed explicitly). Started via
      # `docker run` in the `Start NATS JetStream` step.
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/security_atlas?sslmode=disable
      # The app role's password is set by a step below from a workflow-scoped
      # value, then injected into DATABASE_URL_APP for the test step.
      ATLAS_APP_PASSWORD: ${{ secrets.CI_ATLAS_APP_PASSWORD || 'ci-ephemeral' }}
      # Slice 036 — MinIO endpoint reachable from the runner.
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_BUCKET: atlas-artifacts-test
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      # Slice 015 — NATS JetStream endpoint reachable from the runner.
      NATS_URL: nats://localhost:4222
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          # Wait for readiness (up to ~60s).
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live; then
              echo "minio ready"; break
            fi
            sleep 2
          done
          # Create the test bucket using a short-lived mc container. The
          # MinIO admin client (`mc`) is the canonical bucket-bootstrap
          # tool. We inject the alias via the MC_HOST_<alias> env var so
          # the single `mc mb` invocation has the alias without needing a
          # separate `mc alias set` call (which would write config to
          # ~/.mc/ that doesn't persist across `docker run` invocations).
          docker run --rm --network host \
            -e MC_HOST_local=http://minioadmin:minioadmin@localhost:9000 \
            minio/mc mb -p local/atlas-artifacts-test
      - name: Start NATS JetStream
        run: |
          docker run -d --name nats \
            -p 4222:4222 \
            -p 8222:8222 \
            nats:2.10-alpine -js -sd /data --http_port 8222
          # Wait for readiness via the monitoring endpoint (up to ~60s).
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8222/healthz; then
              echo "nats ready"; break
            fi
            sleep 2
          done
      - name: Bootstrap roles
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f migrations/bootstrap/01-roles.sql
      - name: Set role passwords (CI-scoped)
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 \
            -c "ALTER ROLE atlas_app PASSWORD '$ATLAS_APP_PASSWORD'"
          echo "DATABASE_URL_APP=postgres://atlas_app:$ATLAS_APP_PASSWORD@localhost:5432/security_atlas?sslmode=disable" >> "$GITHUB_ENV"
      - name: Apply forward migrations
        run: |
          for f in migrations/sql/*.sql; do
            case "$f" in
              *.down.sql) ;;
              *) echo "applying $f"; psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f" ;;
            esac
          done
      - name: Audit RLS coverage (slice 033)
        # Constitutional invariant 6: every tenant-scoped table must carry
        # an RLS policy + FORCE. Audit runs against atlas_migrate (DATABASE_URL)
        # so pg_catalog reads are not RLS-filtered. See scripts/audit-rls.sh
        # and docs/architecture/rls.md.
        run: ./scripts/audit-rls.sh
      - name: Run integration tests
        # `-p 1` serializes test packages so multiple binaries do not
        # race on the shared Postgres test database. The db,
        # schemaregistry, and evidence/ingest packages share rows in
        # evidence_kind_schemas and evidence_records; running them
        # concurrently surfaces duplicate-key + missing-relation errors
        # that disappear under serial execution. Local reproducer:
        #   go test -tags=integration -race -p 1 ./internal/...
        run: |
          go test -tags=integration -race -p 1 -v \
            -covermode=atomic \
            -coverprofile=coverage.txt \
            -coverpkg=./... \
            ./internal/db/... \
            ./internal/api/scfimport/... \
            ./internal/api/anchors/... \
            ./internal/api/schemaregistry/... \
            ./internal/evidence/ingest/... \
            ./internal/evidence/streambuf/... \
            ./internal/artifact/... \
            ./internal/api/artifacts/... \
            ./internal/api/policyacks/... \
            ./internal/featureflag/... \
            ./internal/api/features/... \
            ./internal/eval/... \
            ./internal/api/controlstate/... \
            ./internal/decision/... \
            ./internal/api/dashboard/... \
            ./internal/api/risks/... \
            ./internal/authz/... \
            ./internal/control/...
      - name: Upload integration coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.txt
          flags: integration
          fail_ci_if_error: false
      - name: Migration round-trip — down then up
        run: |
          # Walk down migrations in reverse-alphabetical order (latest down first).
          for f in $(ls -r migrations/sql/*.down.sql); do
            echo "rolling back $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done
          remaining_tables=$(psql "$DATABASE_URL" -t -A -c "SELECT count(*) FROM pg_class WHERE relnamespace = 'public'::regnamespace AND relkind = 'r'")
          remaining_types=$(psql "$DATABASE_URL" -t -A -c "SELECT count(*) FROM pg_type WHERE typnamespace = 'public'::regnamespace AND typtype = 'e'")
          if [ "$remaining_tables" != "0" ] || [ "$remaining_types" != "0" ]; then
            echo "down migrations left $remaining_tables tables + $remaining_types enums"
            exit 1
          fi
          # Re-apply forwards to prove up→down→up cleanliness.
          for f in migrations/sql/*.sql; do
            case "$f" in
              *.down.sql) ;;
              *) echo "re-applying $f"; psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f" ;;
            esac
          done

  tests-integration-stub:
    name: Go · integration (Postgres RLS)
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docs-only change — skipped per dorny/paths-filter@v4 (slice 061)."

  lint-go:
    name: Go · lint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  lint-go-stub:
    name: Go · lint
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docs-only change — skipped per dorny/paths-filter@v4 (slice 061)."

  proto:
    name: Proto · lint + generate diff
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true
      - name: Lint protos
        run: buf lint
      - name: Generate Go bindings + assert no diff
        run: |
          buf generate
          git diff --exit-code -- gen/proto || (echo "gen/proto changed; run 'just proto-generate' locally and commit" && exit 1)

  proto-stub:
    name: Proto · lint + generate diff
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docs-only change — skipped per dorny/paths-filter@v4 (slice 061)."

  build-frontend:
    name: Frontend · install + build
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - name: Install workspaces
        run: npm install --no-audit --no-fund
      - name: Build web workspace
        run: npm run build --workspace @security-atlas/web --if-present
      - name: Build sdk-typescript workspace
        run: npm run build --workspace @security-atlas/sdk --if-present

  build-frontend-stub:
    name: Frontend · install + build
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docs-only change — skipped per dorny/paths-filter@v4 (slice 061)."

  lint-python:
    name: Python · ruff
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install ruff==0.7.0
      - run: ruff check .
      - run: ruff format --check .

  lint-python-stub:
    name: Python · ruff
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docs-only change — skipped per dorny/paths-filter@v4 (slice 061)."

  # Slice 061: pre-commit is INTENTIONALLY unconditional. It auto-formats
  # markdown (prettier) and YAML; we want it to run on docs-only PRs so
  # formatting nits never slip through. ~30 s on a docs PR is acceptable.
  precommit:
    name: pre-commit · all hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
      - run: pip install pre-commit==3.8.0
      - name: Validate config
        run: pre-commit validate-config
      - name: Run all hooks against all files
        run: pre-commit run --all-files --show-diff-on-failure

  # ===========================================================================
  # Slice 030 — OSCAL bridge (Python). Self-contained job block: lints +
  # tests the oscal-bridge/ Python service (compliance-trestle + gRPC).
  # Kept as a clearly-delimited append so parallel branches editing this
  # file (e.g. slice 065's test-self-host-bundle job) rebase cleanly.
  # Gated on `changes.code` like the other expensive jobs, with a
  # mutually-exclusive stub sibling under the same check name.
  # ===========================================================================
  oscal-bridge:
    name: OSCAL bridge · Python (ruff + pytest)
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Set up Python
        run: uv python install 3.11
      - name: Sync oscal-bridge env
        working-directory: oscal-bridge
        run: uv sync --extra test
      - name: Lint (ruff)
        run: |
          uv tool run ruff@0.7.0 check oscal-bridge
          uv tool run ruff@0.7.0 format --check oscal-bridge
      - name: Test (pytest — unit + in-process gRPC server)
        working-directory: oscal-bridge
        run: PYTHONPATH=. uv run --extra test python -m pytest tests/ -q

  oscal-bridge-stub:
    name: OSCAL bridge · Python (ruff + pytest)
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docs-only change — skipped per dorny/paths-filter@v4 (slice 061)."

  # ====================================================================
  # Slice 065 — self-host bundle end-to-end test.
  #
  # This block is appended as a self-contained job so it rebase-merges
  # cleanly alongside other in-flight ci.yml edits. It brings the
  # docker-compose self-host bundle up against a fresh checkout in TWO
  # deploy shapes and asserts the slice-037 acceptance criteria actually
  # pass — covering slice 065 AC-7 (bootstrap idempotency on re-run),
  # AC-9 (bootstrap against a non-superuser / shared Postgres) and AC-12
  # (end-to-end install in both deploy shapes). The assertion logic lives
  # in deploy/docker/test-self-host-bundle.sh; this job just runs it once
  # per matrix mode.
  #
  # Gated on the same `changes.code` path filter as the other expensive
  # jobs (deploy/** and migrations/** are both in the filter, so any PR
  # that touches the bundle runs this). No slice-061 stub sibling: the
  # job uses a `matrix`, so GitHub posts per-mode check names
  # (`... (bundled)` / `... (external)`) that a single-name stub could
  # not mirror, and this job is intentionally NOT yet in
  # .github/branch-protection.json's required-checks list — so a
  # docs-only PR simply skips it with no "waiting for status" hang.
  # Promote it to a required check (and add the matrix-named stubs) in a
  # follow-up once it has a few green runs.
  # ====================================================================
  test-self-host-bundle:
    name: Self-host bundle · end-to-end
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [bundled, external]
    steps:
      - uses: actions/checkout@v6
      - name: Run self-host bundle smoke test (${{ matrix.mode }})
        run: deploy/docker/test-self-host-bundle.sh ${{ matrix.mode }}
      - name: Dump compose logs on failure
        if: failure()
        run: |
          # docker-compose.yml uses `${VAR:?}` required-variable guards
          # (POSTGRES_PASSWORD, MINIO_ROOT_USER, ...), so a bare
          # `docker compose ... logs` aborts with "required variable ...
          # is missing a value" before printing anything — `--env-file`
          # is required even for `logs`.
          #
          # The harness's own `cleanup()` EXIT trap `rm -f`s
          # deploy/docker/.env.test, so by the time this failure step
          # runs that file is GONE — we cannot point `--env-file` at it.
          # The values do not matter for `logs` (compose only needs the
          # guards satisfied to parse the file), so write a throwaway
          # stub env file here and use that.
          cat > /tmp/compose-logs.env <<'STUB'
          POSTGRES_PASSWORD=x
          ATLAS_APP_PASSWORD=x
          MINIO_ROOT_USER=x
          MINIO_ROOT_PASSWORD=x
          BEARER_HASH_KEY=x
          ATLAS_BOOTSTRAP_TOKEN=x
          ATLAS_DEFAULT_USER_PASSWORD=x
          DATABASE_URL_APP=x
          DATABASE_URL_MIGRATE=x
          STUB
          docker compose -f deploy/docker/docker-compose.yml \
            --env-file /tmp/compose-logs.env \
            -p "sa-selfhost-${{ matrix.mode }}" logs || true

  # Slice 061 stub: posts pass under the SAME check name
  # (`Self-host bundle · end-to-end`) when the PR touches no code.
  # Mutually exclusive with `test-self-host-bundle` above via inverted
  # `if:`. The real job uses a matrix that produces `(bundled)` and
  # `(external)` expansions when it runs; the stub posts the base name
  # only — sufficient because this check is non-required and the only
  # purpose of the stub is to keep the rollup green on docs-only PRs.
  test-self-host-bundle-stub:
    name: Self-host bundle · end-to-end
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docs-only change — skipped per dorny/paths-filter@v4 (slice 061)."

  # ====================================================================
  # Slice 038 — Helm chart lint + template.
  #
  # Self-contained job block (appended like the slice-030 / slice-065
  # blocks above) so parallel branches editing ci.yml rebase cleanly.
  # Runs `helm lint` + `helm template` against deploy/helm/ with BOTH the
  # solo defaults and values-production.yaml, asserting the chart renders
  # valid manifests in both shapes. This is slice 038 AC-5.
  #
  # Gated on the same `changes.code` path filter as the other expensive
  # jobs (`deploy/**` is in the filter, so any PR touching the chart runs
  # this) with a mutually-exclusive stub sibling under the same check
  # name (slice-061 pattern), so docs-only PRs resolve the check in < 30s.
  #
  # NOT yet in .github/branch-protection.json's required-checks list —
  # like slice 065's `test-self-host-bundle`, it ships non-required and is
  # promoted to a required check after a few green runs.
  # ====================================================================
  helm-lint:
    name: Helm chart · lint + template
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-helm@v5
        with:
          version: v3.16.2
      - name: helm lint (default values)
        run: helm lint deploy/helm
      - name: helm lint (production values)
        run: helm lint deploy/helm -f deploy/helm/values-production.yaml
      - name: helm template (default values)
        run: helm template ci-default deploy/helm > /dev/null
      - name: helm template (production values)
        run: helm template ci-prod deploy/helm -f deploy/helm/values-production.yaml > /dev/null

  helm-lint-stub:
    name: Helm chart · lint + template
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docs-only change — skipped per dorny/paths-filter@v4 (slice 061)."

  # ====================================================================
  # Slice 069 — Frontend vitest.
  #
  # Self-contained job block (appended like slice-030 / slice-038 /
  # slice-065 blocks above) so parallel branches editing ci.yml rebase
  # cleanly. Runs the module-level vitest seed (`web/lib/*.test.ts` +
  # `web/app/api/**/*.test.ts`) and uploads the coverage summary as an
  # artifact. No coverage gate this slice — the data is collected to
  # inform a follow-up "raise the bar" slice.
  #
  # Gated on the same `changes.code` path filter as the other expensive
  # jobs with a mutually-exclusive stub sibling under the same check
  # name (slice-061 pattern), so docs-only PRs resolve the check in <30s.
  # ====================================================================
  frontend-vitest:
    name: Frontend · vitest
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - name: Install workspaces
        working-directory: .
        run: npm install --no-audit --no-fund
      - name: Run vitest (with coverage)
        run: npm run test:coverage
      - name: Upload coverage summary as workflow artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: frontend-vitest-coverage
          path: web/coverage/coverage-summary.json
          if-no-files-found: warn

  frontend-vitest-stub:
    name: Frontend · vitest
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docs-only change — skipped per dorny/paths-filter@v4 (slice 061)."

  # ====================================================================
  # Slice 069 — Frontend Playwright e2e.
  #
  # Self-contained job block. Brings up postgres 16 + nats 2.10 + minio
  # as service containers (postgres via the GHA `services:` block; nats
  # and minio via `docker run` because their official images need
  # `-js -sd /data` and `server /data` respectively, which `services:`
  # cannot pass — same pattern as the existing `Go · integration` job).
  # Then builds atlas + web from source, runs the bootstrap, and invokes
  # `npx playwright test` headless against the running stack.
  #
  # On failure the HTML report + traces + screenshots upload as a
  # workflow artifact so a maintainer can drag-drop the trace into
  # `npx playwright show-trace` locally for diagnosis.
  #
  # Gated on the same `changes.code` path filter as the other expensive
  # jobs with a mutually-exclusive stub sibling under the same check
  # name (slice-061 pattern), so docs-only PRs resolve the check in <30s.
  # ====================================================================
  frontend-playwright:
    name: Frontend · Playwright e2e
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    # Slice 079 — quarantine until the seed-data harness lands.
    #
    # Slice 069 (PR gh#132) wired this job and shipped it with AC-5
    # PARTIAL: the five un-shimmed specs (admin-bootstrap,
    # audit-workspace, control-detail, dashboard, risk-hierarchy)
    # reference seeded test users + tenant data that no harness applies
    # at job startup, so every run fails with "expected element not
    # visible"-shaped errors — predictable, not a flake. The job is NOT
    # in `.github/branch-protection.json`'s required-checks list, so
    # merges aren't blocked — only PR-status noise (84% of CI failure
    # surface as of 2026-05-15).
    #
    # `continue-on-error: true` at JOB level (not step level) so every
    # step's red exit is absorbed — the precondition steps (postgres /
    # NATS / MinIO startup, migrations, atlas+web build) flake for
    # reasons unrelated to seed data, and we still want the PR to merge
    # cleanly when they do. New failure modes still surface as warning
    # annotations on the PR; we keep the signal, drop the false alarm.
    #
    # Reverse this line when slice 082 (Playwright e2e seed-data
    # harness) lands. Slice 082 AC-4 explicitly tracks the flip-back.
    continue-on-error: true
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: security_atlas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/security_atlas?sslmode=disable
      ATLAS_APP_PASSWORD: ${{ secrets.CI_ATLAS_APP_PASSWORD || 'ci-ephemeral' }}
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_BUCKET: atlas-artifacts-test
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      NATS_URL: nats://localhost:4222
      ATLAS_HTTP_URL: http://localhost:8080
      PLATFORM_BASE_URL: http://localhost:3000
      # Slice 069 — neutral test token (P0-A9). The fixture injects this
      # value as the session cookie; the platform's bearer-auth path
      # accepts any token in dev / pre-OIDC mode (slice 005). When the
      # platform requires a real credential we'll swap to the
      # TEST_USER_EMAIL / TEST_USER_PASSWORD flow against a seeded user.
      TEST_BEARER: test-bearer-e2e
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live; then
              echo "minio ready"; break
            fi
            sleep 2
          done
          docker run --rm --network host \
            -e MC_HOST_local=http://minioadmin:minioadmin@localhost:9000 \
            minio/mc mb -p local/atlas-artifacts-test
      - name: Start NATS JetStream
        run: |
          docker run -d --name nats \
            -p 4222:4222 \
            -p 8222:8222 \
            nats:2.10-alpine -js -sd /data --http_port 8222
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8222/healthz; then
              echo "nats ready"; break
            fi
            sleep 2
          done
      - name: Bootstrap Postgres roles + migrations
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f migrations/bootstrap/01-roles.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 \
            -c "ALTER ROLE atlas_app PASSWORD '$ATLAS_APP_PASSWORD'"
          echo "DATABASE_URL_APP=postgres://atlas_app:$ATLAS_APP_PASSWORD@localhost:5432/security_atlas?sslmode=disable" >> "$GITHUB_ENV"
          for f in migrations/sql/*.sql; do
            case "$f" in
              *.down.sql) ;;
              *) echo "applying $f"; psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f" ;;
            esac
          done
      - name: Build atlas server
        run: go build -o /usr/local/bin/atlas ./cmd/atlas
      - name: Install web workspace
        working-directory: .
        run: npm install --no-audit --no-fund
      - name: Build web workspace
        working-directory: web
        run: npm run build
      - name: Install Playwright chromium
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Start atlas server
        run: |
          atlas serve > /tmp/atlas.log 2>&1 &
          echo "ATLAS_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health; then
              echo "atlas ready"; break
            fi
            sleep 2
          done
      - name: Start web server
        working-directory: web
        run: |
          (PORT=3000 npm start > /tmp/web.log 2>&1) &
          echo "WEB_PID=$!" >> "$GITHUB_ENV"
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/; then
              echo "web ready"; break
            fi
            sleep 2
          done
      - name: Run Playwright tests
        working-directory: web
        run: npx playwright test
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            web/playwright-report/
            web/test-results/
          if-no-files-found: warn
      - name: Dump server logs on failure
        if: failure()
        run: |
          echo "=== atlas log ==="
          cat /tmp/atlas.log || true
          echo "=== web log ==="
          cat /tmp/web.log || true

  frontend-playwright-stub:
    name: Frontend · Playwright e2e
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docs-only change — skipped per dorny/paths-filter@v4 (slice 061)."

  # ====================================================================
  # Slice 089 — Dependency vulnerability scanning.
  #
  # Three complementary scanners that close the "known-CVE-on-current-
  # version" gap Dependabot leaves open (Dependabot opens PRs when an
  # upgrade is available; says nothing when a package sits at a
  # vulnerable patch with no newer release):
  #
  #   1. Go · govulncheck      — Go's official call-graph-aware scanner
  #   2. Frontend · npm audit  — runtime-shipped JS deps in web/
  #   3. Container · Trivy scan — OS-package CVEs in the atlas image
  #
  # All three follow the slice-069 stub-job pattern: gated on
  # `changes.code`, with a mutually-exclusive stub sibling under the
  # same check name so docs-only PRs resolve the check in < 30s.
  #
  # None are added to `.github/branch-protection.json`'s required-checks
  # list (P0-A1). Newly-published CVEs would otherwise flake the merge
  # queue on PRs that didn't touch the affected dep. Promotion-to-
  # required is a future slice once the maintainer has observed
  # cadence + false-positive rate. See
  # docs/audit-log/089-dependency-vulnerability-scanning-decisions.md
  # for the threshold + suppression rationale.
  # ====================================================================
  govulncheck:
    name: Go · govulncheck
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      # Pinned version (not @latest) for reproducibility. Bump in a
      # dedicated PR so the diff is auditable. See decisions log D3.
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.3
      # govulncheck exits non-zero ONLY when a vulnerability is reachable
      # from the analyzed binary's call graph — call-graph filtering is
      # the highest signal-to-noise property of the tool. There is no
      # severity flag; reachability IS the threshold. See decisions log
      # D1. The text output also uploads as an artifact below for
      # maintainer triage.
      - name: Run govulncheck (text + sarif)
        id: vulncheck
        run: |
          set +e
          govulncheck -format text ./... | tee govulncheck.txt
          rc_text=$?
          govulncheck -format sarif ./... > govulncheck.sarif || true
          set -e
          echo "exit_code=$rc_text" >> "$GITHUB_OUTPUT"
          if [ "$rc_text" -ne 0 ]; then
            echo "::warning::govulncheck reported reachable vulnerabilities (see uploaded artifact)"
          fi
          exit "$rc_text"
      - name: Upload govulncheck report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: govulncheck-report
          path: |
            govulncheck.txt
            govulncheck.sarif
          if-no-files-found: warn

  govulncheck-stub:
    name: Go · govulncheck
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docs-only change — skipped per dorny/paths-filter@v4 (slice 061)."

  npm-audit:
    name: Frontend · npm audit
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
      - name: Install workspaces (production dependency tree only)
        # Use the lockfile-faithful install so audit sees the same
        # transitive tree the runtime will. --omit=dev keeps the
        # signal focused on what actually ships.
        run: npm ci --no-audit --no-fund
      # `--omit dev` drops dev-only findings (React testing libs,
      # eslint plugins, vitest plumbing) — the runtime-shipped tree is
      # what an attacker reaches. `--audit-level=high` bands the failure
      # threshold at HIGH+CRITICAL. See decisions log D1.
      - name: Run npm audit on web workspace
        id: audit
        run: |
          set +e
          npm audit --omit=dev --audit-level=high --workspace web | tee npm-audit.txt
          rc=$?
          npm audit --omit=dev --audit-level=high --workspace web --json > npm-audit.json || true
          set -e
          echo "exit_code=$rc" >> "$GITHUB_OUTPUT"
          if [ "$rc" -ne 0 ]; then
            echo "::warning::npm audit reported HIGH/CRITICAL vulnerabilities in the runtime tree (see uploaded artifact)"
          fi
          exit "$rc"
      - name: Upload npm-audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: npm-audit-report
          path: |
            npm-audit.txt
            npm-audit.json
          if-no-files-found: warn

  npm-audit-stub:
    name: Frontend · npm audit
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docs-only change — skipped per dorny/paths-filter@v4 (slice 061)."

  trivy-image:
    name: Container · Trivy scan
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Build the atlas image locally so Trivy has a target without
      # needing to push to a registry. The Dockerfile is the same one
      # release.yml uses; if a slice changes the Dockerfile, this job
      # picks the change up via the `changes.code` filter (which
      # includes deploy/**, Dockerfile*, and **/Dockerfile).
      - name: Build atlas image (local tag)
        run: |
          docker build \
            --file deploy/docker/atlas.Dockerfile \
            --tag atlas:trivy-scan \
            .
      # Pinned action version (not @latest) for reproducibility. The
      # action wraps Trivy CLI; see decisions log D3 for the upgrade
      # cadence. severity HIGH,CRITICAL + exit-code 1 implements the
      # AC-3 fail threshold. .trivyignore at repo root is honored if
      # present (it is NOT shipped this slice — see decisions log D2).
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: atlas:trivy-scan
          format: table
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          output: trivy-report.txt
      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-report
          path: trivy-report.txt
          if-no-files-found: warn

  trivy-image-stub:
    name: Container · Trivy scan
    needs: changes
    if: needs.changes.outputs.code != 'true'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docs-only change — skipped per dorny/paths-filter@v4 (slice 061)."
