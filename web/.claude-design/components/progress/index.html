<!-- @dsCard group="Feedback" name="Progress" subtitle="Acknowledgment bar · several values" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Progress — security-atlas Design System</title>
<link rel="stylesheet" href="../../_tokens.css" />
<style>
  /* Progress — translated from web/components/ui/progress.tsx (slice 101).
     A Radix-free passive bar: role="progressbar" with aria-valuenow.
     Track: h-1.5 (6px) w-16 (64px) rounded-full bg-muted, overflow-hidden.
     Indicator: h-full, width = value%, color via indicatorClassName (the
     default app usage fills with --primary). Shown here at several values
     plus a wider track for legibility. */
  .prog {
    height: 6px; width: 64px; overflow: hidden;
    border-radius: 9999px; background: var(--muted);
  }
  .prog--wide { width: 220px; }
  .prog__bar { height: 100%; background: var(--primary);
    border-radius: 9999px; transition: width .2s ease; }

  .prog-line { display: flex; align-items: center; gap: 12px;
    font-family: var(--font-sans); font-size: 0.8rem; color: var(--foreground); }
  .prog-line .caption { color: var(--muted-foreground);
    font-variant-numeric: tabular-nums; min-width: 9rem; }
</style>
</head>
<body>
<div class="ds-stages">
  <div class="ds-stage">
    <p class="ds-label">Acknowledgment progress — Light</p>
    <div class="ds-col">
      <div class="prog-line">
        <div class="prog" role="progressbar" aria-label="12 of 52 acknowledged · 23%" aria-valuenow="23" aria-valuemin="0" aria-valuemax="100"><div class="prog__bar" style="width:23%"></div></div>
        <span class="caption">12 of 52 · 23%</span>
      </div>
      <div class="prog-line">
        <div class="prog" role="progressbar" aria-label="47 of 52 acknowledged · 90%" aria-valuenow="90" aria-valuemin="0" aria-valuemax="100"><div class="prog__bar" style="width:90%"></div></div>
        <span class="caption">47 of 52 · 90%</span>
      </div>
      <div class="prog-line">
        <div class="prog prog--wide" role="progressbar" aria-label="Framework coverage · 64%" aria-valuenow="64" aria-valuemin="0" aria-valuemax="100"><div class="prog__bar" style="width:64%"></div></div>
        <span class="caption">SOC 2 coverage · 64%</span>
      </div>
    </div>
  </div>
  <div class="ds-stage ds-stage--dark dark">
    <p class="ds-label">Acknowledgment progress — Dark</p>
    <div class="ds-col">
      <div class="prog-line">
        <div class="prog" role="progressbar" aria-label="12 of 52 acknowledged · 23%" aria-valuenow="23" aria-valuemin="0" aria-valuemax="100"><div class="prog__bar" style="width:23%"></div></div>
        <span class="caption">12 of 52 · 23%</span>
      </div>
      <div class="prog-line">
        <div class="prog" role="progressbar" aria-label="47 of 52 acknowledged · 90%" aria-valuenow="90" aria-valuemin="0" aria-valuemax="100"><div class="prog__bar" style="width:90%"></div></div>
        <span class="caption">47 of 52 · 90%</span>
      </div>
      <div class="prog-line">
        <div class="prog prog--wide" role="progressbar" aria-label="Framework coverage · 64%" aria-valuenow="64" aria-valuemin="0" aria-valuemax="100"><div class="prog__bar" style="width:64%"></div></div>
        <span class="caption">SOC 2 coverage · 64%</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
