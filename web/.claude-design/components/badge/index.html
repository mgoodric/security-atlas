<!-- @dsCard group="Feedback" name="Badge" subtitle="6 variants · pill" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Badge — security-atlas Design System</title>
<link rel="stylesheet" href="../../_tokens.css" />
<style>
  /* Badge — translated from web/components/ui/badge.tsx (base-nova / neutral).
     Pill shape (rounded-4xl), h-5 (20px), text-xs, font-medium, px-2 py-0.5,
     gap-1. Six variants: default, secondary, destructive (a SOFT tint —
     bg-destructive/10 text-destructive, lifts to /20 in dark), outline,
     ghost, link. No semantic-color family in the neutral seed. */
  .badge {
    display: inline-flex; align-items: center; justify-content: center;
    gap: 4px; width: fit-content; flex-shrink: 0; overflow: hidden;
    white-space: nowrap;
    border: 1px solid transparent; border-radius: var(--radius-4xl);
    font-family: var(--font-sans); font-size: 0.75rem; font-weight: 500;
    line-height: 1; height: 20px; padding: 0.125rem 0.5rem;
    transition: background-color .15s ease, color .15s ease, border-color .15s ease;
  }
  .badge-default { background: var(--primary); color: var(--primary-foreground); }
  .badge-secondary { background: var(--secondary); color: var(--secondary-foreground); }
  .badge-destructive { background: color-mix(in oklab, var(--destructive) 10%, transparent); color: var(--destructive); }
  .dark .badge-destructive { background: color-mix(in oklab, var(--destructive) 20%, transparent); }
  .badge-outline { border-color: var(--border); background: transparent; color: var(--foreground); }
  .badge-ghost { background: transparent; color: var(--muted-foreground); }
  .badge-link { background: transparent; color: var(--primary); text-underline-offset: 4px; }
  .badge .led { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>
<body>
<div class="ds-stages">
  <div class="ds-stage">
    <p class="ds-label">Variants — Light</p>
    <div class="ds-row">
      <span class="badge badge-default">Compliant</span>
      <span class="badge badge-secondary">In scope</span>
      <span class="badge badge-destructive">Gap</span>
      <span class="badge badge-outline">SOC 2</span>
      <span class="badge badge-ghost">Draft</span>
      <span class="badge badge-link">View</span>
    </div>
    <p class="ds-label">With status dot</p>
    <div class="ds-row">
      <span class="badge badge-outline"><span class="led" style="background:var(--primary)"></span>Evidence fresh</span>
      <span class="badge badge-outline"><span class="led" style="background:var(--destructive)"></span>95 days stale</span>
    </div>
  </div>
  <div class="ds-stage ds-stage--dark dark">
    <p class="ds-label">Variants — Dark</p>
    <div class="ds-row">
      <span class="badge badge-default">Compliant</span>
      <span class="badge badge-secondary">In scope</span>
      <span class="badge badge-destructive">Gap</span>
      <span class="badge badge-outline">SOC 2</span>
      <span class="badge badge-ghost">Draft</span>
      <span class="badge badge-link">View</span>
    </div>
    <p class="ds-label">With status dot</p>
    <div class="ds-row">
      <span class="badge badge-outline"><span class="led" style="background:var(--primary)"></span>Evidence fresh</span>
      <span class="badge badge-outline"><span class="led" style="background:var(--destructive)"></span>95 days stale</span>
    </div>
  </div>
</div>
</body>
</html>
