  - requirement_code: "RC.CO-03"
    scf_anchor: "BCD-02"
    relationship_type: "intersects_with"
    strength: 0.6
    rationale: "Communicating recovery progress overlaps SCF Business Continuity Plan; stakeholder-comms specificity gap (LOW)."
