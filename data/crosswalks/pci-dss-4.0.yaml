  - requirement_code: 3.5.1
    scf_anchor: CRY-01
    relationship_type: equal
    strength: 0.9
    rationale: "Rendering stored PAN unreadable via strong cryptography maps to SCF Use of Cryptographic Controls (data-at-rest protection)."
  - requirement_code: 3.6.1
    scf_anchor: CRY-09
    relationship_type: equal
    strength: 0.9
    rationale: "Protecting cryptographic keys for stored account data maps to SCF Cryptographic Key Management."
  # --- Req 4: Protect CHD in transmission ---
  - requirement_code: 4.2.1
    scf_anchor: CRY-08
    relationship_type: equal
    strength: 0.9
