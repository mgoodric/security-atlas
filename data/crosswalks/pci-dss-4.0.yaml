  - requirement_code: 6.3.1
    scf_anchor: VPM-01
    relationship_type: equal
    strength: 0.9
    rationale: "Identifying and ranking security vulnerabilities maps to SCF Vulnerability & Patch Management Policy — shared with SOC 2 CC7.1 and ISO A.8.8."
  - requirement_code: 6.3.3
    scf_anchor: VPM-04
    relationship_type: equal
    strength: 0.9
    rationale: "Patching system components against known vulnerabilities maps to SCF Software Patching — shared with SOC 2 CC7.1."
  - requirement_code: 6.4.1
