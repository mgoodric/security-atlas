  # --- Req 8: Identify and authenticate ---
  - requirement_code: 8.2.1
    scf_anchor: IAC-01
    relationship_type: equal
    strength: 0.9
    rationale: "Assigning unique IDs before granting access maps to SCF Identification & Authentication Policy — the THREE-framework shared anchor with SOC 2 CC6.1 and ISO A.5.15 (invariant #1 proof)."
  - requirement_code: 8.3.1
