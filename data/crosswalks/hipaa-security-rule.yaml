requirements:
  # ===== ADMINISTRATIVE SAFEGUARDS (§164.308) =====
  # R/A tags below are 45 CFR §164.306(d) classifications (public regulatory
  # fact, documentation only — no decision workflow; P0-481-1).
  - code: "164.308(a)(1)(i)"
    title: "Security Management Process"
    body: "Implement policies and procedures to prevent, detect, contain, and correct security violations." # Standard (R)
  - code: "164.308(a)(1)(ii)(A)"
    title: "Risk Analysis"
    body: "Conduct an accurate and thorough assessment of the risks to electronic protected health information." # Implementation spec (R)
  - code: "164.308(a)(1)(ii)(B)"
    title: "Risk Management"
    body: "Implement security measures sufficient to reduce risks and vulnerabilities to a reasonable and appropriate level." # Implementation spec (R)
  - code: "164.308(a)(1)(ii)(C)"
    title: "Sanction Policy"
    body: "Apply appropriate sanctions against workforce members who fail to comply with the security policies and procedures." # Implementation spec (R)
  - code: "164.308(a)(1)(ii)(D)"
    title: "Information System Activity Review"
    body: "Implement procedures to regularly review records of information system activity, such as audit logs, access reports, and security incident tracking reports." # Implementation spec (R)
  - code: "164.308(a)(2)"
    title: "Assigned Security Responsibility"
    body: "Identify the security official responsible for developing and implementing the required security policies and procedures." # Standard (R)
  - code: "164.308(a)(3)(i)"
    title: "Workforce Security"
    body: "Implement policies ensuring workforce members have appropriate access to electronic protected health information and preventing unauthorized access." # Standard (R)
  - code: "164.308(a)(3)(ii)(A)"
    title: "Authorization and/or Supervision"
    body: "Implement procedures for the authorization and supervision of workforce members who work with electronic protected health information or in locations where it might be accessed." # Implementation spec (A)
  - code: "164.308(a)(3)(ii)(B)"
    title: "Workforce Clearance Procedure"
    body: "Implement procedures to determine that the access of a workforce member to electronic protected health information is appropriate." # Implementation spec (A)
  - code: "164.308(a)(3)(ii)(C)"
    title: "Termination Procedures"
    body: "Implement procedures for terminating access to electronic protected health information when employment ends or access is no longer required." # Implementation spec (A)
  - code: "164.308(a)(4)(i)"
    title: "Information Access Management"
    body: "Implement policies and procedures for authorizing access to electronic protected health information." # Standard (R)
  - code: "164.308(a)(4)(ii)(A)"
    title: "Isolating Health Care Clearinghouse Functions"
    body: "If a health care clearinghouse is part of a larger organization, implement policies and procedures that protect electronic protected health information from unauthorized access by the larger organization." # Implementation spec (R)
  - code: "164.308(a)(4)(ii)(B)"
    title: "Access Authorization"
    body: "Implement policies and procedures for granting access to electronic protected health information, for example through access to a workstation, transaction, program, or process." # Implementation spec (A)
  - code: "164.308(a)(4)(ii)(C)"
    title: "Access Establishment and Modification"
    body: "Implement policies that establish, document, review, and modify a user's right of access to systems holding electronic protected health information." # Implementation spec (A)
  - code: "164.308(a)(5)(i)"
    title: "Security Awareness and Training"
    body: "Implement a security awareness and training program for all members of the workforce." # Standard (R)
  - code: "164.308(a)(5)(ii)(A)"
    title: "Security Reminders"
    body: "Provide periodic security updates and reminders to workforce members." # Implementation spec (A)
  - code: "164.308(a)(5)(ii)(B)"
    title: "Protection from Malicious Software"
    body: "Implement procedures for guarding against, detecting, and reporting malicious software." # Implementation spec (A)
  - code: "164.308(a)(5)(ii)(C)"
    title: "Log-in Monitoring"
    body: "Implement procedures for monitoring log-in attempts and reporting discrepancies." # Implementation spec (A)
  - code: "164.308(a)(5)(ii)(D)"
    title: "Password Management"
    body: "Implement procedures for creating, changing, and safeguarding passwords." # Implementation spec (A)
  - code: "164.308(a)(6)(i)"
    title: "Security Incident Procedures"
    body: "Implement policies and procedures to address security incidents." # Standard (R)
  - code: "164.308(a)(6)(ii)"
    title: "Response and Reporting"
    body: "Identify and respond to suspected or known security incidents, mitigate harmful effects, and document incidents and outcomes." # Implementation spec (R)
  - code: "164.308(a)(7)(i)"
    title: "Contingency Plan"
    body: "Establish policies and procedures for responding to an emergency or other occurrence that damages systems containing electronic protected health information." # Standard (R)
  - code: "164.308(a)(7)(ii)(A)"
    title: "Data Backup Plan"
    body: "Establish and implement procedures to create and maintain retrievable exact copies of electronic protected health information." # Implementation spec (R)
  - code: "164.308(a)(7)(ii)(B)"
    title: "Disaster Recovery Plan"
    body: "Establish and implement procedures to restore any loss of data following an emergency or other occurrence that damages systems containing electronic protected health information." # Implementation spec (R)
  - code: "164.308(a)(7)(ii)(C)"
    title: "Emergency Mode Operation Plan"
    body: "Establish and implement procedures to enable continuation of critical business processes for protection of electronic protected health information while operating in emergency mode." # Implementation spec (R)
  - code: "164.308(a)(7)(ii)(D)"
    title: "Testing and Revision Procedures"
    body: "Implement procedures for periodic testing and revision of contingency plans." # Implementation spec (A)
  - code: "164.308(a)(7)(ii)(E)"
    title: "Applications and Data Criticality Analysis"
    body: "Assess the relative criticality of specific applications and data in support of other contingency plan components." # Implementation spec (A)
  - code: "164.308(a)(8)"
    title: "Evaluation"
    body: "Perform periodic technical and nontechnical evaluation of how well security policies and procedures meet the Security Rule requirements." # Standard (R)
  - code: "164.308(b)(1)"
    title: "Business Associate Contracts"
    body: "Obtain satisfactory assurances that a business associate will appropriately safeguard electronic protected health information it handles." # Standard (R)
  - code: "164.308(b)(4)"
    title: "Written Contract or Other Arrangement"
    body: "Document the satisfactory assurances required from a business associate through a written contract or other arrangement that meets the applicable requirements." # Implementation spec (R)

  # ===== PHYSICAL SAFEGUARDS (§164.310) =====
  - code: "164.310(a)(1)"
    title: "Facility Access Controls"
    body: "Implement policies and procedures to limit physical access to electronic information systems and the facilities housing them while ensuring authorized access." # Standard (R)
  - code: "164.310(a)(2)(i)"
    title: "Contingency Operations"
    body: "Establish procedures that allow facility access in support of restoration of lost data under the disaster recovery and emergency mode operations plans in the event of an emergency." # Implementation spec (A)
  - code: "164.310(a)(2)(ii)"
    title: "Facility Security Plan"
    body: "Implement policies and procedures to safeguard the facility and its equipment from unauthorized physical access, tampering, and theft." # Implementation spec (A)
  - code: "164.310(a)(2)(iii)"
    title: "Access Control and Validation Procedures"
    body: "Implement procedures to control and validate a person's access to facilities based on their role or function, including visitor control and access to software programs for testing and revision." # Implementation spec (A)
  - code: "164.310(a)(2)(iv)"
    title: "Maintenance Records"
    body: "Implement policies and procedures to document repairs and modifications to the physical components of a facility related to security, such as hardware, walls, doors, and locks." # Implementation spec (A)
  - code: "164.310(b)"
    title: "Workstation Use"
    body: "Implement policies specifying the proper functions, manner of use, and physical surroundings of workstations that access electronic protected health information." # Standard (R)
  - code: "164.310(c)"
    title: "Workstation Security"
    body: "Implement physical safeguards for all workstations that access electronic protected health information to restrict access to authorized users." # Standard (R)
  - code: "164.310(d)(1)"
    title: "Device and Media Controls"
    body: "Implement policies governing the receipt and removal of hardware and electronic media containing electronic protected health information into and out of a facility." # Standard (R)
  - code: "164.310(d)(2)(i)"
    title: "Media Disposal"
    body: "Implement policies and procedures to address the final disposition of electronic protected health information and the hardware or media on which it is stored." # Implementation spec (R)
  - code: "164.310(d)(2)(ii)"
    title: "Media Re-use"
    body: "Implement procedures for removal of electronic protected health information from electronic media before the media are made available for re-use." # Implementation spec (R)
  - code: "164.310(d)(2)(iii)"
    title: "Accountability"
    body: "Maintain a record of the movements of hardware and electronic media and the person responsible for them." # Implementation spec (A)
  - code: "164.310(d)(2)(iv)"
    title: "Data Backup and Storage"
    body: "Create a retrievable exact copy of electronic protected health information, when needed, before moving equipment." # Implementation spec (A)

  # ===== TECHNICAL SAFEGUARDS (§164.312) =====
  # 164.312(a)(1) Access Control is the FIVE-FRAMEWORK shared anchor (invariant
  # #1, AC-4): SOC 2 CC6.1, ISO A.5.15, PCI 8.2.1, CSF PR.AA-01, and HIPAA
  # 164.312(a)(1) all resolve to IAC-01.
  - code: "164.312(a)(1)"
    title: "Access Control"
    body: "Implement technical policies and procedures so that only authorized persons or software programs are granted access to electronic protected health information." # Standard (R)
  - code: "164.312(a)(2)(i)"
    title: "Unique User Identification"
    body: "Assign a unique name or number for identifying and tracking user identity." # Implementation spec (R)
  - code: "164.312(a)(2)(ii)"
    title: "Emergency Access Procedure"
    body: "Establish and implement procedures for obtaining necessary electronic protected health information during an emergency." # Implementation spec (R)
  - code: "164.312(a)(2)(iii)"
    title: "Automatic Logoff"
    body: "Implement electronic procedures that terminate an electronic session after a predetermined time of inactivity." # Implementation spec (A)
  - code: "164.312(a)(2)(iv)"
    title: "Encryption and Decryption"
    body: "Implement a mechanism to encrypt and decrypt electronic protected health information at rest." # Implementation spec (A)
  - code: "164.312(b)"
    title: "Audit Controls"
    body: "Implement hardware, software, and procedural mechanisms that record and examine activity in systems containing electronic protected health information." # Standard (R)
  - code: "164.312(c)(1)"
    title: "Integrity"
    body: "Implement policies and procedures to protect electronic protected health information from improper alteration or destruction." # Standard (R)
  - code: "164.312(c)(2)"
    title: "Mechanism to Authenticate ePHI"
    body: "Implement electronic mechanisms to corroborate that electronic protected health information has not been altered or destroyed in an unauthorized manner." # Implementation spec (A)
  - code: "164.312(d)"
    title: "Person or Entity Authentication"
    body: "Implement procedures to verify that a person or entity seeking access to electronic protected health information is the one claimed." # Standard (R)
  - code: "164.312(e)(1)"
    title: "Transmission Security"
    body: "Implement technical security measures to guard against unauthorized access to electronic protected health information transmitted over an electronic communications network." # Standard (R)
  - code: "164.312(e)(2)(i)"
    title: "Integrity Controls (Transmission)"
    body: "Implement security measures to ensure that electronically transmitted electronic protected health information is not improperly modified without detection until disposed of." # Implementation spec (A)
  - code: "164.312(e)(2)(ii)"
    title: "Encryption (Transmission)"
    body: "Implement a mechanism to encrypt electronic protected health information whenever deemed appropriate during transmission." # Implementation spec (A)

  # ===== ORGANIZATIONAL REQUIREMENTS (§164.314) =====
  # New in slice 516 (481 deferred these). Organizational requirements bind the
  # covered entity / business associate / group-health-plan contracting and
  # documentation relationships; in the SCF palette they resolve to the
  # Third-Party Management family (TPM-*). The covered-entity BAA WORKFLOW (the
  # decision/tracking surface) remains the deferred phase-3 slice 517 — these are
  # CATALOG requirement nodes only.
  - code: "164.314(a)(1)"
    title: "Business Associate Contracts or Other Arrangements"
    body: "The contract or other arrangement between the covered entity and its business associate must meet the applicable requirements depending on whether the arrangement is a business associate contract or another arrangement permitted by the rule." # Standard (R)
  - code: "164.314(a)(2)(i)"
    title: "Business Associate Contracts"
    body: "Provide that the business associate will comply with the applicable Security Rule requirements, ensure subcontractors that create or receive electronic protected health information agree to the same safeguards, and report security incidents to the covered entity." # Implementation spec (R)
  - code: "164.314(a)(2)(ii)"
    title: "Other Arrangements"
    body: "Where a covered entity and its business associate are both governmental entities, satisfy the contracting requirements through a memorandum of understanding or other law or regulation that accomplishes the objectives." # Implementation spec (R)
  - code: "164.314(a)(2)(iii)"
    title: "Business Associate Contracts with Subcontractors"
    body: "Require a business associate to obtain satisfactory assurances from a subcontractor that creates or receives electronic protected health information on its behalf, to the same extent the covered entity requires of the business associate." # Implementation spec (R)
  - code: "164.314(b)(1)"
    title: "Requirements for Group Health Plans"
    body: "Except where the only ePHI disclosed is enrollment/disenrollment or summary information, ensure plan documents of the group health plan require the plan sponsor to reasonably and appropriately safeguard electronic protected health information." # Standard (R)
  - code: "164.314(b)(2)(i)"
    title: "Plan Document Safeguards (Implement Reasonable Safeguards)"
    body: "Require the plan sponsor to implement administrative, physical, and technical safeguards that reasonably and appropriately protect the confidentiality, integrity, and availability of the electronic protected health information it creates, receives, maintains, or transmits on behalf of the group health plan." # Implementation spec (R)
  - code: "164.314(b)(2)(ii)"
    title: "Plan Document Safeguards (Ensure Adequate Separation)"
    body: "Require the plan sponsor to ensure that the adequate separation between the group health plan and the plan sponsor is supported by reasonable and appropriate security measures." # Implementation spec (R)
  - code: "164.314(b)(2)(iii)"
    title: "Plan Document Safeguards (Ensure Agents Safeguard)"
    body: "Require the plan sponsor to ensure that any agent to whom it provides electronic protected health information agrees to implement reasonable and appropriate security measures to protect it." # Implementation spec (R)

  # ===== POLICIES, PROCEDURES, AND DOCUMENTATION (§164.316) =====
  # New in slice 516 (481 deferred these). These bind the program-governance and
  # documentation-retention obligations; in the SCF palette they resolve to the
  # Governance (GOV-*), Compliance-management (CPL-*), and Data-retention (DCH-*)
  # families.
  - code: "164.316(a)"
    title: "Policies and Procedures"
    body: "Implement reasonable and appropriate policies and procedures to comply with the standards, implementation specifications, and other requirements of the Security Rule." # Standard (R)
  - code: "164.316(b)(1)"
    title: "Documentation"
    body: "Maintain the policies and procedures implemented to comply with the Security Rule in written (which may be electronic) form, and document any action, activity, or assessment required to be documented." # Standard (R)
  - code: "164.316(b)(2)(i)"
    title: "Time Limit"
    body: "Retain the required documentation for six years from the date of its creation or the date when it last was in effect, whichever is later." # Implementation spec (R)
  - code: "164.316(b)(2)(ii)"
    title: "Availability"
    body: "Make documentation available to those persons responsible for implementing the procedures to which the documentation pertains." # Implementation spec (R)
  - code: "164.316(b)(2)(iii)"
    title: "Updates"
    body: "Review documentation periodically and update it as needed in response to environmental or operational changes affecting the security of electronic protected health information." # Implementation spec (R)

