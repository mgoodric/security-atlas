# HIPAA Security Rule (45 CFR Part 164, Subpart C) → SCF crosswalk
#
# DRAFT — community_draft attribution. Authored by the agent for slice 481
# (the FIFTH framework slice — it extends UCF invariant #1 from four frameworks
# to five: one SCF anchor satisfies SOC 2 + ISO 27001 + PCI DSS + NIST CSF +
# HIPAA requirements at once). Every row is an agent JUDGMENT call recorded in
# docs/audit-log/481-hipaa-crosswalk-decisions.md.
#
# CATALOG, NOT WORKFLOW (binding — slice 481 narrative, P0-481-1):
#   This file ships ONLY the HIPAA Security Rule standards / implementation
#   specifications as requirement-grain catalog nodes, crosswalked to SCF
#   anchors via STRM edges. It is the SAME thing slices 438/447/480 ship for
#   their frameworks. It does NOT ship the HIPAA covered-entity workflow, BAA
#   tracking, the required-vs-addressable implementation-specification DECISION
#   workflow, breach risk-assessment (§164.402), or a HIPAA FrameworkScope
#   ePHI-environment example — all of that is the canvas §10.3 deferred phase-3
#   covered-entity workflow, NOT this slice.
#
# REQUIRED vs. ADDRESSABLE (documentation only — P0-481-1):
#   The HIPAA Security Rule labels each implementation specification (R)equired
#   or (A)ddressable (45 CFR §164.306(d)). We annotate that distinction in the
#   per-requirement comment below as PUBLIC REGULATORY FACT for the operator's
#   reading, but we do NOT carry it as a structured loader field and we do NOT
#   build any required-vs-addressable decision flow — that flow is the deferred
#   covered-entity workflow. The generic 438 loader's Requirement/Mapping
#   structs have no metadata column for it, and adding one would be a loader
#   change (P0-481-2 forbids HIPAA-specific loader code), so the R/A tag stays
#   a comment. See decisions log D8.
#
# LICENSING POSTURE (deliberate — see decisions log D2):
#   The HIPAA Security Rule is codified at 45 CFR Part 164 and, as a work of the
#   U.S. federal government, is in the PUBLIC DOMAIN (like NIST CSF; unlike the
#   copyrighted ISO 27001 and PCI DSS). This file nonetheless follows the
#   438/467/480 source-attribution discipline: it references the CFR section
#   IDENTIFIERS (e.g. "164.312(a)(1)") and short factual TITLES, and pairs each
#   with an ORIGINAL agent-authored one-line description in `body`. The mapping
#   rows are the agent's independent draft (source_attribution: community_draft),
#   not an HHS- or SCF-published official crosswalk. SCF anchors are imported
#   separately by the operator (slice 006); this file ships only the HIPAA→SCF
#   edge data (P0-481-6 — no pre-built SCF data bundled).
#
# SCOPE DISCIPLINE (binding — slice 481 narrative):
#   This is a CURATED high-signal subset (32 standards + implementation specs),
#   NOT full Security Rule coverage. The subset deliberately spans ALL THREE
#   safeguard categories — Administrative (§164.308), Physical (§164.310), and
#   Technical (§164.312) — with emphasis on the SOC 2 / ISO / PCI / CSF overlap
#   zone (identity, encryption, monitoring, contingency, training) so shared SCF
#   anchors demonstrate invariant #1 at FIVE frameworks. Full Security Rule
#   coverage (including §164.314 organizational + §164.316 documentation), the
#   phase-3 covered-entity workflow, and the HIPAA FrameworkScope ePHI example
#   are follow-on slices (see decisions log "Revisit once in use"), NOT catalog
#   scope.
#
# Source basis (methodology, not copied text):
#   - 45 CFR §§164.308 / 164.310 / 164.312 section identifiers + short titles
#     (factual references to a public-domain U.S. government work)
#   - SCF anchor families published in the platform's slice-006 fixture
#     (migrations/fixtures/scf-sample.json — 53 anchors)
#   - NIST IR 8477 STRM methodology (canvas §3.2; UCF_GRAPH_MODEL.md §4)
#   - NIST SP 800-66r2 (HIPAA Security Rule → SP 800-53 guidance) informs the
#     anchor choices; these rows are the agent's independent draft pending review.
#
# Strength scoring rubric (identical to the SOC 2 / ISO / PCI / CSF crosswalks
# for consistency):
#   1.0      — STRM equal: source and target describe the same control concept
#   0.9      — STRM equal with minor scope difference
#   0.7-0.8  — subset_of: the SCF anchor fully covers the HIPAA spec and is broader
#   0.6-0.8  — intersects_with high overlap: most of the HIPAA spec is covered
#   0.4-0.6  — intersects_with partial overlap: explicit gap remains (LOW CONFIDENCE)
#   <=0.5    — flagged for spot-check priority in the decisions log

