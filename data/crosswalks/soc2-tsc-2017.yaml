# SOC 2 v2017 (Trust Services Criteria) → SCF crosswalk
#
# DRAFT — community_draft attribution. Authored by the agent for slice 007;
# every row requires HITL spot-check before merge per the slice's pre-merge
# gate. Rows flagged "strength: 0.5" or lower are explicitly low-confidence
# and should be reviewed first.
#
# Source basis: the agent-authored mapping is informed by:
#   - AICPA TSC 2017 (with 2022 points-of-focus revisions) control text
#   - SCF anchor families published in the platform's slice-006 fixture
#   - NIST IR 8477 STRM methodology (canvas §3.2; UCF_GRAPH_MODEL.md §4)
#
# This file is NOT SCF's published crosswalk. When SCF publishes a
# machine-readable SOC 2 STRM crosswalk in JSON/CSV, the importer should
# ingest it with source_attribution=scf_official, superseding these rows.
#
# Strength scoring rubric used here:
#   1.0  — STRM equal: source and target describe the same control concept
#   0.9  — STRM equal with minor scope difference
#   0.7-0.8 — subset_of: SCF anchor fully covers the TSC concept and is broader
#   0.6-0.8 — intersects_with high overlap: most of the TSC concept is covered
#   0.4-0.6 — intersects_with partial overlap: explicit gap remains, supplement needed (LOW CONFIDENCE)
#   <=0.5  — flagged for HITL spot-check priority

