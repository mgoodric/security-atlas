requirements:
  # Common Criteria — Control Environment (CC1)
  - code: CC1.1
    title: "COSO Principle 1: Commitment to integrity and ethical values"
    body: "The entity demonstrates a commitment to integrity and ethical values."
  - code: CC1.2
    title: "COSO Principle 2: Board independence and oversight"
    body: "The board of directors demonstrates independence from management and exercises oversight of the development and performance of internal control."
  - code: CC1.3
    title: "COSO Principle 3: Management establishes structure, authority, responsibility"
    body: "Management establishes, with board oversight, structures, reporting lines, and appropriate authorities and responsibilities."
  - code: CC1.4
    title: "COSO Principle 4: Commitment to competence"
    body: "The entity demonstrates a commitment to attract, develop, and retain competent individuals."
  - code: CC1.5
    title: "COSO Principle 5: Accountability"
    body: "The entity holds individuals accountable for their internal control responsibilities."

  # Common Criteria — Communication & Information (CC2)
  - code: CC2.1
    title: "Information for internal control"
    body: "The entity obtains or generates and uses relevant, quality information to support the functioning of internal control."
  - code: CC2.2
    title: "Internal communication"
    body: "The entity internally communicates information necessary to support the functioning of internal control."
  - code: CC2.3
    title: "External communication"
    body: "The entity communicates with external parties regarding matters affecting the functioning of internal control."

  # Common Criteria — Risk Assessment (CC3)
  - code: CC3.1
    title: "Specifies suitable objectives"
    body: "The entity specifies objectives with sufficient clarity to enable the identification and assessment of risks."
  - code: CC3.2
    title: "Identifies and analyzes risk"
    body: "The entity identifies risks to the achievement of its objectives and analyzes risks as a basis for determining how the risks should be managed."
  - code: CC3.3
    title: "Considers fraud risk"
    body: "The entity considers the potential for fraud in assessing risks to the achievement of objectives."
  - code: CC3.4
    title: "Identifies and assesses changes"
    body: "The entity identifies and assesses changes that could significantly impact the system of internal control."

  # Common Criteria — Monitoring (CC4)
  - code: CC4.1
    title: "Ongoing and separate evaluations"
    body: "The entity selects, develops, and performs ongoing and separate evaluations to ascertain whether the components of internal control are present and functioning."
  - code: CC4.2
    title: "Evaluates and communicates deficiencies"
    body: "The entity evaluates and communicates internal control deficiencies in a timely manner to those parties responsible for taking corrective action."

  # Common Criteria — Control Activities (CC5)
  - code: CC5.1
    title: "Selects and develops control activities"
    body: "The entity selects and develops control activities that contribute to the mitigation of risks to the achievement of objectives to acceptable levels."
  - code: CC5.2
    title: "Selects and develops general technology controls"
    body: "The entity selects and develops general control activities over technology to support the achievement of objectives."
  - code: CC5.3
    title: "Deploys through policies and procedures"
    body: "The entity deploys control activities through policies that establish what is expected and procedures that put policies into action."

  # Common Criteria — Logical & Physical Access (CC6)
  - code: CC6.1
    title: "Logical access security software and infrastructure"
    body: "The entity implements logical access security software, infrastructure, and architectures over protected information assets."
  - code: CC6.2
    title: "Registers and authorizes new users prior to issuance of credentials"
    body: "Prior to issuing system credentials, the entity registers and authorizes new internal and external users."
  - code: CC6.3
    title: "Authorizes, modifies, or removes access"
    body: "The entity authorizes, modifies, or removes access to data, software, functions, and other protected information assets."
  - code: CC6.4
    title: "Restricts physical access"
    body: "The entity restricts physical access to facilities and protected information assets."
  - code: CC6.5
    title: "Discontinues logical and physical protections over physical assets only after the ability to read or recover data and software has been diminished"
    body: "The entity discontinues logical and physical protections over physical assets only after the ability to read or recover data has been diminished."
  - code: CC6.6
    title: "Logical access security measures against threats from outside"
    body: "The entity implements logical access security measures to protect against threats from sources outside its system boundaries."
  - code: CC6.7
    title: "Restricts the transmission, movement, and removal of information"
    body: "The entity restricts the transmission, movement, and removal of information to authorized internal and external users and processes."
  - code: CC6.8
    title: "Prevents or detects and acts upon the introduction of unauthorized or malicious software"
    body: "The entity implements controls to prevent or detect and act upon the introduction of unauthorized or malicious software."

  # Common Criteria — System Operations (CC7)
  - code: CC7.1
    title: "Detection and monitoring procedures for new vulnerabilities"
    body: "The entity uses detection and monitoring procedures to identify changes to configurations that result in the introduction of new vulnerabilities."
  - code: CC7.2
    title: "Monitors system components for anomalies"
    body: "The entity monitors system components and the operation of those components for anomalies indicative of malicious acts, natural disasters, and errors."
  - code: CC7.3
    title: "Evaluates security events"
    body: "The entity evaluates security events to determine whether they could or have resulted in a failure of the entity to meet its objectives."
  - code: CC7.4
    title: "Responds to identified security incidents"
    body: "The entity responds to identified security incidents by executing a defined incident response program."
  - code: CC7.5
    title: "Recovery from identified security incidents"
    body: "The entity identifies, develops, and implements activities to recover from identified security incidents."

  # Common Criteria — Change Management (CC8)
  - code: CC8.1
    title: "Authorizes, designs, develops or acquires, configures, documents, tests, approves, and implements changes"
    body: "The entity authorizes, designs, develops or acquires, configures, documents, tests, approves, and implements changes to infrastructure, data, software, and procedures."

  # Common Criteria — Risk Mitigation (CC9)
  - code: CC9.1
    title: "Identifies, selects, and develops risk mitigation activities"
    body: "The entity identifies, selects, and develops risk mitigation activities for risks arising from potential business disruptions."
  - code: CC9.2
    title: "Vendor and business partner risk management"
    body: "The entity assesses and manages risks associated with vendors and business partners."

  # Availability (A1)
  - code: A1.1
    title: "Maintains, monitors, and evaluates current processing capacity"
    body: "The entity maintains, monitors, and evaluates current processing capacity and use of system components to manage capacity demand and to enable the implementation of additional capacity."
  - code: A1.2
    title: "Authorizes, designs, develops, implements, operates, approves, maintains, and monitors environmental protections, software, data backup processes, and recovery infrastructure"
    body: "The entity authorizes, designs, develops or acquires, implements, operates, approves, maintains, and monitors environmental protections, software, data backup processes, and recovery infrastructure to meet its objectives."
  - code: A1.3
    title: "Tests recovery plan procedures"
    body: "The entity tests recovery plan procedures supporting system recovery to meet its objectives."

  # Confidentiality (C1)
  - code: C1.1
    title: "Identifies and maintains confidential information"
    body: "The entity identifies and maintains confidential information to meet the entity's objectives related to confidentiality."
  - code: C1.2
    title: "Disposes of confidential information"
    body: "The entity disposes of confidential information to meet the entity's objectives related to confidentiality."

  # Processing Integrity (PI1)
  - code: PI1.1
    title: "Obtains or generates, uses, and communicates relevant, quality information regarding processing objectives"
    body: "The entity obtains or generates, uses, and communicates relevant, quality information regarding the objectives related to processing, including definitions of data processed and product and service specifications, to support the use of products and services."
  - code: PI1.2
    title: "System inputs are complete and accurate"
    body: "The entity implements policies and procedures over system inputs, including controls over completeness and accuracy, to result in products, services, and reporting to meet the entity's objectives."
  - code: PI1.3
    title: "System processing is complete, valid, accurate, timely, and authorized"
    body: "The entity implements policies and procedures over system processing to result in products, services, and reporting to meet the entity's objectives."
  - code: PI1.4
    title: "System output is complete, accurate, distributed to meet objectives"
    body: "The entity implements policies and procedures to make available or deliver output completely, accurately, and timely in accordance with specifications to meet the entity's objectives."
  - code: PI1.5
    title: "Stores inputs, items in processing, and outputs completely, accurately, and timely"
    body: "The entity implements policies and procedures to store inputs, items in processing, and outputs completely, accurately, and timely in accordance with system specifications to meet the entity's objectives."

