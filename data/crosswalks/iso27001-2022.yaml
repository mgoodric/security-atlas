# ISO/IEC 27001:2022 Annex A → SCF crosswalk
#
# DRAFT — community_draft attribution. Authored by the agent for slice 438
# (the FIRST second-framework slice — it proves UCF invariant #1: one SCF
# anchor satisfies requirements from TWO frameworks at once) and COMPLETED to
# full Annex A coverage by slice 467. Every row is an agent JUDGMENT call
# recorded in docs/audit-log/438-iso27001-crosswalk-decisions.md (the original
# 36-control subset) and docs/audit-log/467-iso27001-annex-a-decisions.md
# (the remaining 57 controls + the A.8.24 cryptography split).
#
# LICENSING POSTURE (deliberate — see decisions log):
#   ISO/IEC 27001:2022 is a copyrighted standard. This file references only
#   the Annex A control IDENTIFIERS (e.g. "A.5.15") and TITLES — both are
#   factual references, not protected expression — and pairs each with an
#   ORIGINAL agent-authored one-line description in `body`. It does NOT
#   reproduce any verbatim text of the ISO standard. The SCF anchors are
#   imported separately by the operator (slice 006); this file ships only
#   the ISO→SCF edge data (P0-438-7).
#
# COVERAGE (slice 467 — full Annex A):
#   This crosswalk now carries ALL 93 ISO/IEC 27001:2022 Annex A controls
#   (A.5 organizational ×37, A.6 people ×8, A.7 physical ×14, A.8
#   technological ×34). Slice 438 shipped a curated 36-control subset that
#   deliberately covered the SOC 2 overlap zone (so a shared SCF anchor
#   demonstrates invariant #1) plus a handful of ISO-unique controls; slice
#   467 completed the remaining 57 controls and split A.8.24 cryptography into
#   the in-transit + key-management edge pair. Each requirement maps to one or
#   more SCF anchors (requirement → SCF anchor only — invariant #7); no
#   requirement → requirement edge exists.
#
# Source basis (methodology, not copied text):
#   - ISO/IEC 27001:2022 Annex A control IDs + short titles (factual refs)
#   - SCF anchor families published in the platform's slice-006 fixture
#   - NIST IR 8477 STRM methodology (canvas §3.2; UCF_GRAPH_MODEL.md §4)
#   - SCF's own published ISO 27001:2022 mapping informs the anchor choices;
#     these rows are the agent's independent draft pending review.
#
# Strength scoring rubric (identical to the SOC 2 crosswalk for consistency):
#   1.0      — STRM equal: source and target describe the same control concept
#   0.9      — STRM equal with minor scope difference
#   0.7-0.8  — subset_of: the SCF anchor fully covers the ISO control and is broader
#   0.6-0.8  — intersects_with high overlap: most of the ISO concept is covered
#   0.4-0.6  — intersects_with partial overlap: explicit gap remains (LOW CONFIDENCE)
#   <=0.5    — flagged for spot-check priority in the decisions log

