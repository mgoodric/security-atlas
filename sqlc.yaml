version: "2"
sql:
  - engine: "postgresql"
    # Schema is read from every forward migration in the tree, applied in
    # filename order. Down migrations (*.down.sql) are excluded — sqlc
    # processes the cumulative current state.
    schema:
      - "migrations/sql/20260511000000_init.sql"
      - "migrations/sql/20260511000001_scf_anchors.sql"
      - "migrations/sql/20260511000002_schema_registry.sql"
      - "migrations/sql/20260511000003_scope.sql"
      - "migrations/sql/20260511000004_evidence_ledger.sql"
      - "migrations/sql/20260511000005_risk_register.sql"
      - "migrations/sql/20260511000006_vendor_lite.sql"
      - "migrations/sql/20260511000007_framework_scopes_workflow.sql"
      - "migrations/sql/20260511000008_artifacts.sql"
      - "migrations/sql/20260511000009_control_bundle.sql"
      - "migrations/sql/20260511000010_audit_samples.sql"
      - "migrations/sql/20260511000011_exceptions.sql"
      - "migrations/sql/20260511000012_users_sessions_api_keys.sql"
      - "migrations/sql/20260511000013_framework_requirements_and_edges.sql"
      - "migrations/sql/20260511000014_risk_hierarchy_decisions.sql"
      - "migrations/sql/20260511000015_seed_default_themes.sql"
      - "migrations/sql/20260511000016_policies.sql"
      - "migrations/sql/20260511000017_acknowledgments.sql"
      - "migrations/sql/20260511000019_feature_flags.sql"
    queries: "internal/db/queries"
    gen:
      go:
        package: "dbx"
        out: "internal/db/dbx"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        emit_interface: true
        emit_json_tags: true
