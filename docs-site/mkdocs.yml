# mkdocs configuration — security-atlas user documentation.
#
# Decided in slice 058: mkdocs Material is the docs generator
# (Python-only, matches the repo's `uv` toolchain, built-in dark mode
# and search, no Node dependency). See
# docs/audit-log/058-user-docs-scaffold-decisions.md.

site_name: security-atlas
site_description: Open-source, self-hostable, replacement-grade GRC platform.
site_url: https://mgoodric.github.io/security-atlas/
repo_url: https://github.com/mgoodric/security-atlas
repo_name: mgoodric/security-atlas
edit_uri: edit/main/docs-site/docs/

docs_dir: docs

theme:
  name: material
  language: en
  # Slice 075 — theme logo + favicon, generated from the canonical
  # candidate-04 SVG via `just regen-logo`. The logo file is the LIGHT
  # variant; mkdocs Material's theme block does not expose a per-scheme
  # logo slot, so the docs-site/docs/index.md hero uses a <picture>
  # element instead to serve both variants. The favicon uses the
  # simplified favicon variant (slice 075 D4 — uniform 6px stroke
  # collapses at 16px).
  logo: assets/logo-light.svg
  favicon: assets/favicon.png
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - content.action.edit
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  # Surfaces a "Last updated" date on every page — feeds the
  # is-this-stale trust signal users look for in self-hosted docs.
  # `strict: false` keeps untracked-file fallback as a warning but does
  # NOT abort mkdocs --strict (which we DO want catching broken links
  # and missing nav entries). `fallback_to_build_date` keeps the date
  # render sensible until the file lands in git history.
  - git-revision-date-localized:
      enable_creation_date: false
      type: date
      fallback_to_build_date: true
      strict: false

nav:
  - Intro: index.md
  - Install: install.md
  - Connect an external IdP (OIDC): oidc-setup.md
  - Configuration reference: configuration.md
  - Framework setup: framework-setup.md
  - First audit: first-audit.md
  - Board reporting: board-reporting.md
  - Implementation checklist (AI-assisted): checklist.md
  - Measuring your program:
      - Overview: metrics.md
      - Reference: metrics-reference.md
  - Primitives:
      - Overview: primitives/index.md
      - Controls: primitives/controls.md
      - Risks: primitives/risks.md
      - Evidence: primitives/evidence.md
      - Scope: primitives/scope.md
      - Framework: primitives/framework.md
      - Policy: primitives/policy.md
  - Audit logs: audit-logs.md
  - Operations:
      - Backup and restore: backup-restore.md
      - Upgrade: upgrade.md
  - CI hardening: ci-hardening.md
  - Connector authoring: connector-authoring.md
  - Walkthroughs:
      - Overview: walkthroughs/index.md
      - Evaluation pipeline: walkthroughs/evaluation-pipeline.md
      - Audit-period freezing: walkthroughs/audit-period-freezing.md
      - RLS tenant isolation: walkthroughs/rls-tenant-isolation.md
      - Schema registry seed + validate: walkthroughs/schema-registry-seed-and-validate.md
      - OSCAL SSP export: walkthroughs/oscal-ssp-export.md
  - For auditors:
      - Verify a signed OSCAL export: audit/verify-export.md
  - OSCAL catalog import: oscal-catalog-import.md
  - REST API reference: api/index.md
  - OAuth grants map: oauth-grants.md
  - Troubleshooting:
      - First-time login: troubleshooting/first-login.md
  - Design decisions:
      - Architecture decision records: design/architecture-decision-records.md
      - Logo selection: design/logo-decision.md
  # Generated at build time by hooks/slice_status.py — the live slice tracker.
  - Project status: slice-status.md

# Slice 140 — copy the canonical docs/openapi.yaml into the docs site
# at build time and filter out operations marked `x-internal: true`
# (P0-A3 mitigation: operator-only endpoints never appear in the
# public Redoc render). Source spec stays the single source of truth
# (P0-A8); this hook produces a derived filtered view.
hooks:
  - hooks/openapi_pipeline.py
  # Renders the generated slice tracker (scripts/gen-status.sh) into
  # docs-site/docs/slice-status.md at build time — published, never
  # committed. Derived view; source of truth is git + _events.jsonl.
  - hooks/slice_status.py

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mgoodric/security-atlas
