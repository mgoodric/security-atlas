// security-atlas OSCAL bridge contract — Go <-> Python.
//
// Slice 030. The Go platform aggregates frozen-AuditPeriod data into the
// platform-side OSCAL input messages below; the Python oscal-bridge
// (wrapping IBM compliance-trestle) maps them to canonical OSCAL JSON
// v1.1.x documents and validates round-trip.
//
// The bridge is intentionally a thin serializer: it owns no business
// logic and no database access. All scoping, freezing-horizon
// enforcement, and tenant isolation happen on the Go side BEFORE a
// request reaches this contract. The bridge never calls an LLM — SSP
// narrative text arrives pre-authored in the input messages (CLAUDE.md
// product-runtime AI-assist boundary).
//
// Wire format is frozen on merge — field numbers cannot change without a
// v2 package.

syntax = "proto3";

package oscal.v1;

option go_package = "github.com/mgoodric/security-atlas/gen/proto/oscal/v1;oscalv1";

// OscalBridgeService serializes platform aggregates into OSCAL JSON
// v1.1.x and validates them via compliance-trestle round-trip.
service OscalBridgeService {
  // SerializeSSP maps an SspInput to an OSCAL system-security-plan JSON
  // document. The response carries the canonical JSON bytes.
  rpc SerializeSSP(SerializeSSPRequest) returns (SerializeSSPResponse);

  // SerializeAssessment maps an AssessmentInput to an OSCAL
  // assessment-plan JSON document AND an assessment-results JSON
  // document (returned as two members).
  rpc SerializeAssessment(SerializeAssessmentRequest) returns (SerializeAssessmentResponse);

  // SerializePOAM maps a PoamInput to an OSCAL
  // plan-of-action-and-milestones JSON document.
  rpc SerializePOAM(SerializePOAMRequest) returns (SerializePOAMResponse);

  // RoundTripValidate parses an OSCAL JSON document back through
  // compliance-trestle and re-serializes it, asserting structural
  // validity. AC-6 / AC-7. The export pipeline calls this on every
  // bundle member before the bundle is finalized.
  rpc RoundTripValidate(RoundTripValidateRequest) returns (RoundTripValidateResponse);

  // ImportCatalog deserializes an inbound OSCAL `catalog` JSON document
  // via compliance-trestle, validates it against OSCAL v1.1.x, and
  // returns a normalized catalog projection (controls + group structure)
  // OR a structured validation error. This is the INGEST direction of
  // invariant #8 (slice 492). The bridge NEVER dereferences any `href`
  // / external resource the document references (back-matter resources
  // are opaque metadata). A document-size cap + parse timeout bound the
  // expansion-attack surface (threat-model D/I).
  rpc ImportCatalog(ImportCatalogRequest) returns (ImportCatalogResponse);

  // ImportProfile resolves an inbound OSCAL `profile` JSON document against
  // one or more SUPPLIED catalog documents and returns the resolved control
  // projection (slice 511). The bridge applies the profile's import / merge /
  // modify directives via compliance-trestle's profile-resolver inside an
  // ISOLATED, ephemeral trestle workspace whose only catalogs are the ones
  // the caller supplied. It NEVER dereferences an external `import.href`:
  // every href is rewritten to point at a supplied catalog, and an href that
  // names no supplied catalog is a structured error, not a fetch (P0-511-1 /
  // threat-model I — the load-bearing difference from ImportCatalog). The
  // resolved output is re-validated against OSCAL v1.1.x before it is
  // returned. Caps (document size, resolved-control count, import-chain
  // depth) bound the expansion-attack surface (threat-model D / AC-3).
  //
  // Slice 578 extends ImportProfile to CHAINED profile-over-profile
  // resolution: a profile whose `import.href` names another SUPPLIED profile
  // (not only a catalog) is resolved recursively until the chain bottoms out
  // at a supplied catalog. The chain is bounded by a maximum depth and is
  // rejected on a cycle (a profile that imports itself directly or
  // transitively) — never an infinite loop / fetch. Every link's href is
  // still rewritten to a sandboxed `trestle://` path pointing at a supplied
  // document; an href that names no supplied document is a structured error,
  // not a fetch (P0-578-1, carrying forward P0-511-1).
  rpc ImportProfile(ImportProfileRequest) returns (ImportProfileResponse);

  // ImportComponentDefinition deserializes an inbound OSCAL
  // `component-definition` JSON document via compliance-trestle, validates it
  // against OSCAL v1.1.x, and returns a normalized projection of the defined
  // components + their implemented-requirements — the VENDOR'S
  // control-implementation CLAIMS (slice 512). A component-definition is the
  // vendor-side artifact: a product vendor ships it to assert "this product
  // implements control X this way". The Go side persists each
  // implemented-requirement as a vendor-attributed CLAIM (NOT
  // platform-verified evidence; never auto-satisfies a control — the
  // load-bearing P0-512-1). Like ImportCatalog the bridge NEVER dereferences
  // any `href` / external resource the document references (P0-512-2 /
  // threat-model I): links / back-matter resources are opaque metadata. A
  // document-size cap + component-count + requirement-count cap bound the
  // expansion-attack surface (threat-model D / AC-3).
  rpc ImportComponentDefinition(ImportComponentDefinitionRequest) returns (ImportComponentDefinitionResponse);
}

// ----- shared -----

// Metadata is the OSCAL document metadata block, populated by the Go
// aggregator. oscal_version is pinned to "1.1.2" (slice 030 decision).
message Metadata {
  string title = 1;
  string version = 2;
  string oscal_version = 3;
  // RFC-3339. Wall-clock instant the export ran.
  string last_modified = 4;
  // The frozen AuditPeriod's frozen_at, RFC-3339.
  string frozen_at = 5;
  // Free-form roles/parties are intentionally omitted in v1; trestle
  // accepts a minimal metadata block.
}

// ControlImplementation is one implemented-requirement: a control plus
// its human-authored implementation statement (the control bundle
// description — never AI-generated) and its latest evaluation result.
message ControlImplementation {
  string control_id = 1;
  // SCF anchor code, e.g. "IAC-06".
  string scf_id = 2;
  string title = 3;
  // Human-authored implementation narrative (control bundle description).
  string statement = 4;
  // Latest control_evaluations result within the frozen horizon:
  // pass | fail | na | inconclusive | no_evidence.
  string evaluation_result = 5;
  // RFC-3339 of the latest evaluation, empty when none.
  string evaluated_at = 6;
  // Policy ids linked to this control.
  repeated string linked_policy_ids = 7;
}

// ScopeCell is one multidimensional scope tuple included in the SSP
// system-characteristics.
message ScopeCell {
  string id = 1;
  string label = 2;
  // Canonical JSON of the dimension map.
  string dimensions_json = 3;
}

// Policy is a linked governance document summarised into the SSP.
message Policy {
  string id = 1;
  string title = 2;
  string version = 3;
  string status = 4;
}

// VendorAttestedImplementation is one operator-ACCEPTED vendor claim
// (slice 512 import + slice 589 disposition) surfaced in the SSP as a
// vendor-attested control-implementation statement.
//
// HARD CONSTITUTIONAL BOUNDARY (slice 619, inherits P0-512-1 / invariant #2):
// this is a vendor ASSERTION the operator chose to credit, NOT
// platform-verified evidence. It is carried in a SEPARATE field from
// control_implementations so it can NEVER be mistaken for, or counted toward,
// platform control-satisfaction. It carries no evaluation_result. The bridge
// renders it as a `by-component` statement attributed to the vendor component,
// flagged `vendor-attested` + `operator-credited`, with the accept-provenance
// (who accepted, when). An auditor reads "the vendor says X and the operator
// credited it", never "the platform verified X".
message VendorAttestedImplementation {
  // The accepted claim's id (provenance anchor).
  string claim_id = 1;
  // The OSCAL control-id the vendor claim targets.
  string control_id = 2;
  // The SCF anchor the claim maps to (free-form scf_id), empty when unmapped.
  string scf_id = 3;
  // The vendor component's OSCAL uuid (attribution anchor).
  string component_uuid = 4;
  // The vendor component's title (e.g. the product name).
  string component_title = 5;
  // The vendor component's OSCAL type (software | service | hardware | ...).
  string component_type = 6;
  // The vendor's implementation narrative, verbatim (never AI-generated).
  string statement = 7;
  // The credential id of the operator who accepted (credited) the claim.
  string accepted_by = 8;
  // RFC-3339 instant the claim was accepted.
  string accepted_at = 9;
  // The operator's optional free-form note recorded at disposition time.
  string disposition_note = 10;
}

// ----- SSP -----

message SspInput {
  Metadata metadata = 1;
  // Org profile.
  string tenant_id = 2;
  string organization_name = 3;
  string system_name = 4;
  // System description / authorization boundary summary.
  string system_description = 5;
  repeated ScopeCell scope_cells = 6;
  repeated ControlImplementation control_implementations = 7;
  repeated Policy policies = 8;
  // Operator-accepted vendor claims, rendered as vendor-attested by-component
  // statements. SEPARATE from control_implementations by design (slice 619):
  // a vendor claim never contributes to platform control-satisfaction.
  repeated VendorAttestedImplementation vendor_attested_implementations = 9;
}

message SerializeSSPRequest {
  SspInput input = 1;
}

// SerializeSSPResponse carries the canonical SSP JSON document.
message SerializeSSPResponse {
  // Canonical OSCAL JSON v1.1.x system-security-plan document bytes.
  bytes oscal_json = 1;
}

// ----- Assessment (AP + AR) -----

// SamplePopulation is one auditor-defined population + the sample drawn.
message SamplePopulation {
  string population_id = 1;
  string control_id = 2;
  int64 population_size = 3;
  // Evidence record ids in the drawn sample.
  repeated string sampled_evidence_ids = 4;
  // RFC-3339 horizon the population was frozen at.
  string frozen_at = 5;
}

// WalkthroughAttachment is one screen-capture / transcript attached to a
// walkthrough. Carried into the AR as an observation `relevant-evidence`
// reference (slice 494). The attachment BYTES are never embedded — the AR
// references them by content hash + the object-storage URI (P0-494-2); the
// object store is the source of truth and the signed bundle is the
// integrity layer.
message WalkthroughAttachment {
  string id = 1;
  string filename = 2;
  // lowercase-hex sha256 of the attachment bytes (the integrity anchor).
  string content_hash = 3;
  string content_type = 4;
  // free-form annotation metadata reference (image-region notes etc.).
  string annotation_ref = 5;
  // object-storage URI / key (slice-036 storage_key) — the reference, not
  // the bytes.
  string storage_uri = 6;
}

// Walkthrough is an auditor/owner-recorded explanation, exported as an
// assessment-results observation.
message Walkthrough {
  string id = 1;
  string control_id = 2;
  string narrative = 3;
  string status = 4;
  // lowercase hex sha256 of the canonical walkthrough content.
  string canonical_hash = 5;
  bool tamper_detected = 6;
  // Attachment references (slice 494). Bytes are NOT embedded — each entry
  // carries hash + storage URI only. Capped per-walkthrough by the
  // exporter; an overflow entry notes any attachments beyond the cap.
  repeated WalkthroughAttachment attachments = 7;
}

// AuditNote is one auditor<->auditee threaded comment, exported as an
// observation annotation.
message AuditNote {
  string id = 1;
  // control | finding | sample
  string scope_kind = 2;
  string scope_ref = 3;
  string author = 4;
  string body = 5;
  string created_at = 6;
}

message AssessmentInput {
  Metadata metadata = 1;
  string tenant_id = 2;
  string audit_period_id = 3;
  string audit_period_name = 4;
  repeated SamplePopulation populations = 5;
  repeated Walkthrough walkthroughs = 6;
  repeated AuditNote audit_notes = 7;
}

message SerializeAssessmentRequest {
  AssessmentInput input = 1;
}

message SerializeAssessmentResponse {
  // OSCAL assessment-plan JSON.
  bytes assessment_plan_json = 1;
  // OSCAL assessment-results JSON.
  bytes assessment_results_json = 2;
}

// ----- POA&M -----

// PoamItem is one open finding: a failing control evaluation or an open
// audit note on control scope. milestone/owner/due_date per AC-4.
message PoamItem {
  string id = 1;
  string control_id = 2;
  string title = 3;
  string description = 4;
  // low | moderate | high — derived from evaluation result.
  string severity = 5;
  string owner = 6;
  // RFC-3339.
  string due_date = 7;
  string milestone = 8;
}

message PoamInput {
  Metadata metadata = 1;
  string tenant_id = 2;
  string audit_period_id = 3;
  repeated PoamItem items = 4;
}

message SerializePOAMRequest {
  PoamInput input = 1;
}

// SerializePOAMResponse carries the canonical POA&M JSON document.
message SerializePOAMResponse {
  // Canonical OSCAL JSON v1.1.x plan-of-action-and-milestones bytes.
  bytes oscal_json = 1;
}

// ----- round-trip -----

message RoundTripValidateRequest {
  // One of: system-security-plan | assessment-plan |
  // assessment-results | plan-of-action-and-milestones.
  string model_type = 1;
  bytes oscal_json = 2;
}

message RoundTripValidateResponse {
  bool valid = 1;
  // Human-readable validation errors when valid=false.
  repeated string errors = 2;
}

// ----- catalog import (ingest) -----

message ImportCatalogRequest {
  // The raw inbound OSCAL catalog JSON document bytes. The bridge parses
  // these via compliance-trestle; it does NOT fetch any href the
  // document references.
  bytes oscal_json = 1;
  // Operator-declared source label (e.g. "NIST SP 800-53 rev5"). Carried
  // into the provenance record on the Go side; the bridge echoes it back.
  string source_label = 2;
}

// ImportedControl is one normalized control from an imported OSCAL
// catalog. control_id is the OSCAL `control-id`; group_path is the
// `/`-joined chain of OSCAL group titles the control sits under (for
// structural provenance). No href / external resource is resolved.
message ImportedControl {
  string control_id = 1;
  string title = 2;
  // The control's prose statement, flattened from the OSCAL part/prose
  // tree into a single string.
  string statement = 3;
  string group_path = 4;
}

message ImportCatalogResponse {
  // True when the document deserialized + validated as an OSCAL v1.1.x
  // catalog. When false, controls is empty and errors is populated.
  bool valid = 1;
  // Human-readable validation errors when valid=false (or a size/cap
  // rejection message).
  repeated string errors = 2;
  // The normalized control projection (empty when valid=false).
  repeated ImportedControl controls = 3;
  // The catalog's declared OSCAL version (echoed for provenance).
  string oscal_version = 4;
  // The catalog metadata title (echoed for provenance / display).
  string catalog_title = 5;
  // Echo of the request source_label.
  string source_label = 6;
}

// ----- profile import (ingest / resolve) -----

// SuppliedCatalog is one catalog document the caller supplies for the
// profile to resolve against. The bridge resolves `import.href` references
// ONLY against these supplied catalogs (never an external fetch). The
// optional title / uuid help the bridge match an `import.href` to the right
// supplied catalog when several are provided.
message SuppliedCatalog {
  // The raw OSCAL catalog JSON document bytes.
  bytes oscal_json = 1;
  // Optional operator label for this catalog (diagnostic only).
  string label = 2;
}

// SuppliedProfile is one INTERMEDIATE profile document the caller supplies so
// a chained profile-over-profile import can resolve against it (slice 578).
// A profile's `import.href` may name another supplied profile; the bridge
// rewrites the href to a sandboxed `trestle://` path pointing at that profile
// and lets compliance-trestle's ProfileResolver descend the chain. The bridge
// NEVER fetches an external profile — an href that names no supplied profile
// (and no supplied catalog) is a structured error, not a fetch.
message SuppliedProfile {
  // The raw OSCAL profile JSON document bytes.
  bytes oscal_json = 1;
  // Optional operator label for this profile (diagnostic only).
  string label = 2;
}

message ImportProfileRequest {
  // The raw inbound OSCAL profile JSON document bytes. This is the ENTRY
  // profile of the chain — its imports may name supplied catalogs or
  // supplied profiles.
  bytes profile_json = 1;
  // The catalog(s) the chain ultimately resolves against. At least one is
  // required; a chain that never bottoms out at one of these is an error.
  repeated SuppliedCatalog catalogs = 2;
  // Operator-declared source label (e.g. "FedRAMP Moderate baseline").
  // Carried into the provenance record on the Go side; echoed back.
  string source_label = 3;
  // Optional INTERMEDIATE profiles the entry profile (or a deeper profile)
  // may import (slice 578 — chained profile-over-profile resolution). An
  // `import.href` that names neither a supplied profile nor a supplied
  // catalog is a structured error, never an external fetch.
  repeated SuppliedProfile profiles = 4;
}

message ImportProfileResponse {
  // True when the profile resolved AND the resolved output validated as an
  // OSCAL v1.1.x catalog. When false, controls is empty and errors is set.
  bool valid = 1;
  // Human-readable errors when valid=false: a validation failure, an
  // unresolvable / external `import.href`, a cyclic chain, a chain deeper
  // than the depth bound, or a size/count cap rejection.
  repeated string errors = 2;
  // The resolved control projection (empty when valid=false). These are the
  // controls the profile's import/merge/modify directives produced.
  repeated ImportedControl controls = 3;
  // The resolved catalog's declared OSCAL version (echoed for provenance).
  string oscal_version = 4;
  // The profile's declared metadata title (echoed for provenance / display).
  string profile_title = 5;
  // Echo of the request source_label.
  string source_label = 6;
}

// ----- component-definition import (ingest — slice 512) -----

message ImportComponentDefinitionRequest {
  // The raw inbound OSCAL component-definition JSON document bytes. The
  // bridge parses these via compliance-trestle; it does NOT fetch any href
  // the document references (P0-512-2).
  bytes oscal_json = 1;
  // Operator-declared source label, typically the vendor / product name
  // (e.g. "Acme Cloud Platform"). Carried into the provenance record on the
  // Go side; the bridge echoes it back.
  string source_label = 2;
}

// VendorClaim is one implemented-requirement extracted from a component:
// the vendor's ASSERTION that the component implements a specific control.
// It is a CLAIM, never platform-verified evidence (P0-512-1). control_id is
// the OSCAL `control-id` the requirement targets; statement is the vendor's
// implementation narrative (flattened from the requirement description +
// statement prose). No href / external resource is resolved.
message VendorClaim {
  // The OSCAL control-id this implemented-requirement targets.
  string control_id = 1;
  // The vendor's implementation narrative for this control (the requirement
  // description + flattened statement prose).
  string statement = 2;
  // The implemented-requirement's OSCAL uuid (provenance / de-dup anchor),
  // echoed verbatim. Empty if the document omitted it.
  string requirement_uuid = 3;
}

// VendorComponent is one defined-component from a component-definition plus
// the control-implementation claims it asserts. A component is a discrete
// product / service the vendor describes (type e.g. "software", "service").
message VendorComponent {
  // The component's OSCAL uuid, echoed verbatim (provenance anchor).
  string component_uuid = 1;
  // The OSCAL component `type` (e.g. "software", "service", "hardware").
  string component_type = 2;
  // The component title (the product / service name).
  string title = 3;
  // The component description.
  string description = 4;
  // The vendor's implemented-requirement claims for this component.
  repeated VendorClaim claims = 5;
}

message ImportComponentDefinitionResponse {
  // True when the document deserialized + validated as an OSCAL v1.1.x
  // component-definition. When false, components is empty and errors is set.
  bool valid = 1;
  // Human-readable validation errors when valid=false (or a size/cap
  // rejection message).
  repeated string errors = 2;
  // The normalized component projection (empty when valid=false).
  repeated VendorComponent components = 3;
  // The component-definition's declared OSCAL version (echoed for provenance).
  string oscal_version = 4;
  // The component-definition metadata title (echoed for provenance/display).
  string component_definition_title = 5;
  // Echo of the request source_label (the vendor/product label).
  string source_label = 6;
}
