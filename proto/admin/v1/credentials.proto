// security-atlas Admin Credentials — API-key lifecycle for the push API.
//
// Slice 003 ships the gRPC surface against in-memory state. Slice 034 swaps
// the in-memory store for the RLS-enforced `api_keys` table and adds the
// HTTP admin gateway. The wire contract here is the v1 commitment for both.
//
// Bearer tokens are visible to the caller exactly once — at issue (or
// rotate) time. List never returns the token, only metadata.

syntax = "proto3";

package admin.v1;

import "google/protobuf/duration.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/mgoodric/security-atlas/gen/proto/admin/v1;adminv1";

// AdminCredentials manages bearer tokens used by Evidence.Push.
//
// All RPCs require an admin-tier bearer in `authorization` metadata.
// Authorization checks are mocked in slice 003 (any valid bearer is
// treated as admin); slice 034 introduces RBAC via OPA.
service AdminCredentialsService {
  // Issue creates a new API key scoped to a tenant. Returns the bearer
  // token in the response exactly once — the server hashes the token at
  // rest and cannot retrieve the plaintext later.
  rpc Issue(IssueRequest) returns (IssueResponse);

  // Rotate creates a successor token for an existing key. The old key
  // remains valid until explicitly revoked (rotation window). The
  // response includes a grace deadline so the rotating client knows when
  // to stop using the predecessor.
  rpc Rotate(RotateRequest) returns (RotateResponse);

  // Revoke invalidates a key immediately. Subsequent push attempts using
  // the revoked bearer return Unauthenticated.
  rpc Revoke(RevokeRequest) returns (RevokeResponse);

  // List enumerates active keys for a tenant. Returns metadata only —
  // bearer tokens are not retrievable after issue.
  rpc List(ListRequest) returns (ListResponse);
}

message IssueRequest {
  string tenant_id = 1;
  // JSON-encoded scope predicate (matches Control.applicability_expr DSL
  // shape; slice 017 formalizes). May be empty.
  string scope_predicate = 2;
  // Evidence-kind identifiers this credential may push. Empty = all kinds.
  repeated string kinds = 3;
  // Time-to-live from issue. Zero = no automatic expiry.
  google.protobuf.Duration ttl = 4;
}

message IssueResponse {
  ApiKeyHandle handle = 1;
  // Bearer token plaintext. Visible ONLY in this response — never
  // retrievable again (hashed at rest by the server). Pass via
  // `authorization: Bearer <token>` metadata on subsequent calls.
  string bearer_token = 2;
}

message RotateRequest {
  string id = 1;
}

message RotateResponse {
  ApiKeyHandle handle = 1;
  // Bearer token plaintext for the successor key. Visible only here.
  string bearer_token = 2;
  // When the predecessor key stops being accepted. Until this time the
  // old bearer token still authenticates, enabling zero-downtime credential
  // rotation in CI. Slice 003 sets this to a fixed window; slice 034 makes
  // it configurable.
  google.protobuf.Timestamp predecessor_expires_at = 3;
}

message RevokeRequest {
  string id = 1;
}

message RevokeResponse {}

message ListRequest {
  string tenant_id = 1;
}

message ListResponse {
  // Active keys only. Intentionally no bearer_token field — the list path
  // is read-many and must never leak a token even if cached.
  repeated ApiKeyHandle handles = 1;
}

// ApiKeyHandle is the metadata view of an API key. Never includes the
// bearer token plaintext.
message ApiKeyHandle {
  reserved 10 to 19;

  string id = 1;
  string tenant_id = 2;
  string scope_predicate = 3;
  repeated string kinds = 4;
  google.protobuf.Duration ttl = 5;
  google.protobuf.Timestamp issued_at = 6;
  google.protobuf.Timestamp last_used_at = 7;
  // For rotation lineage: points at the predecessor key id when issued
  // via Rotate. Empty for original Issue calls.
  string rotated_from = 8;
  // Last 4 characters of the bearer token for human disambiguation (e.g.,
  // when picking between multiple active keys in a UI). Cannot be used to
  // authenticate.
  string last_4 = 9;
}
