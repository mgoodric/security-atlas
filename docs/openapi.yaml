openapi: 3.1.0
info:
  title: security-atlas REST API
  version: v1
  description: |
    Operator-facing REST API for the security-atlas GRC platform.

    Two API surfaces:

    - **REST** (this document) — operator integration, dashboards, admin
      workflows. Authenticated via bearer tokens issued by
      `POST /v1/admin/credentials` (slice 034) or the
      `/auth/*` sign-in flow.
    - **gRPC** (specified separately in `proto/`) — Evidence SDK push
      (`evidence.IngestEvidence`), connector ingest, OSCAL bridge.

    The two surfaces stay separately specified; this spec covers only
    REST. See `Plans/EVIDENCE_SDK.md` for the dual-surface contract.

    Internal endpoints (`x-internal: true`) are filtered from the public
    Redoc render — they are operator probes (`/health`, `/metrics`,
    `/v1/version`, `/v1/install-state`) and not part of the consumer
    integration surface.
  license:
    name: license-pending
    url: https://github.com/mgoodric/security-atlas/blob/main/LICENSE

