version: "2"
run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - misspell
    - revive
    - unused
  settings:
    revive:
      severity: warning
      rules:
        - name: var-naming
        - name: error-return
        - name: error-strings
        - name: error-naming
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - revive

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/mgoodric/security-atlas

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
