repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        # Helm chart templates (deploy/helm/templates/, slice 038) embed
        # Go-template `{{ ... }}` directives and are NOT valid standalone
        # YAML — `helm lint` is their linter (CI job `Helm chart · lint +
        # template`). The pure-YAML chart files (Chart.yaml, values*.yaml)
        # are still checked.
        exclude: ^deploy/helm/templates/
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: detect-private-key
      - id: detect-aws-credentials
        args: ["--allow-missing-credentials"]
      - id: mixed-line-ending

  # Go formatting via core gofmt (does not require pre-commit-golang upstream)
  - repo: local
    hooks:
      - id: gofmt
        name: gofmt
        entry: gofmt -l -w
        language: system
        types: [go]
        pass_filenames: true

  # Python: ruff format + lint
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Frontend / config: prettier
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, json, yaml, markdown]
        exclude: ^(Plans/mockups/|package-lock\.json|deploy/helm/templates/)

  # Frontend ESLint on pre-push (slice 083 — follow-on to 081 D3).
  # Pre-push stage only: lint is slower than the pre-commit suite and
  # blocking every commit would feel punitive. Pre-push catches it before
  # CI's informational `Frontend · lint` job (slice 078) does.
  # `files: ^web/` scopes the trigger; `pass_filenames: false` runs the
  # full workspace lint (npm run lint -w web ignores the framework's
  # per-file list and runs ESLint against its own configured globs).
  - repo: local
    hooks:
      - id: npm-lint-web
        name: npm-lint-web
        entry: npm run lint -w web
        language: system
        stages: [pre-push]
        files: ^web/
        pass_filenames: false

  # actionlint — slice 158 D3 guard against invalid GHA workflow files.
  # PR #311 added `administration: read` to a job's `permissions:` block;
  # `administration` is not a valid GITHUB_TOKEN scope, GHA silently
  # dropped the workflow file at parse, and the slice-127 drift job
  # never ran. actionlint catches that exact class of error before the
  # commit lands.
  #
  # `local` hook (not the upstream `rhysd/actionlint-pre-commit` repo)
  # so contributors install actionlint via their package manager
  # (`brew install actionlint` on macOS, `apt install actionlint` on
  # Debian, or download from releases). This matches the pattern for
  # `gofmt` above and avoids a python-wheel-wrapper dependency that
  # would lag the upstream actionlint binary on bug-fix releases.
  # `-shellcheck ""` disables the embedded shellcheck pass — pre-
  # existing SC2034/SC2045 warnings in this repo's `run:` blocks are
  # not the failure mode this guard is for and would be a noisy
  # distraction. The wrong-permission-scope error (slice 158 P0) fires
  # regardless of shellcheck level.
  - repo: local
    hooks:
      - id: actionlint
        name: actionlint (slice 158)
        entry: actionlint -shellcheck "" -no-color
        language: system
        files: ^\.github/workflows/.*\.ya?ml$
        pass_filenames: true

  # Machine-local-cache guard — slice 458. Fails when a staged path matches
  # a known per-machine cache shape (`.understand-anything/`, `.cache/`,
  # `node_modules/`, `.DS_Store`, …). Background: a 9.8M
  # `.understand-anything/` cache was once swept into main by a broad
  # `git add .` BEFORE its `.gitignore` rule landed (slice 433). `.gitignore`
  # stops the forward accident only for untracked paths; this guard blocks
  # the NEXT cache-dir of that footgun at commit time. The same script runs
  # in CI (the `cache-path-guard` job in ci.yml) for defense in depth — a
  # contributor who skips local hooks is still caught.
  #
  # `pass_filenames: true` so the staged file list arrives as argv (the
  # script's bare-path / --args mode); the denylist lives in the script
  # (DENY_DIRS / DENY_FILES). `always_run: false` (default) + no `files:`
  # filter means it only runs against the staged set, which is exactly the
  # surface we guard.
  - repo: local
    hooks:
      - id: cache-path-guard
        name: cache-path-guard (slice 458)
        entry: scripts/check-staged-cache-paths.sh
        language: system
        pass_filenames: true
