cases:
  # No declared query -> the per-record evidence rollup IS the state (identical
  # to the live engine's no-query fallback). A single passing attestation passes.
  - name: attestation-present
    description: "A passing manual attestation in-window -> control passes."
    expected_state: pass
    evaluated_at: 2026-06-01T12:00:00Z
    records:
      - result: pass
        observed_at: 2026-05-15T00:00:00Z

  # Zero records -> no in-window evidence -> inconclusive (absence is not
  # failure).
  - name: no-attestation
    description: "No attestation record -> inconclusive (no evidence)."
    expected_state: inconclusive
    evaluated_at: 2026-06-01T12:00:00Z
    records: []
