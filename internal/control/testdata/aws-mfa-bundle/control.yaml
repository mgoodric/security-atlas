bundle_schema_version: "1"
bundle_id: aws_iam_mfa_prod_test
title: "MFA on every prod IAM user"
description: "Production AWS IAM users must have MFA enabled."
scf_anchor_id: IAC-06
implementation_type: automated
control_family: IAC
owner_role: security-engineering
lifecycle_state: proposed
freshness_class: daily

applicability_expr:
  op: "and"
  args:
    - { op: "eq", dim: "environment", value: "prod" }
    - {
        op: "in",
        dim: "data_classification",
        values: ["restricted", "confidential"],
      }

linked_policy_ids:
  - policy_identity_access_management

evidence_queries:
  - id: aws_iam_mfa_check
    language: rego
    evidence_kind: aws.s3.bucket_encryption_state
    description: "All IAM users must have MFA enabled"
    expression: |
      package atlas.controls.aws_iam_mfa_prod
      default allow := false
      allow if every u in input.iam_users { u.mfa_enabled == true }
