# Local development stack for security-atlas.
#
# - postgres: the platform's primary store
# - minio:    S3-compatible object store for slice 036 artifacts
#
# Production self-host swaps minio for any S3-compatible backend (AWS S3,
# Cloudflare R2, Wasabi, Ceph RadosGW). The platform binary reads
# `ARTIFACTS_BUCKET`, `ARTIFACTS_S3_ENDPOINT`, and the standard AWS
# credential env vars from its environment.
#
# Run: `docker compose -f deploy/docker/docker-compose.yml up -d`
# Stop: `docker compose -f deploy/docker/docker-compose.yml down`

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: security_atlas
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    # Slice 036: S3-compatible object store for the artifact store.
    # Default credentials are intentionally trivial — they only ever bind
    # to the host on local-dev. Production rotates these per deployment.
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Bootstraps the default artifacts bucket the platform reads from. Runs
  # once, exits, and leaves the bucket in place for subsequent `up`s.
  minio-mc:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/atlas-artifacts &&
      echo 'bucket atlas-artifacts ready'
      "

volumes:
  minio-data:
