# security-atlas — single-VM self-host bundle (slice 037).
#
# One `docker compose up -d` brings the whole platform online:
#
#   postgres         primary store (Postgres 16)
#   nats             JetStream evidence-ingest buffer (slice 015)
#   minio            S3-compatible artifact store (slice 036)
#   minio-mc         one-shot: creates the artifacts bucket, then exits
#   atlas-migrate    ALWAYS-RUN one-shot: roles + forward migrations +
#                    atlas_app password, idempotent + fail-closed, then
#                    exits 0 (slice 473)
#   atlas-bootstrap  first-boot one-shot: seed + SCF import + control
#                    bundle upload, then exits 0 (slice 037)
#   atlas            platform server — gRPC :50051 + HTTP :8080 (/health)
#   web              Next.js frontend — :3000
#
# Startup ordering (enforced by depends_on conditions):
#   postgres/nats/minio healthy
#     -> minio-mc completes (bucket ready)
#     -> atlas-migrate completes (schema current — roles + migrations +
#        atlas_app password) — fail-closed gate (slice 473)
#     -> atlas starts (gated on atlas-migrate completing — NEVER serves a
#        partial schema) AND atlas-bootstrap starts (seed + SCF import)
#        run in parallel
#     -> atlas-bootstrap phase 5 uploads control bundles once /health is up
#     -> web starts
#
# Slice 473 — migrate-on-upgrade (confirmed production incident). The
# migrate step is its OWN service that runs on EVERY bring-up (not just
# first boot), so a Watchtower-driven binary update can never serve
# against a stale schema: `atlas` is gated on `atlas-migrate`'s
# `service_completed_successfully`, so a binary update re-runs migrate
# first and the backend waits for it. A migration failure fails the
# migrate step loudly (naming the file) and the gate blocks the backend
# from serving a partial schema. See bootstrap/migrate.sh.
#
# Target: a mid-size VM (4 vCPU / 16 GB RAM). Initial bring-up < 5 min
# (acceptance criterion AC-1). See docs/SELF_HOSTING.md and
# docs/getting-started/first-evidence.md.
#
# Secrets: every credential is read from the environment. Copy
# `.env.example` to `.env` and edit it before first boot — `.env` is
# gitignored. NOTHING in this file is a real secret. The `${VAR:?}`
# syntax makes compose fail fast with "required variable VAR is missing"
# if a credential is unset; `.env.example` documents what each one is.
#
# Run:  docker compose -f deploy/docker/docker-compose.yml --env-file deploy/docker/.env up -d
# Stop: docker compose -f deploy/docker/docker-compose.yml down
# Wipe: docker compose -f deploy/docker/docker-compose.yml down -v

name: security-atlas

services:
  # --------------------------------------------------------------------
  # Postgres 16 — primary store. RLS-enforced; the app connects as
  # atlas_app, migrations + bootstrap connect as atlas_migrate.
  # --------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_DB: ${POSTGRES_DB:-security_atlas}
      # Slice 065 bug #2 — bundled-mode auth.
      #
      # The bundled bundle's atlas_migrate DSN (.env.example
      # DATABASE_URL_MIGRATE) carries NO password — it relies on
      # "trust-on-the-docker-network auth", which this header and
      # .env.example both document. But postgres:16-alpine with
      # POSTGRES_PASSWORD set and POSTGRES_HOST_AUTH_METHOD UNSET writes
      # `host all all all scram-sha-256` into pg_hba.conf, so the
      # password-less atlas-bootstrap connection is rejected with
      # `fe_sendauth: no password supplied` and bootstrap's
      # wait-for-Postgres loop times out. Defaulting this to `trust`
      # wires the auth posture the bundle already documents. Operators
      # pointing at an EXTERNAL cluster set DATABASE_URL_MIGRATE with a
      # real password and can override this to `scram-sha-256` (or empty
      # — the postgres image then falls back to scram); the slice-065
      # end-to-end harness exercises both via .env.test.
      #
      # `:-` vs `-`: the `-` (no colon) form is deliberate. The harness's
      # external mode sets POSTGRES_HOST_AUTH_METHOD to an EXPLICIT empty
      # string; `${VAR-default}` honours an explicit empty value (only an
      # entirely-unset VAR falls back to `trust`), whereas `${VAR:-default}`
      # would override the empty value back to `trust` and break external
      # mode.
      POSTGRES_HOST_AUTH_METHOD: ${POSTGRES_HOST_AUTH_METHOD-trust}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
      # Slice 065 bug #2 (part 2) — role-bootstrap chicken-and-egg.
      #
      # atlas-bootstrap connects to Postgres ONLY as atlas_migrate
      # (DATABASE_URL = DATABASE_URL_MIGRATE). On a fresh bundled volume
      # that role does not exist yet, so bootstrap.sh's wait-for-Postgres
      # loop never connects ("role atlas_migrate does not exist") and
      # times out — atlas-bootstrap cannot create the role it needs to
      # connect as. The postgres image runs every file in
      # /docker-entrypoint-initdb.d ONCE at cluster init as the superuser,
      # which is exactly the right place to create the three roles.
      # 01-roles.sql is fully IF-NOT-EXISTS-guarded, so bootstrap.sh phase
      # 2 re-running it as atlas_migrate stays a clean no-op.
      #
      # PG_INITDB_ROLES defaults to the repo's 01-roles.sql so the shipped
      # bundle is self-bootstrapping. The slice-065 end-to-end harness's
      # `external` mode points it at /dev/null instead (an empty no-op
      # initdb script) so that mode keeps its "atlas_migrate is
      # pre-created by the cluster admin as a non-superuser" test premise.
      # Shared-cluster operators do not run this `postgres` service at all.
      - ${PG_INITDB_ROLES:-../../migrations/bootstrap/01-roles.sql}:/docker-entrypoint-initdb.d/01-roles.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  # --------------------------------------------------------------------
  # NATS JetStream — evidence-ingest buffer (slice 015). `-js` enables
  # JetStream; `-sd /data` persists stream state so a restart preserves
  # the buffer.
  # --------------------------------------------------------------------
  nats:
    image: nats:2.10-alpine
    command:
      - "-js"
      - "-sd"
      - "/data"
      - "--http_port"
      - "8222"
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  # --------------------------------------------------------------------
  # MinIO — S3-compatible artifact store (slice 036). The official
  # `minio/minio` image needs `server /data` passed explicitly (the
  # `bitnami/minio` image is unpullable — do not switch to it).
  # --------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  # --------------------------------------------------------------------
  # minio-mc — one-shot: creates the artifacts bucket, then exits. Leaves
  # the bucket in place for subsequent `up`s (idempotent --ignore-existing).
  # --------------------------------------------------------------------
  minio-mc:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/${ARTIFACTS_BUCKET:-atlas-artifacts} &&
      echo 'bucket ${ARTIFACTS_BUCKET:-atlas-artifacts} ready'
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?}
    restart: "no"

  # --------------------------------------------------------------------
  # atlas-migrate — ALWAYS-RUN, idempotent, fail-closed migrate step
  # (slice 473). Runs migrate.sh: applies bootstrap roles + every
  # forward migration not yet recorded in schema_migrations + the
  # atlas_app password, then exits 0. Unlike atlas-bootstrap this runs
  # on EVERY bring-up / image update, NOT just first boot.
  #
  # WHY (confirmed production incident, 2026-06-05): the old stack
  # applied migrations only inside the one-shot atlas-bootstrap, which is
  # un-labelled + restart:"no". Watchtower advanced the atlas BINARY but
  # never re-ran bootstrap, so the binary served against a stale schema
  # (the maintainer's edge box fell 3 migrations behind -> a masked HTTP
  # 500 on demo-seed). Splitting migrate into its own always-run service
  # AND gating the backend on `service_completed_successfully` (see the
  # atlas block) means a binary update re-runs migrate first and the
  # backend never serves a partial schema.
  #
  # Shares the bootstrap image (same migrations + psql); selects
  # migrate.sh via the entrypoint override. restart:"on-failure" lets a
  # transient Postgres-not-ready blip retry, but a genuine migration
  # failure still ends non-zero (migrate.sh exits 1 with the failing file
  # named) and the backend's completed-successfully gate stays unmet.
  # --------------------------------------------------------------------
  atlas-migrate:
    build:
      context: ../..
      dockerfile: deploy/docker/bootstrap.Dockerfile
    # Watchtower opt-IN: the migrate one-shot must move forward in lockstep
    # with the atlas binary so an auto-updated binary always runs against a
    # migrated schema. Without this label Watchtower would advance the
    # binary while migrate stayed pinned — the exact incident this slice
    # fixes. (The bundled stack builds from source, so the label is inert
    # here; it documents intent + mirrors the edge channel, where it is
    # load-bearing.)
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    entrypoint: ["/bootstrap/migrate.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # atlas_migrate DSN (BYPASSRLS); no password on the trust network.
      DATABASE_URL: ${DATABASE_URL_MIGRATE:?}
      # migrate.sh sets the atlas_app role password as part of the DDL step.
      ATLAS_APP_PASSWORD: ${ATLAS_APP_PASSWORD:?}
      REPO_ROOT: /repo
    volumes:
      - ../..:/repo:ro
    # A transient blip (Postgres mid-init) is retryable; a real migration
    # failure exits non-zero and is NOT retried into a serving state — the
    # backend's service_completed_successfully gate blocks it regardless.
    restart: "on-failure"

  # --------------------------------------------------------------------
  # atlas-bootstrap — one-shot FIRST-BOOT seed: default tenant/scope/user
  # + SCF catalog import + control-bundle upload. Exits 0 on success.
  # Slice 473: migrations + roles + atlas_app password moved to the
  # always-run atlas-migrate service above; this bootstrap is gated on
  # that completing, so it always seeds a fully-migrated schema. The repo
  # tree is bind-mounted read-only at /repo so a `git pull` picks up new
  # fixtures without a rebuild.
  # --------------------------------------------------------------------
  atlas-bootstrap:
    build:
      context: ../..
      dockerfile: deploy/docker/bootstrap.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      minio-mc:
        condition: service_completed_successfully
      # Slice 473: seed only a fully-migrated schema. atlas-migrate is the
      # single source of schema truth; gating here keeps seed.sql from
      # ever running against a partial schema.
      atlas-migrate:
        condition: service_completed_successfully
    environment:
      # DSNs are assembled in .env (see .env.example) rather than inline
      # here so the compose source never contains a `user:pass@host`
      # literal. atlas_migrate uses peer/trust on the container network;
      # its DSN carries no password.
      DATABASE_URL: ${DATABASE_URL_MIGRATE:?}
      ATLAS_APP_PASSWORD: ${ATLAS_APP_PASSWORD:?}
      ATLAS_HTTP_URL: http://atlas:8080
      ATLAS_BOOTSTRAP_TENANT: ${ATLAS_BOOTSTRAP_TENANT:-00000000-0000-4000-8000-000000000001}
      # Slice 196: ATLAS_BOOTSTRAP_TOKEN is NO LONGER wired into the
      # bootstrap container. Phase 6 of bootstrap.sh now issues an
      # OAuth client at runtime via `atlas-cli oauth issue-client`,
      # persists credentials to
      # ${ATLAS_DATA_DIR}/oauth-bootstrap-credentials.json (mode 0600
      # on the atlas-bootstrap-data named volume below), and drives
      # `atlas-cli controls upload --client-id ... --client-secret ...`.
      # The atlas service block further down KEEPS the env var
      # (AC-4 transitional) so the slice-037 fixed-token credential
      # at cmd/atlas/main.go still mints — operators with legacy
      # integrations expecting the static token can keep using it
      # until a spillover slice retires the path. P0-196-2: the
      # client_secret is NEVER baked into any image layer; it lives
      # only on the runtime-mounted volume.
      ATLAS_DATA_DIR: /var/lib/atlas-bootstrap
      ATLAS_DEFAULT_USER_EMAIL: ${ATLAS_DEFAULT_USER_EMAIL:-admin@example.com}
      ATLAS_DEFAULT_USER_PASSWORD: ${ATLAS_DEFAULT_USER_PASSWORD:?}
      REPO_ROOT: /repo
    volumes:
      - ../..:/repo:ro
      # Slice 196: dedicated writable volume for the OAuth bootstrap
      # credentials file. Persists across `docker compose run --rm
      # atlas-bootstrap` re-runs so the second + later runs reuse the
      # already-issued OAuth client (idempotency — see bootstrap.sh
      # phase 6a). Owned by the in-container `postgres` user (the
      # bootstrap image runs as USER postgres).
      - atlas-bootstrap-data:/var/lib/atlas-bootstrap
    restart: "no"

  # --------------------------------------------------------------------
  # atlas — the platform server. gRPC :50051 + HTTP :8080. Connects as
  # atlas_app (RLS-enforced) for app reads/writes and atlas_migrate
  # (BYPASSRLS) for the boot-time schema import + cross-tenant sweeps.
  # --------------------------------------------------------------------
  atlas:
    build:
      context: ../..
      dockerfile: deploy/docker/atlas.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
      # Slice 473 — FAIL-CLOSED migrate gate (P0-473-1, load-bearing).
      #
      # atlas does NOT start serving until atlas-migrate has exited 0
      # (`service_completed_successfully`). This is the gate that makes a
      # Watchtower-driven binary update safe: an updated atlas image waits
      # for the always-run migrate step to bring the schema current before
      # it serves a single request. If a migration fails, atlas-migrate
      # exits non-zero (naming the failing file), this condition is NEVER
      # satisfied, and atlas never serves a partial schema — the masked
      # HTTP 500 class from the 2026-06-05 incident cannot recur.
      atlas-migrate:
        condition: service_completed_successfully
      # Slice 065 bug #2 — startup-ordering deadlock (still load-bearing).
      #
      # atlas-bootstrap stays `service_started`, NOT
      # `service_completed_successfully`: bootstrap phase 4 BLOCKS waiting
      # for atlas's /health to return 200 (and phase 5 then uploads
      # control bundles to the live server). Gating atlas on bootstrap
      # *completing* would deadlock — neither container could make
      # progress. With migrations now in the separate atlas-migrate
      # service (gated above), the schema is guaranteed current before
      # atlas starts, so bootstrap's remaining work (seed + SCF import +
      # control upload) can run in parallel with atlas booting, exactly as
      # the file header choreography describes.
      atlas-bootstrap:
        condition: service_started
    environment:
      # DSNs are assembled in .env (see .env.example) so the compose
      # source carries no `user:pass@host` literal. DATABASE_URL_APP is
      # the RLS-enforced app-role pool; DATABASE_URL_MIGRATE is the
      # BYPASSRLS migrate-role pool for boot-time schema import + sweeps.
      DATABASE_URL_APP: ${DATABASE_URL_APP:?}
      DATABASE_URL: ${DATABASE_URL_MIGRATE:?}
      ATLAS_HTTP_ADDR: ":8080"
      ATLAS_GRPC_ADDR: ":50051"
      # Slice 196: enable the slice 187/188 OAuth issuer + token endpoint
      # in the self-host bundle. Without these, /oauth/token returns
      # 404 and the bootstrap container's OAuth client_credentials
      # token acquisition fails. ATLAS_ISSUER_URL is also baked into
      # every JWT's `iss` claim and must match what the bootstrap
      # container passes as --issuer (it passes ATLAS_HTTP_URL —
      # http://atlas:8080).
      ATLAS_ISSUER_URL: http://atlas:8080
      ATLAS_KEYSTORE_PATH: /var/lib/atlas/keys
      ATLAS_DATA_DIR: /var/lib/atlas
      # Slice 196: the bootstrap container uploads 50 control bundles
      # via 50 separate `atlas-cli controls upload` invocations (one
      # per bundle directory) — each acquires its own JWT, so the
      # default 60/min token rate limit gets exhausted on idempotent
      # re-runs (50 first run + 50 re-run within the same minute
      # window = 100 acquires, capped at 60). 600/min gives ample
      # headroom for the load-bearing self-host bundle e2e idempotency
      # assertion. The rate-limit envelope is per-client_id so other
      # OAuth clients are unaffected.
      ATLAS_OAUTH_TOKEN_RATE_PER_MIN: ${ATLAS_OAUTH_TOKEN_RATE_PER_MIN:-600}
      # Slice 015 / slice 460: NATS JetStream evidence-ingest substrate.
      # Defaults to the fixed in-compose-network address of the bundled
      # `nats` service; an operator pointing at an EXTERNAL NATS cluster
      # sets NATS_URL in .env (documented + commented in .env.example).
      # The `:-` default preserves the prior hardcoded behavior exactly
      # when the variable is unset, so the shipped bundle is unchanged.
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      # Slice 034: HMAC key for api_keys.token_hash. Refuse-to-boot if unset.
      BEARER_HASH_KEY: ${BEARER_HASH_KEY:?}
      # Slice 037: fixed-token admin credential for the bootstrap uploader.
      ATLAS_BOOTSTRAP_TENANT: ${ATLAS_BOOTSTRAP_TENANT:-00000000-0000-4000-8000-000000000001}
      ATLAS_BOOTSTRAP_TOKEN: ${ATLAS_BOOTSTRAP_TOKEN:?}
      # Slice 201: opt-in test-mode env-gate. When ATLAS_TEST_MODE=1,
      # the atlas server mounts POST /v1/test/issue-jwt — a JWT mint
      # endpoint the Playwright e2e harness uses to obtain a bearer
      # before each test invocation. The endpoint is ALSO per-request
      # gated on the same env (defense in depth). Default is the empty
      # string, NOT "1", so production deployments stay safe. The
      # self-host test bundle's `.env.test` sets it to "1"; production
      # .env files leave it unset.
      #
      # P0-201-2 invariant: this endpoint MUST NEVER be exposed in
      # production. Setting ATLAS_TEST_MODE=1 on a production
      # deployment is a security regression — operators MUST gate the
      # endpoint at the network layer if they choose to enable it for
      # internal QA.
      ATLAS_TEST_MODE: ${ATLAS_TEST_MODE:-}
      # Local-HTTP default: cookies are not Secure-flagged. Set to "true"
      # once the deployment is behind TLS.
      ATLAS_SECURE_COOKIES: ${ATLAS_SECURE_COOKIES:-false}
      # Slice 465: opt into X-Forwarded-For client-IP capture for session
      # rows (read by internal/api/auth/clientip.go +
      # internal/api/admindemo/handler.go). The `:-` empty default means
      # an unset variable maps to an empty value — the server's "1"-gated
      # check stays false, so the shipped bundle records r.RemoteAddr
      # exactly as it does today (default OFF, byte-identical when unset).
      # SECURITY: only set this to "1" in .env when atlas is behind a
      # trusted reverse proxy that overwrites inbound X-Forwarded-For;
      # trusting it otherwise is a client-IP spoofing vector. See
      # .env.example for the full warning.
      TRUST_FORWARDED_HEADERS: ${TRUST_FORWARDED_HEADERS:-}
      # Slice 466: trusted reverse-proxy allowlist (comma-separated CIDRs).
      # The `:-` empty default means an unset variable maps to empty — the
      # server then trusts NO proxy and records r.RemoteAddr exactly as
      # today (byte-identical when unset). Supersedes the boolean above;
      # the server walks X-Forwarded-For right-to-left, accepting a hop only
      # while the connecting peer is inside one of these CIDRs. SECURITY:
      # list only your own proxy addresses; 0.0.0.0/0 reopens the spoofing
      # vector. See .env.example for the full warning.
      TRUSTED_PROXY_CIDRS: ${TRUSTED_PROXY_CIDRS:-}
      # Slice 036: artifact store wiring.
      ARTIFACTS_BUCKET: ${ARTIFACTS_BUCKET:-atlas-artifacts}
      ARTIFACTS_S3_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER:?}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      # Slice 121: OpenTelemetry. All env-vars default to empty (no-op
      # mode); operators opt in by setting OTEL_EXPORTER_OTLP_ENDPOINT in
      # .env (typical value: http://otel-collector:4317 when the
      # `deploy/observability/` bundle is up). Other OTEL_* knobs follow
      # the OTel standard. ATLAS_METRICS_FALLBACK_ENABLE is the opt-in
      # Prometheus /metrics endpoint — see .env.example for the
      # network-layer-gating requirement.
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-}
      OTEL_RESOURCE_ATTRIBUTES: ${OTEL_RESOURCE_ATTRIBUTES:-}
      OTEL_TRACES_SAMPLER: ${OTEL_TRACES_SAMPLER:-}
      OTEL_TRACES_SAMPLER_ARG: ${OTEL_TRACES_SAMPLER_ARG:-}
      ATLAS_DEPLOYMENT_ENVIRONMENT: ${ATLAS_DEPLOYMENT_ENVIRONMENT:-}
      ATLAS_METRICS_FALLBACK_ENABLE: ${ATLAS_METRICS_FALLBACK_ENABLE:-false}
    ports:
      - "${ATLAS_HTTP_PORT:-8080}:8080"
      - "${ATLAS_GRPC_PORT:-50051}:50051"
    volumes:
      # Slice 196: persistent atlas data dir — slice 187 OAuth signing
      # keystore lives under /var/lib/atlas/keys and MUST survive
      # restarts (otherwise every JWT issued before the restart is
      # invalidated). Slice 073 bootstrap-token file at
      # /var/lib/atlas/bootstrap-token also lives here. atlas.Dockerfile
      # pre-creates the directory tree with nonroot ownership so the
      # named volume mount inherits the right uid.
      - atlas-data:/var/lib/atlas
    healthcheck:
      test: ["CMD", "/usr/local/bin/atlas", "--version"]
      interval: 10s
      timeout: 5s
      retries: 6
      # Slice 065 bug #2 / slice 473: bumped 20s -> 120s. atlas is now
      # gated on atlas-migrate completing (schema current before serve),
      # and boots in PARALLEL with atlas-bootstrap's seed + SCF import.
      # atlas's own connect-retry loop needs room to converge across a
      # cold start; a 20s start_period would mark atlas unhealthy and
      # churn the restart loop. 120s comfortably covers a cold start on
      # the target 4 vCPU / 16 GB VM while keeping the post-converge
      # healthcheck cadence tight.
      start_period: 120s
    restart: unless-stopped

  # --------------------------------------------------------------------
  # web — the Next.js frontend. Talks to the atlas HTTP API. In a
  # browser, NEXT_PUBLIC_API_BASE_URL must be reachable from the user's
  # machine, so it points at the host-published atlas port, not the
  # in-network service name.
  # --------------------------------------------------------------------
  web:
    build:
      context: ../..
      dockerfile: deploy/docker/web.Dockerfile
    depends_on:
      atlas:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: "3000"
      # ATLAS_HTTP_URL is used by SERVER-side fetches inside the web
      # container (Next.js BFF route handlers) and must resolve over the
      # internal Docker network — `atlas` is the compose service name.
      ATLAS_HTTP_URL: http://atlas:8080
      # NEXT_PUBLIC_API_BASE_URL is read by the browser. Empty default
      # means same-origin relative URLs, which works when this deployment
      # is behind a reverse proxy that fronts both web and atlas under
      # one hostname. Override only when the browser must reach atlas at
      # a different origin than the web frontend.
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-}
    ports:
      - "${WEB_PORT:-3000}:3000"
    restart: unless-stopped

volumes:
  pg-data:
  minio-data:
  nats-data:
  # Slice 196: atlas data dir — slice 187 OAuth keystore + slice 073
  # bootstrap-token file. Persisted across restarts so JWT signing
  # keys survive `docker compose down` without `-v`.
  atlas-data:
  # Slice 196: atlas-bootstrap OAuth client credentials persistence.
  # The atlas-bootstrap service writes
  # /var/lib/atlas-bootstrap/oauth-bootstrap-credentials.json (mode
  # 0600) on first run and reuses it on every subsequent run. This is
  # NOT shared with any other service — only atlas-bootstrap mounts
  # it. Removing the volume on `docker compose down -v` is safe: the
