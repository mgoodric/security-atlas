# security-atlas — header-overwriting reverse proxy for the slice 470 e2e.
#
# This is a TEST-ONLY proxy. It fronts atlas and OVERWRITES X-Forwarded-For
# with a fixed TEST-NET client address before forwarding, modelling the
# trusted reverse-proxy hop that internal/api/auth/clientip.go's
# TRUSTED_PROXY_CIDRS walk (slice 466) is designed for.
#
# The walk's load-bearing behaviour, proven end-to-end by the slice 470
# harness against this proxy:
#
#   * A request that arrives THROUGH this proxy connects to atlas from the
#     proxy's container-network address (inside TRUSTED_PROXY_CIDRS), and
#     carries an X-Forwarded-For this proxy SET. The right-to-left walk
#     starts at the (trusted) proxy peer, steps left to the single XFF hop,
#     finds it untrusted (the real client), and returns it. => atlas records
#     the proxy-supplied client IP.
#
#   * A request that bypasses the proxy and hits atlas directly, forging its
#     own X-Forwarded-For, connects from an UNtrusted peer; the walk never
#     consults XFF and returns the direct peer. => the forged IP is ignored.
#
# `proxy_set_header X-Forwarded-For <fixed>` is a hard OVERWRITE (not the
# `$proxy_add_x_forwarded_for` append form) on purpose: a header-scrubbing
# proxy strips whatever the client sent and re-issues the header from its own
# trusted view of the connection. That is exactly the deployment posture
# TRUSTED_PROXY_CIDRS assumes (clientip.go package doc + slice 466 D-notes).
#
# TEST-NET-3 (203.0.113.0/24, RFC 5737) is used for the synthetic client IP so
# the value can never collide with a real routable address.

worker_processes 1;

events {
    # RSC-PREFETCH CAPACITY (slice 676). Next.js App Router prefetches the
    # RSC payload (`?_rsc=...` GET) of EVERY visible <Link> as it enters the
    # viewport. A single navigation to a link-dense page (dashboard, metrics,
    # board-packs) therefore fans out into MANY concurrent upstream requests
    # in one burst. The previous `64` budget was sized for the slice-470
    # single-login XFF e2e and was exhausted by that burst — nginx accepted
    # the connections it could and returned 503 for the overflow, which the
    # 2026-06-10 demo-tenant audit (ATLAS-026) saw as pervasive `?_rsc=` 503s.
    # 1024 is a single deliberate value: comfortably above any realistic
    # prefetch fan-out for the solo-operator edge box, while staying well
    # inside the default 1024 open-file budget of the nginx:alpine image.
    worker_connections 1024;
}

http {
    access_log /dev/stdout;
    error_log  /dev/stderr;

    # The atlas server inside the compose network. The proxy resolves the
    # compose service name `atlas` over the shared docker network.
    upstream atlas_upstream {
        server atlas:8080;

        # UPSTREAM CONNECTION REUSE (slice 676). Without a keepalive pool nginx
        # opens — and tears down — a FRESH upstream socket for every proxied
        # request. Under the RSC-prefetch burst above that is a storm of
        # short-lived connections (and ephemeral-port / TIME_WAIT churn) on top
        # of the worker_connections pressure. A pooled 32 idle upstream
        # keepalive connections lets the prefetch burst reuse warm sockets
        # instead of each forcing a new connect, which is the other half of
        # absorbing the burst cleanly. 32 is a reasonable pool for a single
        # upstream on the solo-operator edge box; it pairs with the
        # proxy_http_version/Connection directives in `location /` below
        # (keepalive to the upstream is a no-op without them).
        keepalive 32;
    }

    server {
        listen 8088;

        location / {
            proxy_pass http://atlas_upstream;

            # Required for the upstream `keepalive 32` pool above to take
            # effect (slice 676): HTTP/1.1 to the upstream, and clear the
            # inbound `Connection` header so nginx does not forward a
            # client-supplied `Connection: close` that would defeat reuse.
            # These ONLY affect proxy<->upstream framing; they preserve every
            # client-facing behaviour below unchanged.
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # HARD OVERWRITE: scrub whatever the client sent and re-issue the
            # header from the proxy's own view. The fixed TEST-NET value is
            # the "real client IP" the harness asserts atlas captured.
            proxy_set_header X-Forwarded-For 203.0.113.10;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
