# Grafana datasource provisioning for the security-atlas observability backplane.
#
# Drop this file at:
#   /mnt/user/appdata/Grafana/provisioning/datasources/security-atlas.yaml
# (alongside whatever Grafana provisioning your existing setup already has)
#
# Then restart Grafana:
#   docker restart Grafana
#
# Verify in Grafana UI → Connections → Data sources — should show three
# new entries (security-atlas-prometheus, security-atlas-tempo,
# security-atlas-loki-explicit). The Loki one is a safety duplicate
# named explicitly for trace-to-logs correlation; if you already have a
# Loki data source configured via UI, leave that one in place and
# disable the duplicate here by setting `editable: false`.

apiVersion: 1

datasources:
  # ----- Prometheus -----
  - name: security-atlas-prometheus
    type: prometheus
    access: proxy
    uid: security-atlas-prometheus
    url: http://prometheus:9090
    isDefault: false
    editable: true
    jsonData:
      httpMethod: POST
      timeInterval: 15s
      # Trace-to-metrics: a span's serviceName + operation gets linked
      # to the corresponding http_server_duration metric (scoped by the
      # service_name label, not a metric-name prefix).
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: security-atlas-tempo

  # ----- Tempo -----
  - name: security-atlas-tempo
    type: tempo
    access: proxy
    uid: security-atlas-tempo
    url: http://tempo:3200
    isDefault: false
    editable: true
    jsonData:
      httpMethod: GET
      # Trace-to-logs: a span in Tempo links to the matching log line
      # in Loki via the trace_id label.
      tracesToLogsV2:
        datasourceUid: security-atlas-loki
        spanStartTimeShift: "-1m"
        spanEndTimeShift: "1m"
        tags:
          - key: service.name
            value: container
        filterByTraceID: true
        filterBySpanID: false
      # Trace-to-metrics: jump from a slow span to the corresponding
      # latency histogram bucket.
      tracesToMetrics:
        datasourceUid: security-atlas-prometheus
        spanStartTimeShift: "-2m"
        spanEndTimeShift: "2m"
        tags:
          - key: service.name
        queries:
          - name: "Request rate"
            query: "sum(rate(http_server_duration_count{$$__tags}[5m]))"
          - name: "Error rate"
            query: 'sum(rate(http_server_duration_count{$$__tags,http_status_code=~"5.."}[5m]))'
      # Service map (Tempo derives this from trace data via metrics-
      # generator we enabled in tempo.yaml).
      serviceMap:
        datasourceUid: security-atlas-prometheus
      nodeGraph:
        enabled: true

  # ----- Loki (explicit duplicate for trace-to-logs UID stability) -----
  # If you already have Loki configured via UI with a different UID,
  # update `tracesToLogsV2.datasourceUid` above to match that UID and
  # remove this entry.
  - name: security-atlas-loki
    type: loki
    access: proxy
    uid: security-atlas-loki
    url: http://GrafanaLoki:3100
    isDefault: false
    editable: true
    jsonData:
      maxLines: 1000
      derivedFields:
        - datasourceUid: security-atlas-tempo
          matcherRegex: 'trace_id=(\w+)'
          name: trace_id
          url: "$${__value.raw}"
