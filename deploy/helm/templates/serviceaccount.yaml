{{/*
serviceaccount.yaml — the identity the workload pods (atlas, web, nats,
minio) and the hook Jobs (migrate, minio-bucket) run as. Rendered only when
`serviceAccount.create` is true. Annotations support cloud workload-identity
bindings (e.g. an EKS IRSA role ARN) when the operator uses real S3 instead
of the bundled MinIO.
*/}}
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "security-atlas.serviceAccountName" . }}
  labels:
    {{- include "security-atlas.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
