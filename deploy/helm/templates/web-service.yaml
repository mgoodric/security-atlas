{{/*
web-service.yaml — ClusterIP Service fronting the Next.js frontend. The
Ingress `/` path routes the browser app here.
*/}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "security-atlas.fullname" . }}-web
  labels:
    {{- include "security-atlas.componentLabels" (dict "context" . "component" "web") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "security-atlas.componentSelectorLabels" (dict "context" . "component" "web") | nindent 4 }}
  ports:
    - name: http
      port: 3000
      targetPort: http
