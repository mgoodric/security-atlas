{{/*
secret.yaml — credential material for the atlas server, web frontend, and
migration Job.

This object is rendered ONLY when `secrets.existingSecret` is empty (the dev
convenience path). In production set `secrets.existingSecret` to the name of
a Secret you pre-created out-of-band — the chart then renders nothing here
and every workload reads from that Secret by name (see _helpers.tpl
"security-atlas.secretName"). That keeps real credentials out of values
files and Helm release history.

The DSNs are assembled here from the postgres.* host/port/db + the role
passwords so no `user:pass@host` literal ever lives in a ConfigMap or in
values.yaml. DATABASE_URL_APP is the RLS-enforced app-role pool;
DATABASE_URL (migrate) is the BYPASSRLS atlas_migrate pool used by the
pre-install migration Job and the atlas server's boot-time schema import.
*/}}
{{- if not .Values.secrets.existingSecret }}
{{- $pg := .Values.postgres -}}
{{- $s := .Values.secrets -}}
{{- $appDsn := printf "postgres://%s:%s@%s:%v/%s?sslmode=%s" $pg.appUser $s.postgresAppPassword $pg.host $pg.port $pg.database $pg.sslmode -}}
{{- $migrateAuth := $pg.migrateUser -}}
{{- if $s.postgresMigratePassword -}}
{{- $migrateAuth = printf "%s:%s" $pg.migrateUser $s.postgresMigratePassword -}}
{{- end -}}
{{- $migrateDsn := printf "postgres://%s@%s:%v/%s?sslmode=%s" $migrateAuth $pg.host $pg.port $pg.database $pg.sslmode -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "security-atlas.secretName" . }}
  labels:
    {{- include "security-atlas.labels" . | nindent 4 }}
type: Opaque
stringData:
  # --- Postgres DSNs (assembled — never stored as a literal elsewhere) ---
  DATABASE_URL_APP: {{ $appDsn | quote }}
  DATABASE_URL_MIGRATE: {{ $migrateDsn | quote }}
  # --- role passwords (the migration Job sets atlas_app's password) ---
  ATLAS_APP_PASSWORD: {{ $s.postgresAppPassword | quote }}
  # --- platform secrets ---
  BEARER_HASH_KEY: {{ $s.bearerHashKey | quote }}
  ATLAS_BOOTSTRAP_TOKEN: {{ $s.bootstrapToken | quote }}
  ATLAS_DEFAULT_USER_PASSWORD: {{ $s.defaultUserPassword | quote }}
  {{- if .Values.oidc.issuer }}
  ATLAS_OIDC_CLIENT_SECRET: {{ $s.oidcClientSecret | quote }}
  {{- end }}
  # --- S3 / artifact-store credentials ---
  {{- if .Values.minio.enabled }}
  # Bundled MinIO: the root credentials double as the S3 access key/secret.
  MINIO_ROOT_USER: {{ $s.minioRootUser | quote }}
  MINIO_ROOT_PASSWORD: {{ $s.minioRootPassword | quote }}
  AWS_ACCESS_KEY_ID: {{ $s.minioRootUser | quote }}
  AWS_SECRET_ACCESS_KEY: {{ $s.minioRootPassword | quote }}
  {{- else }}
  # External S3: dedicated access key / secret.
  AWS_ACCESS_KEY_ID: {{ $s.s3AccessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ $s.s3SecretAccessKey | quote }}
  {{- end }}
{{- end }}
