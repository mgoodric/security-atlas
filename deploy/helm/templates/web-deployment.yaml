{{/*
web-deployment.yaml — the Next.js frontend. Stateless; talks to the atlas
HTTP API. Server-side fetches (Next.js route handlers) use ATLAS_HTTP_URL
over the in-cluster Service; the browser uses NEXT_PUBLIC_API_BASE_URL
(empty = same-origin relative URLs, which works behind the Ingress).
*/}}
{{- $fullname := include "security-atlas.fullname" . -}}
{{- $imageTag := .Values.web.image.tag | default .Values.image.tag | default .Chart.AppVersion -}}
{{- $imageRepo := .Values.web.image.repository | default (printf "%s/web" .Values.image.repository) -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullname }}-web
  labels:
    {{- include "security-atlas.componentLabels" (dict "context" . "component" "web") | nindent 4 }}
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "security-atlas.componentSelectorLabels" (dict "context" . "component" "web") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "security-atlas.componentLabels" (dict "context" . "component" "web") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "security-atlas.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: web
          image: "{{ .Values.image.registry }}/{{ $imageRepo }}:{{ $imageTag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            # Server-side (BFF) fetches resolve the atlas API over the
            # in-cluster Service name.
            - name: ATLAS_HTTP_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "security-atlas.configMapName" . }}
                  key: ATLAS_HTTP_URL_WEB
            # Browser-side API base URL (empty = same-origin via Ingress).
            - name: NEXT_PUBLIC_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "security-atlas.configMapName" . }}
                  key: NEXT_PUBLIC_API_BASE_URL
            {{- with .Values.web.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            {{- toYaml .Values.web.resources | nindent 12 }}
      {{- with .Values.web.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.web.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
