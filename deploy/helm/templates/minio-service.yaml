{{/*
minio-service.yaml — ClusterIP Service for the optional bundled MinIO.
Rendered only when `minio.enabled` is true. The atlas server reaches the
artifact store at http://<fullname>-minio:9000 (see _helpers.tpl
"security-atlas.s3Endpoint").
*/}}
{{- if .Values.minio.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "security-atlas.fullname" . }}-minio
  labels:
    {{- include "security-atlas.componentLabels" (dict "context" . "component" "minio") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "security-atlas.componentSelectorLabels" (dict "context" . "component" "minio") | nindent 4 }}
  ports:
    - name: s3
      port: 9000
      targetPort: s3
    - name: console
      port: 9001
      targetPort: console
{{- end }}
