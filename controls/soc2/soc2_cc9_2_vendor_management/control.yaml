bundle_schema_version: "1"
bundle_id: soc2_cc9_2_vendor_management
title: "Vendor inventory maintained with criticality and contract status"
description: |
  The entity assesses and manages risks associated with vendors and
  business partners (TSC CC9.2). The control owner uploads quarterly
  evidence — an export of the vendor inventory listing each vendor's
  criticality tier, data-access scope, contract status (active /
  expiring / lapsed), DPA status, and last-review date.

scf_anchor_id: TPM-01
control_family: TPM
implementation_type: manual_periodic
owner_role: ciso
lifecycle_state: active
freshness_class: quarterly

manual_evidence_schema:
  type: object
  required: [exported_at, vendors]
  properties:
    exported_at: { type: string, format: date-time }
    vendors:
      type: array
      minItems: 1
      items:
        type: object
        required: [vendor_name, criticality, contract_status, data_access_scope, last_review_at]
        properties:
          vendor_name: { type: string }
          criticality: { type: string, enum: [critical, high, medium, low] }
          contract_status: { type: string, enum: [active, expiring_in_90d, lapsed] }
          data_access_scope: { type: string, enum: [none, metadata_only, customer_data, regulated_data] }
          dpa_on_file: { type: boolean }
          last_review_at: { type: string, format: date }
