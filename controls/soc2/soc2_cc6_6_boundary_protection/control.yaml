bundle_schema_version: "1"
bundle_id: soc2_cc6_6_boundary_protection
title: "Production endpoints have host-firewall enabled"
description: |
  The entity implements logical access security measures to protect
  against threats from sources outside its system boundaries (TSC CC6.6).
  Network boundary protection covers many controls; the
  auditor-most-tested manifestation at endpoint level is: every
  production-developer endpoint has a host firewall enabled (pf on macOS,
  ufw on Linux, Windows Defender Firewall on Windows). The osquery
  query reads the firewall-state table and asserts coverage.

scf_anchor_id: NET-04
control_family: NET
implementation_type: automated
owner_role: security-engineering
lifecycle_state: active
freshness_class: daily

evidence_queries:
  - id: host_firewall_enabled_on_managed_endpoints
    language: rego
    evidence_kind: osquery.host_posture.v1
    description: "Every managed endpoint reports host firewall = enabled"
    expression: |
      package atlas.controls.soc2.cc6_6_fw

      default allow := false

      allow if {
        every p in input.posture_records {
          p.firewall_enabled == true
        }
      }
