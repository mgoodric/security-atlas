bundle_schema_version: "1"
bundle_id: soc2_cc2_1_information_quality
title: "Security program operates on documented, reviewed information sources"
description: |
  The entity obtains or generates and uses relevant, quality information
  to support the functioning of internal control (TSC CC2.1). For a v1
  security program this resolves to: the asset inventory, the vendor
  inventory, the data-flow diagram, and the system description are all
  reviewed and updated at least annually, with the reviewer named and
  the review date captured in the attestation.

scf_anchor_id: GOV-01
control_family: GOV
implementation_type: manual_attested
owner_role: ciso
lifecycle_state: active
freshness_class: annual

manual_evidence_schema:
  type: object
  required: [attested_at, attestor, sources_reviewed]
  properties:
    attested_at:
      type: string
      format: date-time
    attestor:
      type: string
      minLength: 1
    sources_reviewed:
      type: array
      minItems: 4
      items:
        type: object
        required: [name, last_reviewed_at]
        properties:
          name:
            type: string
            enum:
              [
                asset_inventory,
                vendor_inventory,
                data_flow_diagram,
                system_description,
              ]
          last_reviewed_at:
            type: string
            format: date
          version_or_revision:
            type: string
