bundle_schema_version: "1"
bundle_id: soc2_cc2_2_internal_communication
title: "Internal security communications channel maintained and used"
description: |
  The entity internally communicates information necessary to support
  the functioning of internal control (TSC CC2.2). The control owner
  uploads quarterly evidence that the security team uses a documented
  internal channel — a #security Slack channel, a periodic all-hands
  security update, an internal security newsletter — to communicate
  security expectations, incidents (post-mortem summaries), and policy
  changes to all personnel.

scf_anchor_id: GOV-04
control_family: GOV
implementation_type: manual_periodic
owner_role: security-engineering
lifecycle_state: active
freshness_class: quarterly

manual_evidence_schema:
  type: object
  required: [period_start, period_end, channel_name, communications]
  properties:
    period_start:
      type: string
      format: date
    period_end:
      type: string
      format: date
    channel_name:
      type: string
      minLength: 1
      description: "e.g. #security, all-hands deck, security@ newsletter"
    communications:
      type: array
      minItems: 1
      items:
        type: object
        required: [sent_at, topic, audience]
        properties:
          sent_at: { type: string, format: date }
          topic: { type: string }
          audience:
            {
              type: string,
              enum: [all_employees, engineering, security_team, leadership],
            }
          link: { type: string, format: uri }
