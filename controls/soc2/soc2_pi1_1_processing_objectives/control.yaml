bundle_schema_version: "1"
bundle_id: soc2_pi1_1_processing_objectives
title: "Processing objectives documented for in-scope services"
description: |
  The entity obtains or generates, uses, and communicates relevant,
  quality information regarding the objectives related to processing,
  including definitions of data processed and product and service
  specifications, to support the use of products and services (TSC
  PI1.1). The control owner attests annually that each in-scope
  service has documented processing objectives: what data it handles,
  what transformations it performs, what success and failure modes
  are, and what published SLAs apply.

scf_anchor_id: GOV-01
control_family: GOV
implementation_type: manual_attested
owner_role: product-engineering
lifecycle_state: active
freshness_class: annual

manual_evidence_schema:
  type: object
  required: [attested_at, attestor, services]
  properties:
    attested_at:
      type: string
      format: date-time
    attestor:
      type: string
      minLength: 1
    services:
      type: array
      minItems: 1
      items:
        type: object
        required: [service_name, data_classes_processed, sla_published, spec_uri]
        properties:
          service_name: { type: string }
          data_classes_processed:
            type: array
            items: { type: string, enum: [public, internal, confidential, restricted] }
          sla_published: { type: boolean }
          spec_uri: { type: string, format: uri }
